<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(e); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = { sentinel: S, level: level, args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }), ts: Date.now(), url: location.href };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) window.parent.postMessage(payload, '*');
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason; var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>

  <title>Quick Count</title>
  <script>(function() { if (localStorage.getItem('qc-theme') === 'light') document.documentElement.classList.remove('dark'); })();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <!-- Hosted bridge (used inside Usernode). Harmless if unreachable in local-dev. -->
  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>
  <script src="/usernode-loading.js"></script>
  <script src="/usernode-usernames.js"></script>
  <script src="/usernode-bridge.js"></script>
  <style>
    .tab-on { background:#7c3aed; color:#fff; }
    .badge { font-size:.65rem; font-weight:600; padding:.1rem .4rem; border-radius:.3rem; }
  </style>
</head>
<body class="bg-white text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 min-h-screen pb-20 sm:pb-0">

  <!-- Top bar -->
  <header class="sticky top-0 z-20 bg-white/90 dark:bg-zinc-950/90 backdrop-blur border-b border-zinc-200 dark:border-zinc-800">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
      <h1 class="text-lg font-bold tracking-tight">Quick&nbsp;Count</h1>
      <span id="staging-badge" class="hidden badge bg-amber-500/20 text-amber-300">demo data</span>
      <nav id="top-tabs" class="hidden sm:flex gap-1 ml-2 text-sm"></nav>
      <div class="ml-auto flex items-center gap-2">
        <button id="theme-btn" class="text-xs px-3 py-1.5 rounded-lg bg-zinc-200 hover:bg-zinc-300 dark:bg-zinc-800 dark:hover:bg-zinc-700 font-medium" title="Toggle theme">☀️</button>
        <select id="persona-select" class="hidden text-xs px-2 py-1.5 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800 outline-none"></select>
        <button id="wallet-btn" class="text-xs px-3 py-1.5 rounded-lg bg-zinc-200 hover:bg-zinc-300 dark:bg-zinc-800 dark:hover:bg-zinc-700 font-medium">Connect wallet</button>
      </div>
    </div>
  </header>

  <main id="view" class="max-w-5xl mx-auto px-4 py-5"></main>

  <!-- Mobile bottom tab bar -->
  <nav id="bottom-tabs" class="sm:hidden fixed bottom-0 inset-x-0 z-20 bg-white/95 dark:bg-zinc-950/95 backdrop-blur border-t border-zinc-200 dark:border-zinc-800 flex"></nav>

  <div id="toast" class="fixed bottom-24 sm:bottom-6 left-1/2 -translate-x-1/2 z-40 hidden px-4 py-2 rounded-lg text-sm font-medium shadow-lg"></div>

  <script>
  // ───────────────────────── App state ─────────────────────────
  const App = {
    cfg: null,
    role: { addr: null, isAdmin: false, org: null, observerOf: [] },
    state: null,        // last /__quickcount/state response
    eid: '',            // selected election
    method: 'latest',
    wallet: { connected: false, address: null },
    refreshTimer: null,
  };

  const TABS = [
    { id: 'dashboard', label: 'Dashboard', icon: '📊' },
    { id: 'elections', label: 'Elections', icon: '🗳️' },
    { id: 'orgs', label: 'Orgs', icon: '🏛️' },
    { id: 'evidence', label: 'Evidence', icon: '🔎' },
    { id: 'disputes', label: 'Disputes', icon: '⚖️' },
    { id: 'admin', label: 'Admin', icon: '🛠️', adminOnly: true },
  ];
  const METHOD_LABELS = { latest: 'Latest submission', first: 'First submission', consensus: 'Consensus', median: 'Median', verified: 'Verified only' };
  const COLORS = ['bg-rose-500','bg-sky-500','bg-emerald-500','bg-amber-500','bg-violet-500','bg-pink-500','bg-teal-500'];

  // ───────────────────────── Memo builders (mirror lib/memo.js) ─────────────────────────
  const APP = 'quickcount', V = 1;
  const clamp = (s, n) => String(s == null ? '' : s).slice(0, n);
  const pint = (n) => { const x = Number(n); return Number.isFinite(x) ? Math.max(0, Math.round(x)) : null; };
  const isHash64 = (s) => typeof s === 'string' && /^[0-9a-f]{64}$/i.test(s);
  const QC = {
    org: (name, jur) => ({ app: APP, v: V, t: 'org', name: clamp(name, 120), jur: clamp(jur, 80) }),
    el: (name) => ({ app: APP, v: V, t: 'el', name: clamp(name, 120) }),
    cand: (eid, cid, name) => ({ app: APP, v: V, t: 'cand', eid, cid: Number(cid), name: clamp(name, 80) }),
    stn: (eid, sid, name, label) => ({ app: APP, v: V, t: 'stn', eid, sid: Number(sid), name: clamp(name, 80), label: clamp(label, 80) }),
    obs: (eid, addr, sid) => { const m = { app: APP, v: V, t: 'obs', eid, addr }; if (sid != null && sid !== '') m.sid = Number(sid); return m; },
    res: (eid, sid, votes, tot, inv, ev) => { const m = { app: APP, v: V, t: 'res', eid, sid: Number(sid), votes: {} }; for (const k of Object.keys(votes || {})) { const n = pint(votes[k]); if (n != null) m.votes[String(Number(k))] = n; } const t = pint(tot), i = pint(inv); if (t != null) m.tot = t; if (i != null) m.inv = i; if (isHash64(ev)) m.ev = ev.toLowerCase(); return m; },
    disp: (eid, target, reason, ev) => { const m = { app: APP, v: V, t: 'disp', eid, target, reason: clamp(reason, 200) }; if (isHash64(ev)) m.ev = ev.toLowerCase(); return m; },
    dres: (eid, disp, verdict) => ({ app: APP, v: V, t: 'dres', eid, disp, verdict }),
    adm: (act, org) => ({ app: APP, v: V, t: 'adm', act, org }),
  };

  // ───────────────────────── Helpers ─────────────────────────
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
  function nm(addr) { return (window.QCNames ? window.QCNames.label(addr) : addr) || '—'; }
  function shortAddr(a) { return window.QCNames ? window.QCNames.short(a) : a; }
  function timeAgo(iso) {
    if (!iso) return '';
    const secs = Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 1000));
    if (secs < 60) return secs + 's ago';
    const m = Math.round(secs / 60); if (m < 60) return m + 'm ago';
    const h = Math.round(m / 60); if (h < 24) return h + 'h ago';
    return Math.round(h / 24) + 'd ago';
  }
  function toast(msg, kind) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'fixed bottom-24 sm:bottom-6 left-1/2 -translate-x-1/2 z-40 px-4 py-2 rounded-lg text-sm font-medium shadow-lg ' +
      (kind === 'error' ? 'bg-rose-600 text-white' : kind === 'warn' ? 'bg-amber-500 text-zinc-900' : 'bg-emerald-600 text-white');
    t.classList.remove('hidden');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.add('hidden'), 4200);
  }
  async function api(path) {
    const r = await fetch(path);
    if (!r.ok) { let e = {}; try { e = await r.json(); } catch (_) {} throw new Error(e.error || ('HTTP ' + r.status)); }
    return r.json();
  }
  async function sha256File(file) {
    const buf = await file.arrayBuffer();
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map((b) => b.toString(16).padStart(2, '0')).join('');
  }
  function download(name, text, type) {
    const blob = new Blob([text], { type: type || 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  // ───────────────────────── Wallet ─────────────────────────
  function bridgeReady() {
    return new Promise((resolve) => {
      let n = 0;
      (function poll() {
        if (typeof window.sendTransaction === 'function' && typeof window.getNodeAddress === 'function') return resolve(true);
        if (n++ > 60) return resolve(false);
        setTimeout(poll, 100);
      })();
    });
  }
  function extractTxId(res) {
    if (!res) return null;
    if (typeof res === 'string') return res;
    for (const k of ['txId', 'tx_id', 'id', 'txid', 'hash', 'tx_hash', 'txHash']) if (typeof res[k] === 'string') return res[k];
    for (const sub of [res.matchedTx, res.tx, res.transaction]) if (sub) { const v = extractTxId(sub); if (v) return v; }
    return null;
  }
  async function connectWallet() {
    if (App.cfg.localDev) {
      App.wallet.address = window.QCMock.address();
      App.wallet.connected = true;
    } else {
      const ok = await bridgeReady();
      if (!ok) { toast('Wallet bridge unavailable — open inside Usernode.', 'error'); return; }
      const addr = await window.getNodeAddress();
      if (!addr) { toast('No wallet address linked.', 'error'); return; }
      App.wallet.address = addr;
      App.wallet.connected = true;
    }
    await refresh();
    renderChrome();
  }
  async function sendTx(to, amount, memoObj) {
    const memoStr = JSON.stringify(memoObj);
    if (App.cfg.localDev) return window.QCMock.send(to, amount, memoStr);
    const ok = await bridgeReady();
    if (!ok) throw new Error('Wallet bridge unavailable');
    const res = await window.sendTransaction(to, amount || 0, memoStr);
    return extractTxId(res);
  }

  // ───────────────────────── Data ─────────────────────────
  async function refresh() {
    const viewer = App.wallet.address || '';
    const q = '?viewer=' + encodeURIComponent(viewer) + '&method=' + encodeURIComponent(App.method) + (App.eid ? '&eid=' + encodeURIComponent(App.eid) : '');
    try {
      App.state = await api('/__quickcount/state' + q);
      App.role = App.state.role;
      if (!App.eid && App.state.elections.length) { App.eid = App.state.elections[0].eid; return refresh(); }
    } catch (e) { console.error('state load failed', e); }
    render();
  }

  // ───────────────────────── Chrome (tabs / wallet) ─────────────────────────
  function currentRoute() {
    const h = (location.hash || '#/dashboard').replace(/^#/, '');
    const parts = h.split('/').filter(Boolean);
    return { tab: parts[0] || 'dashboard', arg: parts[1] || null };
  }
  function renderChrome() {
    const route = currentRoute();
    const tabs = TABS.filter((t) => !t.adminOnly || App.role.isAdmin);
    const topHtml = tabs.map((t) => `<a href="#/${t.id}" class="px-3 py-1.5 rounded-lg ${route.tab === t.id ? 'tab-on' : 'text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100'}">${t.label}</a>`).join('');
    document.getElementById('top-tabs').innerHTML = topHtml;
    document.getElementById('bottom-tabs').innerHTML = tabs.map((t) =>
      `<a href="#/${t.id}" class="flex-1 py-2 flex flex-col items-center gap-0.5 text-[0.62rem] ${route.tab === t.id ? 'text-violet-400' : 'text-zinc-600 dark:text-zinc-500'}">
        <span class="text-base leading-none">${t.icon}</span>${t.label}</a>`).join('');

    const wb = document.getElementById('wallet-btn');
    if (App.wallet.connected) { wb.textContent = nm(App.wallet.address); wb.title = App.wallet.address; }
    else { wb.textContent = 'Connect wallet'; wb.title = ''; }

    const ps = document.getElementById('persona-select');
    if (App.cfg && App.cfg.localDev && App.cfg.personas) {
      ps.classList.remove('hidden');
      ps.innerHTML = App.cfg.personas.map((p, i) => `<option value="${i}">${esc(p.label)}</option>`).join('');
      ps.value = String(window.QCMock.currentIndex());
    } else ps.classList.add('hidden');

    document.getElementById('staging-badge').classList.toggle('hidden', !(App.cfg && App.cfg.demo));
  }

  // ───────────────────────── Render dispatch ─────────────────────────
  function render() {
    renderChrome();
    const route = currentRoute();
    const v = document.getElementById('view');
    if (route.tab === 'election' && route.arg) { App.eid = route.arg; return renderElectionDetail(v); }
    switch (route.tab) {
      case 'dashboard': return renderDashboard(v);
      case 'elections': return renderElections(v);
      case 'orgs': return renderOrgs(v);
      case 'evidence': return renderEvidence(v);
      case 'disputes': return renderDisputes(v);
      case 'admin': return renderAdmin(v);
      default: return renderDashboard(v);
    }
  }

  function electionPicker() {
    const els = (App.state && App.state.elections) || [];
    if (!els.length) return '<p class="text-zinc-600 dark:text-zinc-500 text-sm">No elections published yet.</p>';
    return `<div class="flex flex-wrap items-center gap-2 mb-4">
      <select id="el-picker" class="px-3 py-2 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800 outline-none text-sm">
        ${els.map((e) => `<option value="${e.eid}" ${e.eid === App.eid ? 'selected' : ''}>${esc(e.name)}${e.orgActive ? '' : ' (pending)'}</option>`).join('')}
      </select>
      <select id="method-picker" class="px-3 py-2 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800 outline-none text-sm">
        ${App.cfg.methods.map((m) => `<option value="${m}" ${m === App.method ? 'selected' : ''}>${METHOD_LABELS[m]}</option>`).join('')}
      </select>
    </div>`;
  }
  function wirePickers() {
    const ep = document.getElementById('el-picker');
    if (ep) ep.onchange = () => { App.eid = ep.value; refresh(); };
    const mp = document.getElementById('method-picker');
    if (mp) mp.onchange = () => { App.method = mp.value; refresh(); };
  }

  // ───────────────────────── Dashboard ─────────────────────────
  function tallyBars(d) {
    const total = Object.values(d.tally).reduce((s, n) => s + n, 0) || 1;
    return d.candidates.map((c, i) => ({ c, i, votes: d.tally[c.cid] || 0 }))
      .sort((a, b) => b.votes - a.votes)
      .map(({ c, i, votes }) => {
        const pct = Math.round((votes / total) * 100);
        return `<div class="mb-3">
          <div class="flex justify-between text-sm mb-1"><span>${esc(c.name)}</span>
          <span class="font-mono text-zinc-700 dark:text-zinc-300">${votes.toLocaleString()} <span class="text-zinc-600 dark:text-zinc-500">(${pct}%)</span></span></div>
          <div class="h-3 rounded bg-zinc-200 dark:bg-zinc-800 overflow-hidden"><div class="h-full ${COLORS[i % COLORS.length]}" style="width:${pct}%"></div></div>
        </div>`;
      }).join('');
  }
  function stationTable(d) {
    const head = d.candidates.map((c) => `<th class="py-2 px-2 text-right font-medium text-zinc-500 dark:text-zinc-400 whitespace-nowrap">${esc(c.name)}</th>`).join('');
    const rows = d.stations.map((s) => {
      const badges = [];
      if (s.invalid) badges.push('<span class="badge bg-rose-500/20 text-rose-300">invalidated</span>');
      else if (s.disputed) badges.push('<span class="badge bg-amber-500/20 text-amber-300">disputed</span>');
      if (s.needsReview && !s.invalid) badges.push('<span class="badge bg-orange-500/20 text-orange-300">review</span>');
      if (s.sources > 1) badges.push(`<span class="badge bg-zinc-300 text-zinc-700 dark:bg-zinc-700 dark:text-zinc-300">${s.sources} reports</span>`);
      const label = `<td class="py-2 pr-2"><div>${esc(s.name)}</div>${s.label ? `<div class="text-xs text-zinc-600 dark:text-zinc-500">${esc(s.label)}</div>` : ''} <div class="flex gap-1 mt-0.5">${badges.join('')}</div></td>`;
      if (!s.reported) return `<tr class="border-t border-zinc-200 dark:border-zinc-800">${label}<td class="py-2 text-zinc-600 dark:text-zinc-500" colspan="${d.candidates.length + 1}">Awaiting result</td></tr>`;
      const cells = d.candidates.map((c) => `<td class="py-2 px-2 text-right font-mono">${(Number((s.votes || {})[c.cid] || 0)).toLocaleString()}</td>`).join('');
      return `<tr class="border-t border-zinc-200 dark:border-zinc-800">${label}${cells}<td class="py-2 pl-2 text-right text-xs text-zinc-600 dark:text-zinc-500 whitespace-nowrap">${timeAgo(s.at)}</td></tr>`;
    }).join('');
    return `<div class="overflow-x-auto"><table class="w-full text-sm min-w-[480px]">
      <thead><tr class="text-left"><th class="py-2 pr-2 font-medium text-zinc-500 dark:text-zinc-400">Station</th>${head}<th class="py-2 pl-2 text-right font-medium text-zinc-500 dark:text-zinc-400">Updated</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }
  function marginBanner(d) {
    const m = d.margin;
    const cls = m.needsReview ? 'bg-orange-500/10 border-orange-500/40 text-orange-200' : 'bg-emerald-500/10 border-emerald-500/30 text-emerald-200';
    return `<div class="border ${cls} rounded-lg px-3 py-2 text-sm mb-4">
      <span class="font-semibold">${m.needsReview ? '⚠ Needs review' : '✓ Stable lead'}</span>
      · lead margin ${m.leadMarginPct}% · uncertainty ±${m.uncertaintyPct}%
      ${m.needsReview ? ' — disagreements or disputes could affect the outcome.' : ''}
    </div>`;
  }
  function renderDashboard(v) {
    v.innerHTML = electionPicker() + '<div id="dash-body"></div>';
    wirePickers();
    const d = App.state && App.state.detail;
    const body = document.getElementById('dash-body');
    if (!d) { body.innerHTML = '<p class="text-zinc-600 dark:text-zinc-500 text-sm">Select an election to view live results.</p>'; return; }
    const totalVotes = Object.values(d.tally).reduce((s, n) => s + n, 0);
    body.innerHTML =
      `<div class="flex items-start justify-between flex-wrap gap-2 mb-1">
        <h2 class="text-lg font-semibold">${esc(d.election.name)}</h2>
        <div class="flex gap-2">
          <button id="exp-csv" class="text-xs px-3 py-1.5 rounded-lg bg-zinc-200 hover:bg-zinc-300 dark:bg-zinc-800 dark:hover:bg-zinc-700">Export CSV</button>
          <button id="exp-json" class="text-xs px-3 py-1.5 rounded-lg bg-zinc-200 hover:bg-zinc-300 dark:bg-zinc-800 dark:hover:bg-zinc-700">Export JSON</button>
        </div>
      </div>
      <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-3">by ${esc(d.election.orgName || '—')} · ${d.reporting.reported} of ${d.reporting.total} stations reported · ${totalVotes.toLocaleString()} votes · method: ${METHOD_LABELS[d.method]}</p>
      ${marginBanner(d)}
      <div class="mb-6">${tallyBars(d) || '<p class="text-zinc-600 dark:text-zinc-500 text-sm">No candidates.</p>'}</div>
      <h3 class="text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-2">By station</h3>
      ${stationTable(d)}
      <p class="mt-4 text-xs text-zinc-700 dark:text-zinc-600">${d.lastUpdated ? 'Last submission ' + timeAgo(d.lastUpdated) + ' · auto-refreshing' : 'No submissions yet'}</p>
      <p class="mt-3 text-xs"><a class="text-violet-400 hover:underline" href="#/election/${d.election.eid}">Open election workspace →</a></p>`;
    document.getElementById('exp-csv').onclick = () => exportCsv(d);
    document.getElementById('exp-json').onclick = () => download((d.election.name || 'election') + '.json', JSON.stringify(d, null, 2), 'application/json');
  }
  function exportCsv(d) {
    const head = ['Station', 'Label', 'Reporting observer', 'Updated', ...d.candidates.map((c) => c.name), 'Total', 'Invalid', 'Status'];
    const lines = [head];
    for (const s of d.stations) {
      lines.push([
        s.name, s.label || '', s.reported ? nm(s.observer) : '', s.at || '',
        ...d.candidates.map((c) => s.reported ? (s.votes[c.cid] || 0) : ''),
        s.tot == null ? '' : s.tot, s.inv == null ? '' : s.inv,
        s.invalid ? 'invalidated' : s.disputed ? 'disputed' : s.needsReview ? 'review' : s.reported ? 'ok' : 'awaiting',
      ]);
    }
    lines.push([]);
    lines.push(['TALLY (' + d.method + ')']);
    for (const c of d.candidates) lines.push([c.name, d.tally[c.cid] || 0]);
    const csv = lines.map((r) => r.map((x) => '"' + String(x == null ? '' : x).replace(/"/g, '""') + '"').join(',')).join('\n');
    download((d.election.name || 'election') + '.csv', csv, 'text/csv');
  }

  // ───────────────────────── Elections list ─────────────────────────
  function renderElections(v) {
    const els = (App.state && App.state.elections) || [];

  function showNewElectionForm() {

      row.innerHTML = `<input value="${esc(val || '')}" placeholder="Candidate name" class="nel-c flex-1 px-3 py-2 rounded-lg bg-white border border-zinc-200 dark:bg-zinc-950 dark:border-zinc-800 outline-none"><button class="px-3 rounded-lg bg-zinc-200 hover:bg-zinc-300 text-zinc-600 dark:bg-zinc-800 dark:hover:bg-zinc-700 dark:text-zinc-400">×</button>`;
      row.querySelector('button').onclick = () => row.remove();
      document.getElementById('nel-cands').appendChild(row);
    };
    add(''); add('');

  async function createElection() {
    const name = document.getElementById('nel-name').value.trim();
    const cands = Array.from(document.querySelectorAll('.nel-c')).map((i) => i.value.trim()).filter(Boolean);
    if (!name || !cands.length) return toast('Add a name and at least one candidate.', 'warn');
    const me = App.wallet.address;
    try {
      QCLoading.show('Creating election…');
      const eid = await sendTx(me, 0, QC.el(name));
      if (!eid) throw new Error('No election tx id');
      for (let i = 0; i < cands.length; i++) { QCLoading.show(`Adding candidate ${i + 1}/${cands.length}…`); await sendTx(me, 0, QC.cand(eid, i + 1, cands[i])); }
      QCLoading.hide();
      toast('Election published ✓');
      App.eid = eid; location.hash = '#/election/' + eid; await refresh();
    } catch (e) { QCLoading.hide(); toast('Failed: ' + e.message, 'error'); }
  }

    const stations = myObs.sid != null ? d.stations.filter((s) => s.sid === myObs.sid) : d.stations;
    const inner = `
      <label class="block text-sm mb-1 text-zinc-700 dark:text-zinc-300">Polling station</label>

      <p id="ob-hash" class="text-[0.65rem] text-zinc-600 dark:text-zinc-500 break-all mb-3 font-mono"></p>
      <button id="ob-submit" class="px-4 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 font-semibold text-sm">Submit / revise result</button>`;
    const p = panel('Report result' + (myObs.sid != null ? ' (your station)' : ''), inner);
    setTimeout(() => {
      let evHash = '';

      p.querySelector('#ob-submit').onclick = async () => {

  function stationsPanel(d) {
    const inner = `
      <div class="flex gap-2 mb-3">
        <input id="st-name" placeholder="Station name" class="flex-1 px-3 py-2 rounded-lg bg-white border border-zinc-200 dark:bg-zinc-950 dark:border-zinc-800 outline-none">

        <textarea id="st-csv" rows="4" placeholder="North School,District 1&#10;Town Hall,District 2" class="w-full px-3 py-2 rounded-lg bg-white border border-zinc-200 dark:bg-zinc-950 dark:border-zinc-800 outline-none font-mono text-xs mb-1"></textarea>

      </details>
      <p class="text-xs text-zinc-600 dark:text-zinc-500 mt-3">${d.stations.length} stations: ${d.stations.map((s) => esc(s.name)).join(', ') || '—'}</p>`;
    const p = panel('Stations', inner);
    setTimeout(() => {
      const nextSid = () => (d.stations.reduce((m, s) => Math.max(m, s.sid), 0) + 1);
      p.querySelector('#st-add').onclick = async () => {
        const name = p.querySelector('#st-name').value.trim(); if (!name) return toast('Enter a station name', 'warn');
        const label = p.querySelector('#st-label').value.trim();
        try { QCLoading.show('Adding station…'); await sendTx(d.election.orgAddr, 0, QC.stn(d.election.eid, nextSid(), name, label)); QCLoading.hide(); toast('Station added ✓'); refreshSoon(); }
        catch (e) { QCLoading.hide(); toast('Failed: ' + e.message, 'error'); }
      };
      const parseCsv = (text) => text.split(/\r?\n/).map((l) => l.trim()).filter(Boolean).map((l) => { const [name, ...rest] = l.split(','); return { name: (name || '').trim(), label: rest.join(',').trim() }; }).filter((r) => r.name);
      const preview = () => { const rows = parseCsv(p.querySelector('#st-csv').value); p.querySelector('#st-csv-preview').textContent = rows.length ? `${rows.length} station(s) ready to import.` : ''; return rows; };
      p.querySelector('#st-csv').oninput = preview;
      p.querySelector('#st-csv-file').onchange = (e) => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { p.querySelector('#st-csv').value = r.result; preview(); }; r.readAsText(f); };
      p.querySelector('#st-csv-import').onclick = async () => {
        const rows = preview(); if (!rows.length) return toast('Nothing to import', 'warn');
        let sid = nextSid();
        try { for (let i = 0; i < rows.length; i++) { QCLoading.show(`Importing station ${i + 1}/${rows.length}…`); await sendTx(d.election.orgAddr, 0, QC.stn(d.election.eid, sid++, rows[i].name, rows[i].label)); } QCLoading.hide(); toast(`${rows.length} stations imported ✓`); refreshSoon(); }
        catch (e) { QCLoading.hide(); toast('Failed: ' + e.message, 'error'); }
      };
    });
    return p;
  }

  async function registerOrg() {
    if (!App.wallet.connected) { await connectWallet(); if (!App.wallet.connected) return; }
    const name = document.getElementById('org-name').value.trim();
    const jur = document.getElementById('org-jur').value.trim();
    if (!name) return toast('Enter an organization name', 'warn');
    try { QCLoading.show('Registering & paying fee…'); await sendTx(App.cfg.treasury, App.cfg.orgFee, QC.org(name, jur)); QCLoading.hide(); toast('Organization registered ✓'); refreshSoon(); }
    catch (e) { QCLoading.hide(); toast('Failed: ' + e.message, 'error'); }
  }
  async function payOrgFee() {
    try { QCLoading.show('Paying fee…'); await sendTx(App.cfg.treasury, App.cfg.orgFee, QC.org(App.role.org.name, App.role.org.jur || '')); QCLoading.hide(); toast('Fee paid ✓'); refreshSoon(); }
    catch (e) { QCLoading.hide(); toast('Failed: ' + e.message, 'error'); }
  }

  // ───────────────────────── Evidence gallery ─────────────────────────
  function renderEvidence(v) {
    v.innerHTML = electionPicker() + '<div id="ev-body"></div>';
    wirePickers();
    const d = App.state && App.state.detail;
    const body = document.getElementById('ev-body');
    if (!d) { body.innerHTML = '<p class="text-zinc-600 dark:text-zinc-500 text-sm">Select an election.</p>'; return; }
    const stationName = (sid) => { const s = d.stations.find((x) => x.sid === sid); return s ? s.name : ('Station ' + sid); };
    const gallery = d.evidence.length ? d.evidence.map((e) => `
      <div class="p-3 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800">
        <div class="flex items-center justify-between"><span class="font-medium text-sm">${esc(stationName(e.sid))}</span>
        ${e.invalid ? '<span class="badge bg-rose-500/20 text-rose-300">invalidated</span>' : ''}</div>
        <p class="text-xs text-zinc-600 dark:text-zinc-500">${esc(nm(e.observer))} · ${timeAgo(e.at)}</p>
        <p class="text-[0.65rem] text-zinc-600 dark:text-zinc-500 break-all font-mono mt-1">${esc(e.ev)}</p>
        <button data-hash="${e.ev}" data-name="${esc(stationName(e.sid))}" class="ev-verify mt-2 text-xs px-3 py-1.5 rounded-lg bg-zinc-200 hover:bg-zinc-300 dark:bg-zinc-800 dark:hover:bg-zinc-700">Verify a file against this</button>
      </div>`).join('') : '<p class="text-zinc-600 dark:text-zinc-500 text-sm">No evidence hashes recorded for this election.</p>';

    body.innerHTML = `<h2 class="text-lg font-semibold mb-1">Evidence — ${esc(d.election.name)}</h2>
      <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-4">Each result may carry a SHA-256 hash of its tally sheet. Drop the original file below to prove it matches what was reported on-chain — the file never leaves your device.</p>
      <div class="p-4 mb-4 rounded-xl bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800">
        <p class="text-sm text-zinc-600 dark:text-zinc-500 mb-2" id="vf-target">Verifying against: <span class="text-zinc-600 dark:text-zinc-500">select a result below, or any hash</span></p>
        <input id="vf-file" type="file" class="text-xs text-zinc-600 dark:text-zinc-400 mb-2 block">
        <p id="vf-result" class="text-sm"></p>
        <p id="vf-hash" class="text-[0.65rem] text-zinc-600 dark:text-zinc-500 break-all font-mono"></p>
      </div>
      <div class="grid sm:grid-cols-2 gap-3">${gallery}</div>`;

    let target = '';
    body.querySelectorAll('.ev-verify').forEach((b) => b.onclick = () => {
      target = b.dataset.hash;
      document.getElementById('vf-target').innerHTML = 'Verifying against: <span class="text-zinc-700 dark:text-zinc-300">' + esc(b.dataset.name) + '</span> <span class="text-[0.6rem] font-mono text-zinc-600 dark:text-zinc-500">' + esc(target.slice(0, 16)) + '…</span>';
      document.getElementById('vf-result').textContent = '';
    });
    document.getElementById('vf-file').onchange = async (e) => {
      const f = e.target.files[0]; if (!f) return;
      const h = await sha256File(f);
      document.getElementById('vf-hash').textContent = 'sha256: ' + h;
      const r = document.getElementById('vf-result');
      if (!target) { r.innerHTML = '<span class="text-zinc-500 dark:text-zinc-400">Pick a result to compare against.</span>'; return; }
      if (h.toLowerCase() === target.toLowerCase()) r.innerHTML = '<span class="text-emerald-400 font-semibold">✓ Match — this file is exactly what was reported.</span>';
      else r.innerHTML = '<span class="text-rose-400 font-semibold">✗ No match — this file differs from the recorded evidence.</span>';
    };
  }

  // ───────────────────────── Disputes ─────────────────────────
  function renderDisputes(v) {
    v.innerHTML = electionPicker() + '<div id="dsp-body"></div>';
    wirePickers();
    const d = App.state && App.state.detail;
    const body = document.getElementById('dsp-body');
    if (!d) { body.innerHTML = '<p class="text-zinc-600 dark:text-zinc-500 text-sm">Select an election.</p>'; return; }
    const stName = (txId) => { const s = d.stations.find((x) => x.resultTx === txId); return s ? s.name : txId.slice(0, 10) + '…'; };
    const statusBadge = (s) => s === 'upheld' ? '<span class="badge bg-rose-500/20 text-rose-300">upheld</span>'
      : s === 'rejected' ? '<span class="badge bg-zinc-300 text-zinc-700 dark:bg-zinc-700 dark:text-zinc-300">rejected</span>'
      : '<span class="badge bg-amber-500/20 text-amber-300">open</span>';
    const rows = d.disputes.length ? d.disputes.map((x) => `
      <div class="p-3 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800">
        <div class="flex items-center justify-between"><span class="font-medium text-sm">${esc(stName(x.target))}</span>${statusBadge(x.status)}</div>
        <p class="text-sm text-zinc-700 dark:text-zinc-300 mt-1">${esc(x.reason || '—')}</p>
        <p class="text-xs text-zinc-600 dark:text-zinc-500">filed by ${esc(nm(x.filer))} · ${timeAgo(x.createdAt)}${x.ev ? ' · has evidence' : ''}</p>
      </div>`).join('') : '<p class="text-zinc-600 dark:text-zinc-500 text-sm">No disputes filed for this election.</p>';
    body.innerHTML = `<h2 class="text-lg font-semibold mb-3">Disputes — ${esc(d.election.name)}</h2><div class="space-y-2 mb-4">${rows}</div>
      <p class="text-sm text-zinc-600 dark:text-zinc-500">Authorized observers and the organizing wallet can file and resolve disputes from the <a href="#/election/${d.election.eid}" class="text-violet-400 hover:underline">election workspace</a>.</p>`;
  }

  // ───────────────────────── Admin ─────────────────────────
  async function renderAdmin(v) {
    if (!App.role.isAdmin) { v.innerHTML = '<p class="text-zinc-600 dark:text-zinc-500 text-sm">Platform-admin scope required. Connect an admin wallet.</p>'; return; }
    let data;
    try { data = await api('/__quickcount/admin?viewer=' + encodeURIComponent(App.wallet.address)); }
    catch (e) { v.innerHTML = '<p class="text-rose-400 text-sm">' + esc(e.message) + '</p>'; return; }
    const s = data.stats;
    v.innerHTML = `<h2 class="text-lg font-semibold mb-3">Platform admin</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
        ${[['Organizations', s.orgs], ['Active orgs', s.activeOrgs], ['Elections', s.elections], ['Org fee', s.orgFee]].map(([k, val]) =>
          `<div class="p-3 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800"><div class="text-xl font-bold">${val}</div><div class="text-xs text-zinc-600 dark:text-zinc-500">${k}</div></div>`).join('')}
      </div>
      <p class="text-xs text-zinc-600 dark:text-zinc-500 mb-3">Treasury: <span class="font-mono">${esc(s.treasury)}</span></p>
      <h3 class="text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-2">All organizations</h3>
      <div class="space-y-2">${data.orgs.map((o) => `
        <div class="p-3 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800 flex items-center justify-between gap-2">
          <div><div class="font-medium text-sm">${esc(o.name)}${o.waived ? ' <span class="badge bg-sky-500/20 text-sky-300">waived</span>' : ''}</div>
          <div class="text-xs text-zinc-600 dark:text-zinc-500 font-mono">${esc(o.addr)} · paid ${o.feeAmount}</div></div>
          ${o.active ? '<span class="badge bg-emerald-500/20 text-emerald-300">active</span>'
            : `<button data-org="${o.addr}" class="waive-btn text-xs px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-500 font-medium">Waive fee</button>`}
        </div>`).join('')}</div>`;
    v.querySelectorAll('.waive-btn').forEach((b) => b.onclick = async () => {
      try { QCLoading.show('Waiving fee…'); await sendTx(App.wallet.address, 0, QC.adm('waive', b.dataset.org)); QCLoading.hide(); toast('Fee waived ✓'); refreshSoon(); }
      catch (e) { QCLoading.hide(); toast('Failed: ' + e.message, 'error'); }
    });
  }

  // ───────────────────────── Boot ─────────────────────────
  function refreshSoon() { setTimeout(() => refresh(), App.cfg.localDev ? 400 : 2500); }
  function startAutoRefresh() {
    if (App.refreshTimer) clearInterval(App.refreshTimer);
    App.refreshTimer = setInterval(() => { const r = currentRoute(); if (['dashboard', 'election', 'evidence', 'disputes'].includes(r.tab)) refresh(); }, 6000);
  }

  // ───────────────────────── Theme toggle ─────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  themeBtn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
  themeBtn.onclick = function () {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('qc-theme', isDark ? 'dark' : 'light');
    themeBtn.textContent = isDark ? '☀️' : '🌙';
  };

  async function boot() {
    App.cfg = await api('/__quickcount/config');
    App.method = (App.cfg.methods && App.cfg.methods[0]) || 'latest';
    if (App.cfg.localDev && window.QCMock) {
      window.QCMock.init(App.cfg.personas || []);
      document.getElementById('persona-select').onchange = async (e) => { window.QCMock.setPersona(Number(e.target.value)); await connectWallet(); };
      // Auto-connect a persona in local-dev for a friction-free demo.
      App.wallet.address = window.QCMock.address(); App.wallet.connected = true;
    } else {
      // Try a silent wallet connect inside the platform.
      bridgeReady().then(async (ok) => { if (ok) { try { const a = await window.getNodeAddress(); if (a) { App.wallet.address = a; App.wallet.connected = true; renderChrome(); refresh(); } } catch (_) {} } });
    }
    document.getElementById('wallet-btn').onclick = () => connectWallet();
    window.addEventListener('hashchange', render);
    await refresh();
    startAutoRefresh();
  }

  boot().catch((e) => { console.error(e); document.getElementById('view').innerHTML = '<p class="text-rose-400 text-sm p-4">Failed to start: ' + esc(e.message) + '</p>'; });
  </script>
</body>
</html>
