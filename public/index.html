  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(e); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = { sentinel: S, level: level, args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }), ts: Date.now(), url: location.href };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) window.parent.postMessage(payload, '*');
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason; var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });

  })();

        s.name, s.label || '', s.reported ? nm(s.observer) : '', s.at || '',
        ...d.candidates.map((c) => s.reported ? (s.votes[c.cid] || 0) : ''),
        s.tot == null ? '' : s.tot, s.inv == null ? '' : s.inv,
        s.invalid ? 'invalidated' : s.disputed ? 'disputed' : s.needsReview ? 'review' : s.reported ? 'ok' : 'awaiting',
      ]);
    }
    lines.push([]);
    lines.push(['TALLY (' + d.method + ')']);
    for (const c of d.candidates) lines.push([c.name, d.tally[c.cid] || 0]);
    const csv = lines.map((r) => r.map((x) => '"' + String(x == null ? '' : x).replace(/"/g, '""') + '"').join(',')).join('\n');
    download((d.election.name || 'election') + '.csv', csv, 'text/csv');
  }

  async function createElection() {
    const name = document.getElementById('nel-name').value.trim();
    const cands = Array.from(document.querySelectorAll('.nel-c')).map((i) => i.value.trim()).filter(Boolean);
    if (!name || !cands.length) return toast('Add a name and at least one candidate.', 'warn');
    const me = App.wallet.address;
    try {
      QCLoading.show('Creating election…');
      const eid = await sendTx(me, 0, QC.el(name));
      if (!eid) throw new Error('No election tx id');
      for (let i = 0; i < cands.length; i++) { QCLoading.show(`Adding candidate ${i + 1}/${cands.length}…`); await sendTx(me, 0, QC.cand(eid, i + 1, cands[i])); }
      QCLoading.hide();
      toast('Election published ✓');
      App.eid = eid; location.hash = '#/election/' + eid; await refresh();
    } catch (e) { QCLoading.hide(); toast('Failed: ' + e.message, 'error'); }
  }

      };

      };
    });
    return p;
  }

    html += orgList.length ? '<div class="space-y-2">' + orgList.map(([addr, name]) => `<div class="p-3 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800 text-sm flex justify-between"><span>${esc(name)}</span><span class="text-xs text-zinc-600 dark:text-zinc-500 font-mono">${shortAddr(addr)}</span></div>`).join('') + '</div>'
      : '<p class="text-zinc-600 dark:text-zinc-500 text-sm">No active organizations visible yet.</p>';
    v.innerHTML = html;

    const reg = document.getElementById('org-reg');
    if (reg) reg.onclick = registerOrg;
    const pay = document.getElementById('pay-fee');
    if (pay) pay.onclick = payOrgFee;
  }
  async function registerOrg() {
    if (!App.wallet.connected) { await connectWallet(); if (!App.wallet.connected) return; }
    const name = document.getElementById('org-name').value.trim();
    const jur = document.getElementById('org-jur').value.trim();
    if (!name) return toast('Enter an organization name', 'warn');
    try { QCLoading.show('Registering & paying fee…'); await sendTx(App.cfg.treasury, App.cfg.orgFee, QC.org(name, jur)); QCLoading.hide(); toast('Organization registered ✓'); refreshSoon(); }
    catch (e) { QCLoading.hide(); toast('Failed: ' + e.message, 'error'); }
  }
  async function payOrgFee() {
    try { QCLoading.show('Paying fee…'); await sendTx(App.cfg.treasury, App.cfg.orgFee, QC.org(App.role.org.name, App.role.org.jur || '')); QCLoading.hide(); toast('Fee paid ✓'); refreshSoon(); }
    catch (e) { QCLoading.hide(); toast('Failed: ' + e.message, 'error'); }
  }

  // ───────────────────────── Evidence gallery ─────────────────────────
  function renderEvidence(v) {
    v.innerHTML = electionPicker() + '<div id="ev-body"></div>';
    wirePickers();
    const d = App.state && App.state.detail;
    const body = document.getElementById('ev-body');
    if (!d) { body.innerHTML = '<p class="text-zinc-600 dark:text-zinc-500 text-sm">Select an election.</p>'; return; }
    const stationName = (sid) => { const s = d.stations.find((x) => x.sid === sid); return s ? s.name : ('Station ' + sid); };
    const gallery = d.evidence.length ? d.evidence.map((e) => `
      <div class="p-3 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800">
        <div class="flex items-center justify-between"><span class="font-medium text-sm">${esc(stationName(e.sid))}</span>
        ${e.invalid ? '<span class="badge bg-rose-500/20 text-rose-300">invalidated</span>' : ''}</div>
        <p class="text-xs text-zinc-600 dark:text-zinc-500">${esc(nm(e.observer))} · ${timeAgo(e.at)}</p>
        <p class="text-[0.65rem] text-zinc-600 dark:text-zinc-500 break-all font-mono mt-1">${esc(e.ev)}</p>
        <button data-hash="${e.ev}" data-name="${esc(stationName(e.sid))}" class="ev-verify mt-2 text-xs px-3 py-1.5 rounded-lg bg-zinc-200 hover:bg-zinc-300 dark:bg-zinc-800 dark:hover:bg-zinc-700">Verify a file against this</button>
      </div>`).join('') : '<p class="text-zinc-600 dark:text-zinc-500 text-sm">No evidence hashes recorded for this election.</p>';

    body.innerHTML = `<h2 class="text-lg font-semibold mb-1">Evidence — ${esc(d.election.name)}</h2>
      <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-4">Each result may carry a SHA-256 hash of its tally sheet. Drop the original file below to prove it matches what was reported on-chain — the file never leaves your device.</p>
      <div class="p-4 mb-4 rounded-xl bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800">
        <p class="text-sm text-zinc-600 dark:text-zinc-500 mb-2" id="vf-target">Verifying against: <span class="text-zinc-600 dark:text-zinc-500">select a result below, or any hash</span></p>
        <input id="vf-file" type="file" class="text-xs text-zinc-600 dark:text-zinc-400 mb-2 block">
        <p id="vf-result" class="text-sm"></p>
        <p id="vf-hash" class="text-[0.65rem] text-zinc-600 dark:text-zinc-500 break-all font-mono"></p>
      </div>
      <div class="grid sm:grid-cols-2 gap-3">${gallery}</div>`;

    let target = '';
    body.querySelectorAll('.ev-verify').forEach((b) => b.onclick = () => {
      target = b.dataset.hash;
      document.getElementById('vf-target').innerHTML = 'Verifying against: <span class="text-zinc-700 dark:text-zinc-300">' + esc(b.dataset.name) + '</span> <span class="text-[0.6rem] font-mono text-zinc-600 dark:text-zinc-500">' + esc(target.slice(0, 16)) + '…</span>';
      document.getElementById('vf-result').textContent = '';
    });
    document.getElementById('vf-file').onchange = async (e) => {
      const f = e.target.files[0]; if (!f) return;
      const h = await sha256File(f);
      document.getElementById('vf-hash').textContent = 'sha256: ' + h;
      const r = document.getElementById('vf-result');
      if (!target) { r.innerHTML = '<span class="text-zinc-500 dark:text-zinc-400">Pick a result to compare against.</span>'; return; }
      if (h.toLowerCase() === target.toLowerCase()) r.innerHTML = '<span class="text-emerald-400 font-semibold">✓ Match — this file is exactly what was reported.</span>';
      else r.innerHTML = '<span class="text-rose-400 font-semibold">✗ No match — this file differs from the recorded evidence.</span>';
    };
  }

  // ───────────────────────── Disputes ─────────────────────────
  function renderDisputes(v) {
    v.innerHTML = electionPicker() + '<div id="dsp-body"></div>';
    wirePickers();
    const d = App.state && App.state.detail;
    const body = document.getElementById('dsp-body');
    if (!d) { body.innerHTML = '<p class="text-zinc-600 dark:text-zinc-500 text-sm">Select an election.</p>'; return; }
    const stName = (txId) => { const s = d.stations.find((x) => x.resultTx === txId); return s ? s.name : txId.slice(0, 10) + '…'; };
    const statusBadge = (s) => s === 'upheld' ? '<span class="badge bg-rose-500/20 text-rose-300">upheld</span>'
      : s === 'rejected' ? '<span class="badge bg-zinc-300 text-zinc-700 dark:bg-zinc-700 dark:text-zinc-300">rejected</span>'
      : '<span class="badge bg-amber-500/20 text-amber-300">open</span>';
    const rows = d.disputes.length ? d.disputes.map((x) => `
      <div class="p-3 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800">
        <div class="flex items-center justify-between"><span class="font-medium text-sm">${esc(stName(x.target))}</span>${statusBadge(x.status)}</div>
        <p class="text-sm text-zinc-700 dark:text-zinc-300 mt-1">${esc(x.reason || '—')}</p>
        <p class="text-xs text-zinc-600 dark:text-zinc-500">filed by ${esc(nm(x.filer))} · ${timeAgo(x.createdAt)}${x.ev ? ' · has evidence' : ''}</p>
      </div>`).join('') : '<p class="text-zinc-600 dark:text-zinc-500 text-sm">No disputes filed for this election.</p>';
    body.innerHTML = `<h2 class="text-lg font-semibold mb-3">Disputes — ${esc(d.election.name)}</h2><div class="space-y-2 mb-4">${rows}</div>
      <p class="text-sm text-zinc-600 dark:text-zinc-500">Authorized observers and the organizing wallet can file and resolve disputes from the <a href="#/election/${d.election.eid}" class="text-violet-400 hover:underline">election workspace</a>.</p>`;
  }

  // ───────────────────────── Admin ─────────────────────────
  async function renderAdmin(v) {
    if (!App.role.isAdmin) { v.innerHTML = '<p class="text-zinc-600 dark:text-zinc-500 text-sm">Platform-admin scope required. Connect an admin wallet.</p>'; return; }
    let data;
    try { data = await api('/__quickcount/admin?viewer=' + encodeURIComponent(App.wallet.address)); }
    catch (e) { v.innerHTML = '<p class="text-rose-400 text-sm">' + esc(e.message) + '</p>'; return; }
    const s = data.stats;
    v.innerHTML = `<h2 class="text-lg font-semibold mb-3">Platform admin</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
        ${[['Organizations', s.orgs], ['Active orgs', s.activeOrgs], ['Elections', s.elections], ['Org fee', s.orgFee]].map(([k, val]) =>
          `<div class="p-3 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800"><div class="text-xl font-bold">${val}</div><div class="text-xs text-zinc-600 dark:text-zinc-500">${k}</div></div>`).join('')}
      </div>
      <p class="text-xs text-zinc-600 dark:text-zinc-500 mb-3">Treasury: <span class="font-mono">${esc(s.treasury)}</span></p>
      <h3 class="text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-2">All organizations</h3>
      <div class="space-y-2">${data.orgs.map((o) => `
        <div class="p-3 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800 flex items-center justify-between gap-2">
          <div><div class="font-medium text-sm">${esc(o.name)}${o.waived ? ' <span class="badge bg-sky-500/20 text-sky-300">waived</span>' : ''}</div>
          <div class="text-xs text-zinc-600 dark:text-zinc-500 font-mono">${esc(o.addr)} · paid ${o.feeAmount}</div></div>
          ${o.active ? '<span class="badge bg-emerald-500/20 text-emerald-300">active</span>'
            : `<button data-org="${o.addr}" class="waive-btn text-xs px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-500 font-medium">Waive fee</button>`}
        </div>`).join('')}</div>`;
    v.querySelectorAll('.waive-btn').forEach((b) => b.onclick = async () => {
      try { QCLoading.show('Waiving fee…'); await sendTx(App.wallet.address, 0, QC.adm('waive', b.dataset.org)); QCLoading.hide(); toast('Fee waived ✓'); refreshSoon(); }
      catch (e) { QCLoading.hide(); toast('Failed: ' + e.message, 'error'); }
    });
  }

  // ───────────────────────── Profile & Settings ─────────────────────────
  function langSelect(id) {
    const opts = LANGS.map((l) => `<option value="${l}" ${l === App.lang ? 'selected' : ''}>${esc(LANG_NAMES[l])}</option>`).join('');
    return `<select id="${id}" class="px-3 py-2 rounded-lg bg-zinc-950 border border-zinc-800 outline-none text-sm">${opts}</select>`;
  }
  function wireLangSelect(id) {
    const el = document.getElementById(id);
    if (el) el.onchange = () => setLang(el.value);
  }
  function identicon(seed) {
    const s = String(seed || '?');
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    const hue = h % 360;
    const initials = (function () {
      const str = s.replace(/^ut1/, '');
      return (str[0] || '?').toUpperCase() + (str[1] || '').toUpperCase();
    })();
    return `<div class="w-16 h-16 rounded-2xl flex items-center justify-center text-xl font-bold text-white shadow-inner"
      style="background:linear-gradient(135deg,hsl(${hue},65%,45%),hsl(${(hue + 40) % 360},65%,35%))">${esc(initials)}</div>`;
  }

  function renderProfile(v) {
    const me = App.me || {};
    const prof = me.profile || {};
    const addr = me.usernode_pubkey || App.wallet.address || '';
    const linked = !!addr;
    const username = me.username || null;
    const currentName = prof.display_name || username || (addr ? shortAddr(addr) : '');
    const seed = username || addr || 'guest';

    v.innerHTML = `
      <div class="max-w-xl">
        <h2 class="text-xl font-bold mb-1">${esc(t('title_profile'))}</h2>
        <p class="text-xs text-zinc-500 mb-5">${esc(t('readonly_note'))}</p>

        <div class="flex items-center gap-4 mb-6">
          ${identicon(seed)}
          <div class="min-w-0">
            <div class="text-lg font-semibold truncate">${esc(prof.display_name || username || (addr ? shortAddr(addr) : t('not_linked')))}</div>
            <div class="text-xs text-zinc-500">${esc(t('label_joined'))}: ${esc(fmtJoined(prof.created_at))}</div>
          </div>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-xs text-zinc-400 mb-1">${esc(t('label_username'))} <span class="text-zinc-600">· ${esc(t('hint_username'))}</span></label>
            <div class="px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-800 text-sm ${username ? '' : 'text-zinc-500'}">${esc(username || t('not_linked'))}</div>
          </div>

          <div>
            <label class="block text-xs text-zinc-400 mb-1">${esc(t('label_wallet'))}</label>
            <div class="flex items-center gap-2">
              <div class="flex-1 px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-800 text-xs font-mono break-all ${addr ? '' : 'text-zinc-500'}">${esc(addr || t('not_linked'))}</div>
              ${addr ? `<button id="copy-addr" class="text-xs px-3 py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 whitespace-nowrap">${esc(t('action_copy'))}</button>` : ''}
            </div>
          </div>

          <div>
            <label class="block text-xs text-zinc-400 mb-1">${esc(t('label_display_name'))}</label>
            ${linked ? `
            <div class="flex items-center gap-2">
              <input id="dn-input" maxlength="20" value="${esc(currentName)}" class="flex-1 px-3 py-2 rounded-lg bg-zinc-950 border border-zinc-800 outline-none text-sm" />
              <button id="dn-save" class="text-sm px-4 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 font-medium disabled:opacity-50 disabled:cursor-not-allowed">${esc(t('action_save'))}</button>
            </div>
            <p id="dn-err" class="hidden mt-1 text-xs text-rose-400"></p>
            <p class="mt-1 text-xs text-zinc-500">${esc(t('hint_display_name'))}</p>
            ` : `<p class="text-xs text-amber-300">${esc(t('no_wallet_note'))}</p>`}
          </div>

          <div>
            <label class="block text-xs text-zinc-400 mb-1">${esc(t('label_language'))}</label>
            ${langSelect('profile-lang')}
          </div>
        </div>
      </div>`;

    wireLangSelect('profile-lang');

    const copyBtn = document.getElementById('copy-addr');
    if (copyBtn) copyBtn.onclick = async () => {
      try { await navigator.clipboard.writeText(addr); toast(t('copied')); }
      catch (_) { toast(addr, 'warn'); }
    };

    if (linked) {
      const input = document.getElementById('dn-input');
      const save = document.getElementById('dn-save');
      const err = document.getElementById('dn-err');
      const validate = () => {
        const val = input.value.trim();
        const ok = NAME_RE.test(val);
        if (val && !ok) { err.textContent = t('invalid_name'); err.classList.remove('hidden'); }
        else { err.classList.add('hidden'); }
        save.disabled = !ok;
        return ok;
      };
      input.oninput = validate;
      validate();
      save.onclick = async () => {
        const val = input.value.trim();
        if (!NAME_RE.test(val)) { validate(); return; }
        save.disabled = true;
        const prev = save.textContent;
        save.textContent = t('saving');
        try {
          await putProfile({ display_name: val });
          toast(t('saved'));
          renderChrome(); // refresh the wallet button label
          save.textContent = prev;
          validate();
        } catch (e) {
          save.textContent = prev;
          save.disabled = false;
          err.textContent = e.message || t('save_failed');
          err.classList.remove('hidden');
          toast(t('save_failed'), 'error');
        }
      };
    }
  }

  function renderSettings(v) {
    v.innerHTML = `
      <div class="max-w-xl">
        <h2 class="text-xl font-bold mb-5">${esc(t('title_settings'))}</h2>
        <div class="p-4 rounded-xl bg-zinc-900 border border-zinc-800">
          <label class="block text-sm font-medium mb-1">${esc(t('label_language'))}</label>
          <p class="text-xs text-zinc-500 mb-3">${esc(t('desc_language'))}</p>
          ${langSelect('settings-lang')}
        </div>
      </div>`;
    wireLangSelect('settings-lang');
  }

  // ───────────────────────── Boot ─────────────────────────
  function refreshSoon() { setTimeout(() => refresh(), App.cfg.localDev ? 400 : 2500); }
  function startAutoRefresh() {
    if (App.refreshTimer) clearInterval(App.refreshTimer);
    App.refreshTimer = setInterval(() => { const r = currentRoute(); if (['dashboard', 'election', 'evidence', 'disputes'].includes(r.tab)) refresh(); }, 6000);
  }

  // ───────────────────────── Theme toggle ─────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  themeBtn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
  themeBtn.onclick = function () {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('qc-theme', isDark ? 'dark' : 'light');
    themeBtn.textContent = isDark ? '☀️' : '🌙';
  };

  async function boot() {
    App.cfg = await api('/__quickcount/config');
    App.method = (App.cfg.methods && App.cfg.methods[0]) || 'latest';
    if (App.cfg.localDev && window.QCMock) {
      window.QCMock.init(App.cfg.personas || []);
      document.getElementById('persona-select').onchange = async (e) => { window.QCMock.setPersona(Number(e.target.value)); await connectWallet(); };
      // Auto-connect a persona in local-dev for a friction-free demo.
      App.wallet.address = window.QCMock.address(); App.wallet.connected = true;
    } else {
      // Try a silent wallet connect inside the platform.
      bridgeReady().then(async (ok) => {
        if (!ok) return;
        try {
          const a = await window.getNodeAddress();
          if (!a) return;
          App.wallet.address = a; App.wallet.connected = true;
          await loadMe();
          const pref = App.me && App.me.profile && App.me.profile.preferred_lang;
          if (LANGS.indexOf(pref) !== -1 && pref !== App.lang) { await setLang(pref, { skipPersist: true }); }
          renderChrome(); refresh();
        } catch (_) {}
      });
    }
    // Wallet button: when connected it toggles the Profile/Settings menu;
    // when not, it connects.
    document.getElementById('wallet-btn').onclick = (e) => {
      e.stopPropagation();
      if (App.wallet.connected) { App.menuOpen = !App.menuOpen; renderChrome(); }
      else connectWallet();
    };
    // Close the dropdown on any outside click.
    document.addEventListener('click', (e) => {
      if (App.menuOpen && !document.getElementById('wallet-wrap').contains(e.target)) {
        App.menuOpen = false; renderChrome();
      }
    });
    window.addEventListener('hashchange', render);

    // Resolve language: saved profile pref > device-local > browser > English.
    let localPref = null;
    try { localPref = localStorage.getItem('qc_lang'); } catch (_) {}
    await loadMe();
    const profilePref = App.me && App.me.profile && App.me.profile.preferred_lang;
    App.lang = resolveLang(profilePref, localPref);
    applyDir();
    // Persist an auto-detected choice locally so it's stable next visit.
    try { if (!localPref) localStorage.setItem('qc_lang', App.lang); } catch (_) {}

    await refresh();
    startAutoRefresh();
  }

  boot().catch((e) => { console.error(e); document.getElementById('view').innerHTML = '<p class="text-rose-400 text-sm p-4">Failed to start: ' + esc(e.message) + '</p>'; });
  </script>
</body>
</html>
