<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = { sentinel: S, level: level, args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }), ts: Date.now(), url: location.href };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) window.parent.postMessage(payload, '*');
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason; var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
  })();
  </script>
  <title>Quick Count</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div id="root" class="min-h-screen">
    <div class="flex items-center justify-center min-h-screen">
      <p class="text-zinc-500">Loading…</p>
    </div>
  </div>

  <script>
  // ── State ──────────────────────────────────────────────────────────────────
  let TOKEN = new URLSearchParams(location.search).get('token') || '';
  let CURRENT_USER = null;
  let ROLE = 'observer';
  let ELECTIONS = [];
  let CURRENT_ELECTION_ID = null;
  const ROLE_LEVELS = { observer: 0, agent: 1, admin: 2 };

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function timeAgo(iso) {
    if (!iso) return '';
    const secs = Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 1000));
    if (secs < 60) return secs + 's ago';
    const mins = Math.round(secs / 60);
    if (mins < 60) return mins + 'm ago';
    return Math.round(mins / 60) + 'h ago';
  }
  function fmt(n) { return Number(n || 0).toLocaleString(); }

  async function apiFetch(path, opts) {
    const headers = { 'x-usernode-token': TOKEN, ...(opts?.headers || {}) };
    if (opts && opts.body && !(opts.body instanceof FormData)) {
      headers['Content-Type'] = 'application/json';
    }
    const r = await fetch(path, { ...opts, headers });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: r.status }));
      throw Object.assign(new Error(err.error || r.status), { status: r.status });
    }
    return r.json();
  }

  function canAccess(minRole) {
    return (ROLE_LEVELS[ROLE] || 0) >= (ROLE_LEVELS[minRole] || 0);
  }

  // ── Routing ────────────────────────────────────────────────────────────────
  function currentScreen() {
    const h = location.hash.replace('#', '').trim();
    return h || 'dashboard';
  }

  function navigate(screen) {
    location.hash = screen;
  }

  window.addEventListener('hashchange', () => renderScreen(currentScreen()));

  // ── Nav ────────────────────────────────────────────────────────────────────
  function renderNav() {
    const screen = currentScreen();
    const items = [
      { id: 'dashboard', label: 'Dashboard', minRole: 'observer' },
      { id: 'explorer', label: 'Explorer', minRole: 'observer' },
      { id: 'station', label: 'My Station', minRole: 'agent' },
      { id: 'submit', label: 'Submit Results', minRole: 'agent' },
      { id: 'admin', label: 'Admin', minRole: 'admin' },
    ].filter((i) => canAccess(i.minRole));

    return `
      <header class="bg-zinc-900 border-b border-zinc-800 px-4 py-3">
        <div class="max-w-5xl mx-auto flex items-center justify-between gap-4 flex-wrap">
          <div class="flex items-center gap-3">
            <h1 class="text-base font-bold">Quick Count</h1>
            ${CURRENT_USER ? `<span class="text-xs text-zinc-500">${esc(CURRENT_USER.username)} · ${esc(ROLE)}</span>` : ''}
            ${CURRENT_USER?.staging ? '<span class="text-xs font-medium px-2 py-0.5 rounded bg-amber-500/20 text-amber-300">staging</span>' : ''}
          </div>
          <nav class="flex gap-1 flex-wrap">
            ${items.map((i) => `<button onclick="navigate('${i.id}')" class="nav-btn px-3 py-1.5 rounded text-sm font-medium ${screen === i.id ? 'bg-violet-600 text-white' : 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700'}">${esc(i.label)}</button>`).join('')}
          </nav>
        </div>
      </header>`;
  }

  function rerenderNav() {
    const navEl = document.getElementById('nav');
    if (navEl) navEl.innerHTML = renderNav();
  }

  // ── Screen dispatcher ──────────────────────────────────────────────────────
  async function renderScreen(name) {
    rerenderNav();
    const content = document.getElementById('content');
    if (!content) return;
    content.innerHTML = '<div class="flex justify-center py-12"><p class="text-zinc-500">Loading…</p></div>';
    try {
      switch (name) {
        case 'dashboard': await renderDashboard(content); break;
        case 'explorer': await renderExplorer(content); break;
        case 'station': canAccess('agent') ? await renderStation(content) : renderUnauthorized(content); break;
        case 'submit': canAccess('agent') ? await renderSubmit(content) : renderUnauthorized(content); break;
        case 'admin': canAccess('admin') ? await renderAdmin(content) : renderUnauthorized(content); break;
        default: await renderDashboard(content);
      }
    } catch (e) {
      content.innerHTML = `<div class="p-4 text-rose-400">Error: ${esc(e.message)}</div>`;
    }
  }

  function renderUnauthorized(el) {
    el.innerHTML = '<div class="p-6 text-zinc-400">You do not have permission to view this screen.</div>';
  }

  // ── Dashboard ──────────────────────────────────────────────────────────────
  const COLORS = ['bg-rose-500','bg-sky-500','bg-emerald-500','bg-amber-500','bg-violet-500','bg-pink-500','bg-teal-500'];

  async function renderDashboard(el) {
    const apiBase = canAccess('observer') ? '/api' : '/api/public';

    // Load elections list
    let electionsData;
    try {
      if (canAccess('observer') && CURRENT_USER) {
        electionsData = await apiFetch('/api/elections');
        ELECTIONS = electionsData.elections;
      } else {
        electionsData = await fetch('/api/public/elections').then((r) => r.json());
        ELECTIONS = electionsData.elections;
      }
    } catch {
      ELECTIONS = [];
    }

    if (!ELECTIONS.length) {
      el.innerHTML = '<div class="p-6 text-zinc-500">No elections found.</div>';
      return;
    }

    if (!CURRENT_ELECTION_ID) CURRENT_ELECTION_ID = ELECTIONS[0].id || ELECTIONS[0].eid;

    const elId = CURRENT_ELECTION_ID;
    let d;
    try {
      if (canAccess('observer') && CURRENT_USER) {
        d = await apiFetch(`/api/elections/${elId}/dashboard`);
      } else {
        const pub = await fetch(`/api/public/elections/${elId}`).then((r) => r.json());
        d = {
          election: pub.election,
          candidates: pub.candidates,
          tally: pub.tally,
          reporting: pub.reporting,
          stations: pub.stations,
          lastUpdated: pub.lastUpdated,
          regionalBreakdown: [],
        };
      }
    } catch (e) {
      el.innerHTML = `<div class="p-4 text-rose-400">Failed to load dashboard: ${esc(e.message)}</div>`;
      return;
    }

    const totalVotes = Object.values(d.tally || {}).reduce((s, n) => s + Number(n), 0) || 1;
    const elSelector = `<select id="el-select" class="px-3 py-1.5 rounded bg-zinc-800 border border-zinc-700 text-sm outline-none">
      ${ELECTIONS.map((e) => `<option value="${e.id || e.eid}" ${(e.id || e.eid) == elId ? 'selected' : ''}>${esc(e.name)}</option>`).join('')}
    </select>`;

    const tallyRows = (d.candidates || [])
      .map((c, i) => ({ c, i, votes: Number(d.tally[c.cid] || d.tally[c.id] || 0) }))
      .sort((a, b) => b.votes - a.votes)
      .map(({ c, i, votes }) => {
        const pct = Math.round((votes / totalVotes) * 100);
        return `<div class="mb-3">
          <div class="flex justify-between text-sm mb-1">
            <span>${esc(c.name)}</span>
            <span class="font-mono text-zinc-300">${fmt(votes)} <span class="text-zinc-500">(${pct}%)</span></span>
          </div>
          <div class="h-3 rounded bg-zinc-800 overflow-hidden">
            <div class="h-full ${COLORS[i % COLORS.length]}" style="width:${pct}%"></div>
          </div>
        </div>`;
      }).join('');

    const regionalRows = (d.regionalBreakdown || []).map((r) =>
      `<tr class="border-t border-zinc-800">
        <td class="py-2 pr-4">${esc(r.regionName)}</td>
        <td class="py-2 font-mono text-right">${r.reported} / ${r.total}</td>
      </tr>`
    ).join('');

    const stationRows = (d.stations || []).map((s) => {
      const votesCells = (d.candidates || []).map((c) => {
        const v = s.votes ? Number(s.votes[c.cid] || s.votes[c.id] || 0) : 0;
        return `<td class="py-2 px-2 text-right font-mono text-sm">${s.reported ? fmt(v) : '—'}</td>`;
      }).join('');
      return `<tr class="border-t border-zinc-800">
        <td class="py-2 pr-2 text-sm">${esc(s.name)}</td>
        <td class="py-2 px-2 text-sm">${s.regionName ? `<span class="text-zinc-500">${esc(s.regionName)}</span>` : ''}</td>
        ${votesCells}
        <td class="py-2 pl-2 text-right text-xs text-zinc-500 whitespace-nowrap">${s.reported ? timeAgo(s.at) : 'Awaiting'}</td>
      </tr>`;
    }).join('');

    const headCells = (d.candidates || []).map((c) =>
      `<th class="py-2 px-2 text-right font-medium text-zinc-400 text-sm">${esc(c.name)}</th>`
    ).join('');

    el.innerHTML = `
      <div class="max-w-5xl mx-auto p-4">
        <div class="flex items-center gap-3 mb-5 flex-wrap">
          ${elSelector}
          <span class="text-sm text-zinc-400">${d.reporting.reported} of ${d.reporting.total} stations reported</span>
          ${d.election?.status === 'closed' ? '<span class="text-xs px-2 py-0.5 rounded bg-zinc-700 text-zinc-400">Closed</span>' : ''}
        </div>

        <div class="mb-6">${tallyRows || '<p class="text-zinc-500 text-sm">No candidates.</p>'}</div>

        ${d.regionalBreakdown?.length ? `
        <h3 class="text-sm font-medium text-zinc-400 mb-2">By region</h3>
        <div class="overflow-x-auto mb-6">
          <table class="text-sm"><thead><tr>
            <th class="py-2 pr-4 text-left font-medium text-zinc-400">Region</th>
            <th class="py-2 text-right font-medium text-zinc-400">Reported / Total</th>
          </tr></thead><tbody>${regionalRows}</tbody></table>
        </div>` : ''}

        <h3 class="text-sm font-medium text-zinc-400 mb-2">Per station</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="text-left">
              <th class="py-2 pr-2 font-medium text-zinc-400">Station</th>
              <th class="py-2 px-2 font-medium text-zinc-400">Region</th>
              ${headCells}
              <th class="py-2 pl-2 text-right font-medium text-zinc-400">Updated</th>
            </tr></thead>
            <tbody>${stationRows}</tbody>
          </table>
        </div>

        <p class="mt-4 text-xs text-zinc-600">
          ${d.lastUpdated ? 'Last submission ' + timeAgo(d.lastUpdated) : 'No submissions yet'}
        </p>
      </div>`;

    document.getElementById('el-select')?.addEventListener('change', (e) => {
      CURRENT_ELECTION_ID = e.target.value;
      renderDashboard(el);
    });
  }

  // ── Explorer ───────────────────────────────────────────────────────────────
  let explorerPage = 1;
  let explorerFilter = {};

  async function renderExplorer(el) {
    el.innerHTML = `
      <div class="max-w-5xl mx-auto p-4" id="screen-explorer">
        <h2 class="text-lg font-semibold mb-4">Transaction Explorer</h2>
        <div class="flex gap-2 mb-4 flex-wrap">
          <select id="exp-election" class="px-3 py-1.5 rounded bg-zinc-800 border border-zinc-700 text-sm outline-none">
            <option value="">All elections</option>
            ${ELECTIONS.map((e) => `<option value="${e.id || e.eid}">${esc(e.name)}</option>`).join('')}
          </select>
          <input id="exp-txhash" placeholder="Filter by tx hash…" class="px-3 py-1.5 rounded bg-zinc-800 border border-zinc-700 text-sm outline-none w-48">
          <button id="exp-search" class="px-3 py-1.5 rounded bg-zinc-700 text-sm hover:bg-zinc-600">Search</button>
        </div>
        <div id="exp-results"><p class="text-zinc-500 text-sm">Loading…</p></div>
      </div>`;

    async function loadPage() {
      const expEl = document.getElementById('exp-results');
      if (!expEl) return;
      expEl.innerHTML = '<p class="text-zinc-500 text-sm">Loading…</p>';
      try {
        const params = new URLSearchParams({ page: explorerPage });
        if (explorerFilter.electionId) params.set('electionId', explorerFilter.electionId);
        if (explorerFilter.txHash) params.set('txHash', explorerFilter.txHash);
        const d = await apiFetch(`/api/explorer?${params}`);
        const totalPages = Math.ceil(d.total / d.pageSize) || 1;
        const rows = (d.submissions || []).map((s) => `
          <tr class="border-t border-zinc-800 hover:bg-zinc-900/50">
            <td class="py-2 px-2 font-mono text-xs text-zinc-400 max-w-xs truncate">${esc(s.txHash)}</td>
            <td class="py-2 px-2 text-sm">${esc(s.stationName)}</td>
            <td class="py-2 px-2 text-sm text-zinc-400">${esc(s.electionName)}</td>
            <td class="py-2 px-2 font-mono text-sm">${fmt(s.blockHeight)}</td>
            <td class="py-2 px-2 text-xs text-zinc-500 truncate max-w-xs">${esc(s.submitterPubkey)}</td>
            <td class="py-2 px-2 text-xs text-zinc-500 whitespace-nowrap">${timeAgo(s.chainTimestamp)}</td>
          </tr>`).join('');

        expEl.innerHTML = `
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead><tr class="text-left">
                <th class="py-2 px-2 font-medium text-zinc-400">Tx Hash</th>
                <th class="py-2 px-2 font-medium text-zinc-400">Station</th>
                <th class="py-2 px-2 font-medium text-zinc-400">Election</th>
                <th class="py-2 px-2 font-medium text-zinc-400">Block</th>
                <th class="py-2 px-2 font-medium text-zinc-400">Submitter</th>
                <th class="py-2 px-2 font-medium text-zinc-400">Time</th>
              </tr></thead>
              <tbody>${rows || '<tr><td colspan="6" class="py-4 text-center text-zinc-500">No results found</td></tr>'}</tbody>
            </table>
          </div>
          <div class="flex items-center gap-3 mt-4 text-sm text-zinc-400">
            <span>${d.total} total</span>
            ${explorerPage > 1 ? '<button id="exp-prev" class="px-3 py-1 rounded bg-zinc-800 hover:bg-zinc-700">Prev</button>' : ''}
            <span>Page ${explorerPage} of ${totalPages}</span>
            ${explorerPage < totalPages ? '<button id="exp-next" class="px-3 py-1 rounded bg-zinc-800 hover:bg-zinc-700">Next</button>' : ''}
          </div>`;
        document.getElementById('exp-prev')?.addEventListener('click', () => { explorerPage--; loadPage(); });
        document.getElementById('exp-next')?.addEventListener('click', () => { explorerPage++; loadPage(); });
      } catch (e) {
        expEl.innerHTML = `<p class="text-rose-400 text-sm">Failed: ${esc(e.message)}</p>`;
      }
    }

    document.getElementById('exp-search')?.addEventListener('click', () => {
      explorerPage = 1;
      explorerFilter = {
        electionId: document.getElementById('exp-election')?.value || '',
        txHash: document.getElementById('exp-txhash')?.value || '',
      };
      loadPage();
    });

    await loadPage();
  }

  // ── My Station ─────────────────────────────────────────────────────────────
  async function renderStation(el) {
    const d = await apiFetch('/api/station/mine').catch((e) => {
      if (e.status === 404) return null;
      throw e;
    });

    if (!d) {
      el.innerHTML = `
        <div class="max-w-lg mx-auto p-6">
          <h2 class="text-lg font-semibold mb-3">My Station</h2>
          <p class="text-zinc-400">You have not been assigned to a polling station yet. Contact an admin.</p>
        </div>`;
      return;
    }

    const { station, submitted, lastSubmission } = d;
    el.innerHTML = `
      <div class="max-w-lg mx-auto p-6">
        <h2 class="text-lg font-semibold mb-4">My Station</h2>
        <div class="rounded-xl bg-zinc-900 border border-zinc-800 p-5 mb-4">
          <p class="text-xl font-bold mb-1">${esc(station.name)}</p>
          <p class="text-sm text-zinc-400 mb-3">${esc(station.code)} · ${esc(station.regionName)}</p>
          ${station.totalRegisteredVoters ? `<p class="text-sm text-zinc-400">Registered voters: <span class="text-zinc-200 font-mono">${fmt(station.totalRegisteredVoters)}</span></p>` : ''}
          ${station.latitude ? `<p class="text-sm text-zinc-500 mt-1">Coordinates: ${station.latitude.toFixed(5)}, ${station.longitude.toFixed(5)}</p>` : ''}
          <p class="text-sm text-zinc-400 mt-2">Election: ${esc(station.electionName)}</p>
          <div class="mt-3">
            ${submitted
              ? `<span class="inline-block px-3 py-1 rounded bg-emerald-500/20 text-emerald-300 text-sm">Result submitted ${timeAgo(lastSubmission?.at)}</span>`
              : `<span class="inline-block px-3 py-1 rounded bg-amber-500/20 text-amber-300 text-sm">Result not yet submitted</span>`}
          </div>
        </div>
        ${submitted && lastSubmission ? `
        <div class="rounded-xl bg-zinc-900 border border-zinc-800 p-5">
          <p class="text-sm font-medium text-zinc-400 mb-2">Last submission</p>
          <p class="font-mono text-xs text-zinc-500 mb-2">${esc(lastSubmission.txHash)}</p>
          <div class="space-y-1">
            ${station.candidates.map((c) => `
              <div class="flex justify-between text-sm">
                <span>${esc(c.name)}</span>
                <span class="font-mono">${fmt((lastSubmission.votes || {})[c.id] || 0)}</span>
              </div>`).join('')}
          </div>
        </div>` : ''}
        <button onclick="navigate('submit')" class="mt-4 w-full py-2.5 rounded-lg bg-violet-600 hover:bg-violet-500 font-semibold text-sm">
          ${submitted ? 'Re-submit result' : 'Submit result'}
        </button>
      </div>`;
  }

  // ── Submit Results ─────────────────────────────────────────────────────────
  let submitStation = null;

  async function renderSubmit(el) {
    let assignment;
    try {
      assignment = await apiFetch('/api/station/mine');
    } catch (e) {
      if (e.status === 404) {
        el.innerHTML = '<div class="p-6 text-zinc-400">No station assigned. Contact an admin.</div>';
        return;
      }
      throw e;
    }

    submitStation = assignment.station;
    const { station } = assignment;

    let gpsOk = !station.gpsRequired;
    let gpsStatus = station.gpsRequired ? 'Checking GPS…' : '';
    let gpsCoords = null;

    el.innerHTML = `
      <div class="max-w-lg mx-auto p-6" id="submit-form">
        <h2 class="text-lg font-semibold mb-1">Submit Results</h2>
        <p class="text-sm text-zinc-400 mb-5">${esc(station.name)} · ${esc(station.electionName)}</p>

        ${station.gpsRequired ? `
        <div id="gps-section" class="rounded-lg bg-zinc-900 border border-zinc-800 p-4 mb-4">
          <p class="text-sm font-medium mb-2">GPS Verification</p>
          <p id="gps-status" class="text-sm text-zinc-400">${gpsStatus}</p>
          <button id="gps-check-btn" class="mt-2 px-4 py-1.5 rounded bg-zinc-700 hover:bg-zinc-600 text-sm">Check Location</button>
        </div>` : ''}

        <div class="mb-4">
          <p class="text-sm font-medium text-zinc-300 mb-3">Vote counts</p>
          <div class="space-y-2" id="vote-inputs">
            ${station.candidates.map((c) => `
              <div class="flex items-center gap-3">
                <label class="flex-1 text-sm text-zinc-300">${esc(c.name)}</label>
                <input type="number" min="0" data-cid="${c.id}" value="0"
                  class="vote-input w-28 px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-800 outline-none text-right font-mono">
              </div>`).join('')}
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-zinc-300 mb-2">Tally sheet photo (optional)</label>
          <input id="photo-input" type="file" accept="image/*" capture="environment"
            class="block text-sm text-zinc-400 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-zinc-800 file:text-zinc-300 hover:file:bg-zinc-700">
        </div>

        <button id="submit-btn" class="w-full py-3 rounded-lg bg-violet-600 hover:bg-violet-500 font-semibold disabled:opacity-50 disabled:cursor-not-allowed"
          ${station.gpsRequired ? 'disabled' : ''}>
          Submit result
        </button>
        <div id="submit-status" class="mt-3 text-sm text-zinc-400"></div>
      </div>`;

    if (station.gpsRequired) {
      document.getElementById('gps-check-btn')?.addEventListener('click', () => {
        const statusEl = document.getElementById('gps-status');
        statusEl.textContent = 'Requesting location…';
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            gpsCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            if (station.latitude && station.longitude) {
              const dist = haversine(gpsCoords.lat, gpsCoords.lng, station.latitude, station.longitude);
              const radius = station.gpsRadiusMeters || 500;
              if (dist <= radius) {
                gpsOk = true;
                statusEl.textContent = `Location verified (${Math.round(dist)}m from station)`;
                statusEl.className = 'text-sm text-emerald-400';
                document.getElementById('submit-btn').disabled = false;
              } else {
                gpsOk = false;
                statusEl.textContent = `Too far from station: ${Math.round(dist)}m (max ${radius}m)`;
                statusEl.className = 'text-sm text-rose-400';
              }
            } else {
              gpsOk = true;
              statusEl.textContent = 'Location captured';
              statusEl.className = 'text-sm text-emerald-400';
              document.getElementById('submit-btn').disabled = false;
            }
          },
          (err) => {
            statusEl.textContent = 'Location unavailable: ' + err.message;
            statusEl.className = 'text-sm text-amber-400';
          }
        );
      });
    }

    document.getElementById('submit-btn')?.addEventListener('click', async () => {
      const btn = document.getElementById('submit-btn');
      const statusEl = document.getElementById('submit-status');
      if (!gpsOk) { statusEl.textContent = 'GPS verification required.'; return; }

      const votes = {};
      document.querySelectorAll('.vote-input').forEach((i) => { votes[i.dataset.cid] = Number(i.value) || 0; });

      const fd = new FormData();
      fd.append('electionId', String(station.electionId));
      fd.append('stationId', String(station.id));
      fd.append('votes', JSON.stringify(votes));
      if (gpsCoords) { fd.append('gpsLat', String(gpsCoords.lat)); fd.append('gpsLng', String(gpsCoords.lng)); }
      const photo = document.getElementById('photo-input')?.files?.[0];
      if (photo) fd.append('photo', photo);

      btn.disabled = true;
      statusEl.textContent = 'Broadcasting transaction…';
      try {
        const result = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'x-usernode-token': TOKEN },
          body: fd,
        }).then((r) => r.json());
        if (result.error) throw new Error(result.error);

        statusEl.textContent = '';
        const confirmDiv = document.createElement('div');
        confirmDiv.className = 'mt-3 p-4 rounded-lg bg-emerald-500/10 border border-emerald-500/30';
        confirmDiv.innerHTML = `
          <p class="text-emerald-300 font-semibold mb-1">Result submitted</p>
          <p class="text-xs text-zinc-400 font-mono break-all">${esc(result.txHash)}</p>
          <p class="text-sm text-zinc-400 mt-1">${result.confirmed ? 'Confirmed on chain' : 'Pending confirmation'}</p>`;
        document.getElementById('submit-form').appendChild(confirmDiv);

        if (!result.confirmed) {
          const spinner = document.createElement('p');
          spinner.className = 'text-sm text-zinc-400 mt-2';
          spinner.textContent = 'Waiting for confirmation…';
          confirmDiv.appendChild(spinner);
          let attempts = 0;
          const poll = setInterval(async () => {
            attempts++;
            if (attempts > 30) { clearInterval(poll); spinner.textContent = 'Confirmation timed out.'; return; }
            try {
              const d = await apiFetch(`/api/explorer?txHash=${encodeURIComponent(result.txHash)}`);
              if (d.submissions?.length) {
                clearInterval(poll);
                spinner.textContent = 'Confirmed on chain at block ' + d.submissions[0].blockHeight;
                spinner.className = 'text-sm text-emerald-400 mt-2';
              }
            } catch {}
          }, 2000);
        }
      } catch (e) {
        statusEl.textContent = 'Failed: ' + e.message;
        btn.disabled = false;
      }
    });
  }

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000, toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  // ── App init ───────────────────────────────────────────────────────────────
  async function init() {
    const root = document.getElementById('root');
    root.innerHTML = '<div id="nav"></div><main id="content" class="min-h-screen"></main>';

    if (TOKEN) {
      try {
        CURRENT_USER = await apiFetch('/api/me');
        ROLE = CURRENT_USER.role || 'observer';
      } catch {
        CURRENT_USER = null;
        ROLE = 'observer';
      }
    }

    rerenderNav();
    await renderScreen(currentScreen());

    // Auto-refresh dashboard every 10s
    setInterval(() => {
      if (currentScreen() === 'dashboard') {
        const content = document.getElementById('content');
        if (content) renderDashboard(content).catch(() => {});
      }
    }, 10000);
  }

  init().catch((e) => {
    document.getElementById('root').innerHTML = `<div class="p-6 text-rose-400">App failed to start: ${esc(e.message)}</div>`;
  });
  </script>
