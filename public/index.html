<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = { sentinel: S, level: level, args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }), ts: Date.now(), url: location.href };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) window.parent.postMessage(payload, '*');
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason; var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
  })();
  </script>

  <title>Quick Count</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div id="app" class="min-h-screen flex flex-col">
  <!-- Top bar -->
  <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 flex items-center h-12 gap-6">
      <span class="font-bold text-white text-sm tracking-wide shrink-0">Quick Count</span>
      <nav id="top-nav" class="flex items-center gap-1 flex-1 overflow-x-auto"></nav>
      <div id="wallet-display" class="text-xs text-zinc-400 shrink-0 font-mono">Not connected</div>
    </div>
  </header>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
    <div id="content"><div class="text-zinc-500 text-sm">Loading…</div></div>
  </main>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let TOKEN = new URLSearchParams(location.search).get('token') || '';
let CURRENT_USER = null;
let ROLE = 'observer';
let ORG_IDS = [];
let IS_MEMBER_OF = [];
let _dashboardTimer = null;

const ROLE_ORDER = ['observer', 'org_staff', 'org_admin', 'platform_admin'];
function roleAtLeast(min) { return ROLE_ORDER.indexOf(ROLE) >= ROLE_ORDER.indexOf(min); }

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function abbrev(s, n) {
  if (!s) return '';
  s = String(s);
  return s.length <= (n || 14) ? s : s.slice(0, 6) + '…' + s.slice(-4);
}
function fmt(n) { return Number(n || 0).toLocaleString(); }
function timeAgo(iso) {
  if (!iso) return '';
  const secs = Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 1000));
  if (secs < 60) return secs + 's ago';
  const mins = Math.round(secs / 60);
  if (mins < 60) return mins + 'm ago';
  return Math.round(mins / 60) + 'h ago';
}

async function apiFetch(path, opts) {
  const headers = { 'x-usernode-token': TOKEN, ...(opts?.headers || {}) };
  if (opts && opts.body && !(opts.body instanceof FormData)) headers['Content-Type'] = 'application/json';
  const r = await fetch(path, { ...opts, headers });
  if (!r.ok) {
    const err = await r.json().catch(() => ({ error: r.status }));
    throw Object.assign(new Error(err.error || r.status), { status: r.status });
  }
  return r.json();
}

function setContent(html) { document.getElementById('content').innerHTML = html; }
function showError(msg) { setContent(`<div class="text-red-400 text-sm p-4 bg-red-950/30 rounded">${esc(msg)}</div>`); }

// ── Nav ────────────────────────────────────────────────────────────────────
function renderNav() {
  const screen = currentScreen();
  const nav = document.getElementById('top-nav');
  const items = [
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'elections', label: 'Elections' },
    { id: 'orgs', label: 'Organizations' },
    { id: 'evidence', label: 'Evidence' },
    { id: 'disputes', label: 'Disputes' },
    { id: 'submit', label: 'Submit', show: roleAtLeast('org_staff') },
    { id: 'admin', label: 'Admin', show: ROLE === 'platform_admin' },
  ];
  nav.innerHTML = items.filter(i => i.show !== false).map(i => {
    const active = screen === i.id || screen.startsWith(i.id + '/');
    return `<a href="#${i.id}" class="px-3 py-1 rounded text-xs font-medium whitespace-nowrap transition-colors
      ${active ? 'bg-indigo-600 text-white' : 'text-zinc-400 hover:text-white hover:bg-zinc-800'}">${esc(i.label)}</a>`;
  }).join('');
}

function updateWalletDisplay() {
  const el = document.getElementById('wallet-display');
  if (CURRENT_USER && CURRENT_USER.pubkey) {
    el.textContent = abbrev(CURRENT_USER.pubkey, 14);
    el.title = CURRENT_USER.pubkey;
  } else {
    el.textContent = 'Not connected';
  }
}

// ── Routing ────────────────────────────────────────────────────────────────
function currentScreen() {
  return (location.hash.replace('#', '').trim()) || 'dashboard';
}

function navigate(screen) { location.hash = screen; }

window.addEventListener('hashchange', () => {
  if (_dashboardTimer) { clearInterval(_dashboardTimer); _dashboardTimer = null; }
  renderScreen(currentScreen());
  renderNav();
});

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot() {
  if (TOKEN) {
    try {
      const me = await apiFetch('/api/me');
      CURRENT_USER = me;
      ROLE = me.role || 'observer';
      ORG_IDS = me.orgIds || [];
      IS_MEMBER_OF = me.isMemberOf || [];
    } catch {}
  }
  updateWalletDisplay();
  renderNav();
  renderScreen(currentScreen());
}

async function renderScreen(screen) {
  if (screen === 'dashboard') return renderDashboard();
  if (screen === 'elections') return renderElections();
  if (screen.startsWith('elections/')) return renderElectionDetail(screen.slice('elections/'.length));
  if (screen === 'orgs') return renderOrganizations();
  if (screen === 'evidence') return renderEvidence();
  if (screen === 'disputes') return renderDisputes();
  if (screen === 'submit') return renderSubmit();
  if (screen === 'admin') return renderAdmin();
  return renderDashboard();
}

// ── Dashboard ──────────────────────────────────────────────────────────────
async function renderDashboard() {
  setContent('<div class="text-zinc-500 text-sm animate-pulse">Loading dashboard…</div>');
  try {
    const endpoint = TOKEN ? '/api/elections' : '/api/public/elections';
    const data = await apiFetch(endpoint);
    const elections = data.elections || [];

    if (!elections.length) {
      setContent('<p class="text-zinc-500 text-sm">No elections available yet.</p>');
      return;
    }

    const elCards = await Promise.all(elections.slice(0, 6).map(async (el) => {
      let dashData = null;
      try {
        const path = TOKEN ? `/api/elections/${el.txHash}/dashboard` : `/api/public/elections/${el.txHash}`;
        dashData = await apiFetch(path);
      } catch {}
      const rep = dashData?.reporting || { reported: 0, total: (el.stations || []).length };
      const tally = dashData?.tally || {};
      const candidates = dashData?.election?.candidates || el.candidates || [];
      const topCands = candidates.slice(0, 5).map(c => ({
        name: c.name, votes: tally[c.txHash] || 0,
      })).sort((a, b) => b.votes - a.votes);
      return `
        <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 cursor-pointer hover:border-zinc-600 transition-colors"
             onclick="navigate('elections/${esc(el.txHash)}')">
          <div class="flex items-start justify-between gap-2 mb-3">
            <div>
              <h3 class="font-semibold text-sm text-white">${esc(el.name)}</h3>
              <p class="text-xs text-zinc-500 mt-0.5">${esc(el.org?.name || '')}</p>
            </div>
            <span class="text-xs px-2 py-0.5 rounded-full shrink-0 ${el.status === 'open' ? 'bg-green-900/50 text-green-400' : 'bg-zinc-800 text-zinc-400'}">${esc(el.status)}</span>
          </div>
          <p class="text-xs text-zinc-500 mb-3">${rep.reported} / ${rep.total} stations reported</p>
          <div class="space-y-1">
            ${topCands.map(c => `
              <div class="flex items-center gap-2">
                <span class="text-xs text-zinc-400 w-20 truncate">${esc(c.name)}</span>
                <div class="flex-1 bg-zinc-800 rounded-full h-1.5">
                  <div class="bg-indigo-500 h-1.5 rounded-full" style="width:${topCands[0]?.votes ? Math.round(c.votes / topCands[0].votes * 100) : 0}%"></div>
                </div>
                <span class="text-xs text-zinc-300 w-12 text-right">${fmt(c.votes)}</span>
              </div>`).join('')}
          </div>
        </div>`;
    }));

    setContent(`
      <div>
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-base font-semibold">Dashboard</h2>
          <span class="text-xs text-zinc-500">Auto-refreshes every 10s</span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          ${elCards.join('')}
        </div>
      </div>`);
  } catch (e) { showError('Dashboard failed to load: ' + e.message); }

  _dashboardTimer = setInterval(() => {
    if (currentScreen() === 'dashboard') renderDashboard();
    else { clearInterval(_dashboardTimer); _dashboardTimer = null; }
  }, 10000);
}

// ── Elections ──────────────────────────────────────────────────────────────
const VIS_LABELS = { public: 'Public', private: 'Private', public_after_close: 'After close', hidden: 'Hidden' };

async function renderElections() {
  const div = document.createElement('div');
  div.id = 'screen-elections';
  div.innerHTML = '<div class="text-zinc-500 text-sm animate-pulse">Loading elections…</div>';
  document.getElementById('content').replaceChildren(div);
  try {
    const endpoint = TOKEN ? '/api/elections' : '/api/public/elections';
    const { elections } = await apiFetch(endpoint);
    div.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold">Elections</h2>
        ${roleAtLeast('org_admin') ? `<button onclick="showCreateElectionModal()" class="text-xs px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded">+ New Election</button>` : ''}
      </div>
      <div id="elections-list" class="space-y-2">
        ${(elections || []).map(el => `
          <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 flex items-center gap-4 cursor-pointer hover:border-zinc-600"
               onclick="navigate('elections/${esc(el.txHash)}')">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                <span class="font-medium text-sm text-white truncate">${esc(el.name)}</span>
                <span class="text-xs px-1.5 py-0.5 rounded bg-zinc-800 text-zinc-400 shrink-0">${esc(VIS_LABELS[el.visibility] || el.visibility)}</span>
              </div>
              <p class="text-xs text-zinc-500">${esc(el.org?.name || '')} · ${(el.candidates || []).length} candidates · ${(el.stations || []).length} stations</p>
            </div>
            <span class="text-xs px-2 py-0.5 rounded-full shrink-0 ${el.status === 'open' ? 'bg-green-900/50 text-green-400' : 'bg-zinc-800 text-zinc-400'}">${esc(el.status)}</span>
          </div>`).join('') || '<p class="text-zinc-500 text-sm">No elections visible.</p>'}
      </div>`;
  } catch (e) { div.innerHTML = `<p class="text-red-400 text-sm">${esc(e.message)}</p>`; }
}

async function renderElectionDetail(txHash) {
  setContent('<div class="text-zinc-500 text-sm animate-pulse">Loading election…</div>');
  try {
    const endpoint = TOKEN ? `/api/elections/${txHash}/dashboard` : `/api/public/elections/${txHash}`;
    const data = await apiFetch(endpoint);
    const el = data.election;
    const tally = data.tally || {};
    const rep = data.reporting || {};
    const details = data.stationDetails || [];
    const candidates = el.candidates || [];
    const maxVotes = Math.max(...candidates.map(c => tally[c.txHash] || 0), 1);

    setContent(`
      <div>
        <div class="flex items-center gap-2 mb-1">
          <button onclick="navigate('elections')" class="text-xs text-zinc-500 hover:text-zinc-300">← Elections</button>
        </div>
        <div class="flex items-start justify-between gap-4 mb-6">
          <div>
            <h2 class="text-lg font-semibold text-white">${esc(el.name)}</h2>
            <p class="text-xs text-zinc-500 mt-1">${esc(el.org?.name || '')} · ${esc(VIS_LABELS[el.visibility] || el.visibility)} · ${esc(el.aggregation)}</p>
          </div>
          <div class="text-right shrink-0">
            <span class="text-xs px-2 py-1 rounded-full ${el.status === 'open' ? 'bg-green-900/50 text-green-400' : 'bg-zinc-800 text-zinc-400'}">${esc(el.status)}</span>
            <p class="text-xs text-zinc-500 mt-1">${rep.reported || 0} / ${rep.total || 0} stations reported</p>
          </div>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 mb-6">
          <h3 class="text-sm font-medium mb-3">Candidate Tallies</h3>
          <div class="space-y-2">
            ${candidates.length ? candidates.map(c => `
              <div class="flex items-center gap-3">
                <span class="text-sm text-zinc-300 w-32 truncate">${esc(c.name)}</span>
                <div class="flex-1 bg-zinc-800 rounded-full h-2">
                  <div class="bg-indigo-500 h-2 rounded-full transition-all" style="width:${Math.round((tally[c.txHash] || 0) / maxVotes * 100)}%"></div>
                </div>
                <span class="text-sm text-white w-16 text-right font-mono">${fmt(tally[c.txHash] || 0)}</span>
              </div>`).join('') : '<p class="text-zinc-500 text-xs">No candidates yet.</p>'}
          </div>
        </div>

        ${details.length ? `
        <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 mb-6 overflow-x-auto">
          <h3 class="text-sm font-medium mb-3">Station Breakdown</h3>
          <table class="w-full text-xs">
            <thead><tr class="text-zinc-500 border-b border-zinc-800">
              <th class="text-left py-1 pr-3">Station</th>
              <th class="text-left py-1 pr-3">Region</th>
              <th class="text-left py-1 pr-3">Reporter</th>
              ${candidates.map(c => `<th class="text-right py-1 px-2">${esc(c.name)}</th>`).join('')}
              <th class="text-left py-1 pl-3">Status</th>
            </tr></thead>
            <tbody>
              ${details.map(s => `
                <tr class="border-b border-zinc-800/50 hover:bg-zinc-800/30">
                  <td class="py-1.5 pr-3 text-zinc-300">${esc(s.name)}</td>
                  <td class="py-1.5 pr-3 text-zinc-500">${esc(s.region)}</td>
                  <td class="py-1.5 pr-3 text-zinc-500 font-mono">${s.submitterPubkey ? abbrev(s.submitterPubkey) : '—'}</td>
                  ${candidates.map(c => `<td class="py-1.5 px-2 text-right text-zinc-300">${s.votes ? fmt(s.votes[c.txHash] || 0) : '—'}</td>`).join('')}
                  <td class="py-1.5 pl-3">
                    ${s.noConsensus ? '<span class="text-yellow-400">no consensus</span>'
                      : !s.reported ? '<span class="text-zinc-500">pending</span>'
                      : s.status === 'disputed' ? '<span class="text-red-400">disputed</span>'
                      : s.status === 'revised' ? '<span class="text-blue-400">revised</span>'
                      : '<span class="text-green-400">ok</span>'}
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>` : ''}

        ${roleAtLeast('org_staff') ? `
          <div class="flex gap-2 mt-4">
            <button onclick="navigate('submit')" class="text-xs px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded">Submit Results</button>
          </div>` : ''}
      </div>`);
  } catch (e) { showError('Election not found or access denied: ' + e.message); }
}

async function showCreateElectionModal() {
  const html = `
    <div id="modal-bg" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" onclick="if(event.target.id==='modal-bg')closeModal()">
      <div class="bg-zinc-900 border border-zinc-700 rounded-lg p-6 w-full max-w-md mx-4">
        <h3 class="text-sm font-semibold mb-4">Create Election</h3>
        <div class="space-y-3">
          <div>
            <label class="text-xs text-zinc-400 block mb-1">Org Tx Hash</label>
            <input id="new-el-org" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm" placeholder="seed-org-1">
          </div>
          <div>
            <label class="text-xs text-zinc-400 block mb-1">Name</label>
            <input id="new-el-name" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm" placeholder="My Election">
          </div>
          <div>
            <label class="text-xs text-zinc-400 block mb-1">Visibility</label>
            <select id="new-el-vis" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm">
              <option value="public">Public</option><option value="private">Private</option>
              <option value="public_after_close">Public after close</option><option value="hidden">Hidden</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-zinc-400 block mb-1">Aggregation</label>
            <select id="new-el-agg" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm">
              <option value="first_report">First Report</option><option value="median">Median</option>
              <option value="average">Average</option><option value="consensus">Consensus</option>
              <option value="manual_review">Manual Review</option>
            </select>
          </div>
        </div>
        <p id="modal-err" class="text-red-400 text-xs mt-2 hidden"></p>
        <div class="flex gap-2 mt-4">
          <button onclick="submitCreateElection()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-sm rounded py-2">Create</button>
          <button onclick="closeModal()" class="px-4 bg-zinc-800 hover:bg-zinc-700 text-sm rounded py-2">Cancel</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeModal() { document.getElementById('modal-bg')?.remove(); }

async function submitCreateElection() {
  const org_id = document.getElementById('new-el-org').value.trim();
  const name = document.getElementById('new-el-name').value.trim();
  const visibility = document.getElementById('new-el-vis').value;
  const aggregation = document.getElementById('new-el-agg').value;
  const errEl = document.getElementById('modal-err');
  if (!org_id || !name) { errEl.textContent = 'Org ID and name required'; errEl.classList.remove('hidden'); return; }
  try {
    await apiFetch('/api/elections', { method: 'POST', body: JSON.stringify({ org_id, name, visibility, aggregation }) });
    closeModal();
    navigate('elections');
  } catch (e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
}

// ── Organizations ──────────────────────────────────────────────────────────
async function renderOrganizations() {
  const div = document.createElement('div');
  div.id = 'screen-orgs';
  div.innerHTML = '<div class="text-zinc-500 text-sm animate-pulse">Loading organizations…</div>';
  document.getElementById('content').replaceChildren(div);

  try {
    const endpoint = TOKEN ? '/api/orgs' : '/api/public/orgs';
    const { orgs } = await apiFetch(endpoint);

    const statusBadge = (s) => s === 'registered'
      ? '<span class="text-xs px-2 py-0.5 rounded-full bg-green-900/50 text-green-400">registered</span>'
      : s === 'pending'
        ? '<span class="text-xs px-2 py-0.5 rounded-full bg-yellow-900/50 text-yellow-400">pending</span>'
        : '<span class="text-xs px-2 py-0.5 rounded-full bg-zinc-800 text-zinc-400">' + esc(s) + '</span>';

    div.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold">Organizations</h2>
      </div>
      <div class="space-y-2 mb-6">
        ${(orgs || []).map(o => `
          <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 flex items-center gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1">
                <span class="font-medium text-sm text-white">${esc(o.name)}</span>
                ${statusBadge(o.status)}
                ${o.feeConfirmed ? '<span class="text-xs text-green-400">✓ fee paid</span>' : ''}
              </div>
              <p class="text-xs text-zinc-500 font-mono">${abbrev(o.txHash, 20)}</p>
            </div>
          </div>`).join('') || '<p class="text-zinc-500 text-sm">No organizations yet.</p>'}
      </div>

      <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5">
        <h3 class="text-sm font-medium mb-3">Register a New Organization</h3>
        <p class="text-xs text-zinc-500 mb-4">Requires sending 1,000 tokens to the platform wallet. Your wallet address becomes the org owner.</p>
        <div class="space-y-3">
          <div>
            <label class="text-xs text-zinc-400 block mb-1">Organization Name</label>
            <input id="reg-org-name" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm" placeholder="My Commission">
          </div>
          <div>
            <label class="text-xs text-zinc-400 block mb-1">Description (optional)</label>
            <input id="reg-org-desc" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm" placeholder="…">
          </div>
        </div>
        <p id="reg-org-err" class="text-red-400 text-xs mt-2 hidden"></p>
        <p id="reg-org-ok" class="text-green-400 text-xs mt-2 hidden">Registration submitted — pending indexer confirmation.</p>
        <button onclick="submitRegisterOrg()" class="mt-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm rounded">
          Register (costs 1,000 tokens)
        </button>
      </div>`;
  } catch (e) { div.innerHTML = `<p class="text-red-400 text-sm">${esc(e.message)}</p>`; }
}

async function submitRegisterOrg() {
  const name = document.getElementById('reg-org-name').value.trim();
  const desc = document.getElementById('reg-org-desc').value.trim();
  const errEl = document.getElementById('reg-org-err');
  const okEl = document.getElementById('reg-org-ok');
  errEl.classList.add('hidden');
  okEl.classList.add('hidden');
  if (!name) { errEl.textContent = 'Name required'; errEl.classList.remove('hidden'); return; }
  try {
    const appPubkey = document.querySelector('meta[name="app-pubkey"]')?.content || '';
    const memoObj = { app: 'quickcount', type: 'org_register', name, desc };
    if (typeof usernode !== 'undefined' && usernode.sendTransaction) {
      await usernode.sendTransaction({ to: appPubkey, amount: 1000, memo: JSON.stringify(memoObj) });
      okEl.classList.remove('hidden');
    } else {
      errEl.textContent = 'Wallet bridge not available. Connect via the Usernode platform.';
      errEl.classList.remove('hidden');
    }
  } catch (e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
}

// ── Evidence ───────────────────────────────────────────────────────────────
async function renderEvidence() {
  setContent('<div id="screen-evidence" class="text-zinc-500 text-sm animate-pulse">Loading evidence…</div>');
  try {
    const election = new URLSearchParams(location.hash.split('?')[1] || '').get('election') || '';
    const url = '/api/evidence' + (election ? '?election=' + encodeURIComponent(election) : '');
    const { records } = await apiFetch(url);

    const IPFS_BADGES = {
      verified: 'bg-green-900/50 text-green-400',
      invalid: 'bg-red-900/50 text-red-400',
      unverified: 'bg-zinc-800 text-zinc-400',
      pending: 'bg-yellow-900/50 text-yellow-400',
    };

    document.getElementById('content').innerHTML = `
      <div id="screen-evidence">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-base font-semibold">Evidence</h2>
        </div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden mb-6">
          <table class="w-full text-xs">
            <thead><tr class="text-zinc-500 border-b border-zinc-800 bg-zinc-900/50">
              <th class="text-left py-2 px-4">Hash</th>
              <th class="text-left py-2 px-4">IPFS Status</th>
              <th class="text-left py-2 px-4">Uploaded by</th>
              <th class="text-left py-2 px-4">Date</th>
            </tr></thead>
            <tbody>
              ${(records || []).map(r => `
                <tr class="border-b border-zinc-800/50 hover:bg-zinc-800/30">
                  <td class="py-2 px-4 font-mono text-zinc-300">${esc(r.sha256.slice(0, 12))}…</td>
                  <td class="py-2 px-4"><span class="px-2 py-0.5 rounded-full text-xs ${IPFS_BADGES[r.ipfsStatus] || 'bg-zinc-800 text-zinc-400'}">${esc(r.ipfsStatus)}</span></td>
                  <td class="py-2 px-4 font-mono text-zinc-500">${abbrev(r.uploaderPubkey)}</td>
                  <td class="py-2 px-4 text-zinc-500">${timeAgo(r.createdAt)}</td>
                </tr>`).join('') || '<tr><td colspan="4" class="py-4 px-4 text-zinc-500">No evidence records.</td></tr>'}
            </tbody>
          </table>
        </div>

        ${roleAtLeast('org_staff') ? `
          <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5">
            <h3 class="text-sm font-medium mb-3">Upload Evidence</h3>
            <div class="space-y-3">
              <div>
                <label class="text-xs text-zinc-400 block mb-1">Submission Tx Hash</label>
                <input id="ev-submission" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm" placeholder="seed-sub-1">
              </div>
              <div>
                <label class="text-xs text-zinc-400 block mb-1">File (max 10 MB)</label>
                <input id="ev-file" type="file" class="w-full text-sm text-zinc-400">
              </div>
              <p id="ev-hash-display" class="text-xs text-zinc-500 font-mono hidden"></p>
            </div>
            <p id="ev-err" class="text-red-400 text-xs mt-2 hidden"></p>
            <p id="ev-ok" class="text-green-400 text-xs mt-2 hidden">Evidence uploaded successfully.</p>
            <button onclick="submitEvidence()" class="mt-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm rounded">Upload</button>
          </div>` : ''}
      </div>`;

    const fileInput = document.getElementById('ev-file');
    if (fileInput) {
      fileInput.addEventListener('change', async () => {
        const f = fileInput.files[0];
        if (!f) return;
        const buf = await f.arrayBuffer();
        const hashBuf = await crypto.subtle.digest('SHA-256', buf);
        const hex = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
        const el = document.getElementById('ev-hash-display');
        el.textContent = 'SHA-256: ' + hex;
        el.classList.remove('hidden');
        el.dataset.hash = hex;
      });
    }
  } catch (e) { showError(e.message); }
}

async function submitEvidence() {
  const submission_id = document.getElementById('ev-submission').value.trim();
  const file = document.getElementById('ev-file').files[0];
  const errEl = document.getElementById('ev-err');
  const okEl = document.getElementById('ev-ok');
  errEl.classList.add('hidden'); okEl.classList.add('hidden');
  if (!submission_id) { errEl.textContent = 'Submission Tx Hash required'; errEl.classList.remove('hidden'); return; }
  if (!file) { errEl.textContent = 'File required'; errEl.classList.remove('hidden'); return; }
  try {
    const fd = new FormData();
    fd.append('submission_id', submission_id);
    fd.append('file', file);
    await apiFetch('/api/evidence', { method: 'POST', body: fd });
    okEl.classList.remove('hidden');
    document.getElementById('ev-submission').value = '';
    document.getElementById('ev-file').value = '';
  } catch (e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
}

// ── Disputes ───────────────────────────────────────────────────────────────

  try {
    const { disputes } = await apiFetch('/api/disputes');
    setContent(`
      <div>
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-base font-semibold">Disputes</h2>
        </div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden mb-6">
          <table class="w-full text-xs">
            <thead><tr class="text-zinc-500 border-b border-zinc-800 bg-zinc-900/50">
              <th class="text-left py-2 px-4">Submission</th>
              <th class="text-left py-2 px-4">Reason</th>
              <th class="text-left py-2 px-4">Filer</th>
              <th class="text-left py-2 px-4">Status</th>
              <th class="text-left py-2 px-4">Date</th>
              ${roleAtLeast('org_admin') ? '<th class="py-2 px-4"></th>' : ''}
            </tr></thead>
            <tbody>
              ${(disputes || []).map(d => `
                <tr class="border-b border-zinc-800/50 hover:bg-zinc-800/30">
                  <td class="py-2 px-4 font-mono text-zinc-300">${abbrev(d.txHash)}</td>
                  <td class="py-2 px-4 text-zinc-400 max-w-xs truncate">${esc(d.reason)}</td>
                  <td class="py-2 px-4 font-mono text-zinc-500">${abbrev(d.filerPubkey)}</td>
                  <td class="py-2 px-4">
                    <span class="px-2 py-0.5 rounded-full ${d.status === 'open' ? 'bg-red-900/50 text-red-400' : 'bg-zinc-800 text-zinc-400'}">${esc(d.status)}</span>
                  </td>
                  <td class="py-2 px-4 text-zinc-500">${timeAgo(d.createdAt)}</td>
                  ${roleAtLeast('org_admin') ? `<td class="py-2 px-4">${d.status === 'open' ? `<button onclick="resolveDispute('${esc(d.txHash)}')" class="text-xs px-2 py-1 bg-zinc-700 hover:bg-zinc-600 rounded">Resolve</button>` : ''}</td>` : ''}
                </tr>`).join('') || '<tr><td colspan="6" class="py-4 px-4 text-zinc-500">No disputes.</td></tr>'}
            </tbody>
          </table>
        </div>

        ${roleAtLeast('org_staff') ? `
          <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5">
            <h3 class="text-sm font-medium mb-3">File a Dispute</h3>
            <div class="space-y-3">
              <div>
                <label class="text-xs text-zinc-400 block mb-1">Submission Tx Hash</label>
                <input id="disp-sub" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm">
              </div>
              <div>
                <label class="text-xs text-zinc-400 block mb-1">Reason (max 280 chars)</label>
                <textarea id="disp-reason" rows="3" maxlength="280" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm resize-none"></textarea>
              </div>
            </div>
            <p id="disp-err" class="text-red-400 text-xs mt-2 hidden"></p>
            <p id="disp-ok" class="text-green-400 text-xs mt-2 hidden">Dispute filed.</p>
            <button onclick="submitDispute()" class="mt-4 px-4 py-2 bg-red-700 hover:bg-red-600 text-white text-sm rounded">File Dispute</button>
          </div>` : ''}
      </div>`);
  } catch (e) { showError(e.message); }
}

async function submitDispute() {
  const submission_id = document.getElementById('disp-sub').value.trim();
  const reason = document.getElementById('disp-reason').value.trim();
  const errEl = document.getElementById('disp-err');
  const okEl = document.getElementById('disp-ok');
  errEl.classList.add('hidden'); okEl.classList.add('hidden');
  if (!submission_id || !reason) { errEl.textContent = 'All fields required'; errEl.classList.remove('hidden'); return; }
  try {
    await apiFetch('/api/disputes', { method: 'POST', body: JSON.stringify({ submission_id, reason }) });
    okEl.classList.remove('hidden');
    document.getElementById('disp-sub').value = '';
    document.getElementById('disp-reason').value = '';
  } catch (e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
}

async function resolveDispute(txHash) {
  const notes = prompt('Resolution notes:');
  if (notes === null) return;
  try {
    await apiFetch(`/api/disputes/${encodeURIComponent(txHash)}/resolve`, { method: 'POST', body: JSON.stringify({ notes }) });
    renderDisputes();
  } catch (e) { alert('Error: ' + e.message); }
}

// ── Submit ─────────────────────────────────────────────────────────────────
async function renderSubmit() {
  setContent('<div class="text-zinc-500 text-sm animate-pulse">Loading submit form…</div>');
  try {
    if (!TOKEN) { setContent('<p class="text-zinc-400 text-sm">Login required to submit results.</p>'); return; }
    const { elections } = await apiFetch('/api/elections');
    const openElections = (elections || []).filter(e => e.status === 'open');

    setContent(`
      <div>
        <h2 class="text-base font-semibold mb-4">Submit Results</h2>
        <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5">
          <div class="space-y-4">
            <div>
              <label class="text-xs text-zinc-400 block mb-1">Election</label>
              <select id="sub-election" onchange="loadStationsForSubmit()" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm">
                <option value="">— select —</option>
                ${openElections.map(e => `<option value="${esc(e.txHash)}">${esc(e.name)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="text-xs text-zinc-400 block mb-1">Station</label>
              <select id="sub-station" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm">
                <option value="">— select election first —</option>
              </select>
            </div>
            <div id="vote-inputs"></div>
            <div>
              <label class="text-xs text-zinc-400 block mb-1">Photo (optional)</label>
              <input id="sub-photo" type="file" accept="image/*" class="text-sm text-zinc-400">
            </div>
            <div>
              <label class="text-xs text-zinc-400 block mb-1">Revising previous submission? (paste original tx hash)</label>
              <input id="sub-ref" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm" placeholder="Leave blank for new submission">
            </div>
          </div>
          <p id="sub-err" class="text-red-400 text-xs mt-3 hidden"></p>
          <p id="sub-ok" class="text-green-400 text-xs mt-3 hidden"></p>
          <button onclick="submitResults()" class="mt-4 px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm rounded font-medium">Submit</button>
        </div>
      </div>`);
  } catch (e) { showError(e.message); }
}

async function loadStationsForSubmit() {
  const elTxHash = document.getElementById('sub-election').value;
  const stationSel = document.getElementById('sub-station');
  const voteInputs = document.getElementById('vote-inputs');
  if (!elTxHash) { stationSel.innerHTML = '<option>— select election first —</option>'; voteInputs.innerHTML = ''; return; }
  try {
    const [{ stations }, { election }] = await Promise.all([
      apiFetch(`/api/elections/${elTxHash}/stations`),
      apiFetch(`/api/elections/${elTxHash}`),
    ]);
    stationSel.innerHTML = '<option value="">— select —</option>' +
      (stations || []).map(s => `<option value="${esc(s.txHash)}">${esc(s.name)}${s.region ? ' (' + esc(s.region) + ')' : ''}</option>`).join('');
    const cands = election?.candidates || [];
    voteInputs.innerHTML = cands.length ? `
      <div>
        <label class="text-xs text-zinc-400 block mb-2">Vote Counts</label>
        <div class="space-y-2">
          ${cands.map(c => `
            <div class="flex items-center gap-3">
              <span class="text-sm text-zinc-300 w-28 truncate">${esc(c.name)}</span>
              <input type="number" min="0" id="vote-${esc(c.txHash)}" data-cand="${esc(c.txHash)}"
                     class="w-32 bg-zinc-800 border border-zinc-700 rounded px-3 py-1.5 text-sm" placeholder="0">
            </div>`).join('')}
        </div>
      </div>` : '<p class="text-zinc-500 text-xs">No candidates for this election.</p>';
    stationSel.dataset.candidates = JSON.stringify(cands.map(c => c.txHash));
  } catch (e) { stationSel.innerHTML = '<option>Error loading stations</option>'; }
}

async function submitResults() {
  const election_id = document.getElementById('sub-election').value;
  const station_id = document.getElementById('sub-station').value;
  const ref_tx_id = document.getElementById('sub-ref').value.trim();
  const errEl = document.getElementById('sub-err');
  const okEl = document.getElementById('sub-ok');
  errEl.classList.add('hidden'); okEl.classList.add('hidden');
  if (!election_id || !station_id) { errEl.textContent = 'Select election and station'; errEl.classList.remove('hidden'); return; }

  const candIds = JSON.parse(document.getElementById('sub-station').dataset.candidates || '[]');
  const votes = {};
  for (const cid of candIds) {
    const v = document.getElementById('vote-' + cid);
    if (v) votes[cid] = parseInt(v.value) || 0;
  }

  const fd = new FormData();
  fd.append('election_id', election_id);
  fd.append('station_id', station_id);
  fd.append('votes', JSON.stringify(votes));
  if (ref_tx_id) fd.append('ref_tx_id', ref_tx_id);
  const photo = document.getElementById('sub-photo').files[0];
  if (photo) fd.append('photo', photo);

  try {
    const { txHash } = await apiFetch('/api/submit', { method: 'POST', body: fd });
    okEl.textContent = 'Submitted! Tx: ' + txHash;
    okEl.classList.remove('hidden');
  } catch (e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
}

// ── Admin ──────────────────────────────────────────────────────────────────
async function renderAdmin() {
  if (ROLE !== 'platform_admin') { setContent('<p class="text-zinc-400 text-sm">Access denied.</p>'); return; }
  setContent('<div class="text-zinc-500 text-sm animate-pulse">Loading admin…</div>');
  try {
    const [{ orgs }, { state }] = await Promise.all([
      apiFetch('/api/admin/orgs'),
      apiFetch('/api/admin/indexer'),
    ]);

    setContent(`
      <div>
        <h2 class="text-base font-semibold mb-4">Platform Admin</h2>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5">
            <h3 class="text-sm font-medium mb-3">Org Verification Queue</h3>
            <div class="space-y-2">
              ${(orgs || []).filter(o => o.status === 'pending').map(o => `
                <div class="flex items-center gap-3 p-3 bg-zinc-800/50 rounded">
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-white">${esc(o.name)}</p>
                    <p class="text-xs text-zinc-500 font-mono truncate">${abbrev(o.txHash, 20)}</p>
                    <p class="text-xs text-zinc-500">Owner: ${abbrev(o.ownerPubkey)}</p>
                    ${o.feeConfirmed ? '<span class="text-xs text-green-400">✓ fee confirmed</span>' : '<span class="text-xs text-yellow-400">⚠ fee not confirmed</span>'}
                  </div>
                  <div class="flex flex-col gap-1">
                    <button onclick="adminApproveOrg('${esc(o.txHash)}')" class="text-xs px-3 py-1 bg-green-700 hover:bg-green-600 text-white rounded">Approve</button>
                    <button onclick="adminRejectOrg('${esc(o.txHash)}')" class="text-xs px-3 py-1 bg-zinc-700 hover:bg-zinc-600 text-white rounded">Reject</button>
                  </div>
                </div>`).join('') || '<p class="text-zinc-500 text-xs">No pending orgs.</p>'}
            </div>

            <h3 class="text-sm font-medium mt-4 mb-2">All Orgs</h3>
            <div class="space-y-1">
              ${(orgs || []).map(o => `
                <div class="flex items-center gap-2 text-xs px-2 py-1.5 bg-zinc-800/30 rounded">
                  <span class="flex-1 text-zinc-300 truncate">${esc(o.name)}</span>
                  <span class="px-1.5 py-0.5 rounded-full text-xs ${o.status === 'registered' ? 'bg-green-900/50 text-green-400' : o.status === 'pending' ? 'bg-yellow-900/50 text-yellow-400' : 'bg-zinc-800 text-zinc-400'}">${esc(o.status)}</span>
                </div>`).join('')}
            </div>
          </div>

          <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5">
            <h3 class="text-sm font-medium mb-3">Chain Sync Health</h3>
            ${state ? `
              <div class="space-y-2 text-sm mb-4">
                <div class="flex justify-between"><span class="text-zinc-500">Last block</span><span class="font-mono text-zinc-300">${fmt(state.lastIndexedBlock)}</span></div>
                <div class="flex justify-between"><span class="text-zinc-500">Last indexed</span><span class="text-zinc-300">${timeAgo(state.lastIndexedAt)}</span></div>
              </div>` : '<p class="text-zinc-500 text-xs mb-4">No state yet.</p>'}
            <button onclick="adminReindex()" class="text-xs px-3 py-1.5 bg-zinc-700 hover:bg-zinc-600 text-white rounded">Re-index from block 0</button>
            <p id="reindex-ok" class="text-green-400 text-xs mt-2 hidden">Re-index started.</p>
          </div>
        </div>
      </div>`);
  } catch (e) { showError(e.message); }
}

async function adminApproveOrg(txHash) {
  try { await apiFetch(`/api/admin/orgs/${encodeURIComponent(txHash)}/approve`, { method: 'POST' }); renderAdmin(); }
  catch (e) { alert('Error: ' + e.message); }
}
async function adminRejectOrg(txHash) {
  try { await apiFetch(`/api/admin/orgs/${encodeURIComponent(txHash)}/reject`, { method: 'POST' }); renderAdmin(); }
  catch (e) { alert('Error: ' + e.message); }
}
async function adminReindex() {
  try {
    await apiFetch('/api/admin/reindex', { method: 'POST' });
    document.getElementById('reindex-ok').classList.remove('hidden');
  } catch (e) { alert('Error: ' + e.message); }
}

boot().catch(console.error);
