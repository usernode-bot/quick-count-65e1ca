  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(e); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = { sentinel: S, level: level, args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }), ts: Date.now(), url: location.href };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) window.parent.postMessage(payload, '*');
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason; var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>

    stn: (eid, sid, name, label) => ({ app: APP, v: V, t: 'stn', eid, sid: Number(sid), name: clamp(name, 80), label: clamp(label, 80) }),
    obs: (eid, addr, sid) => { const m = { app: APP, v: V, t: 'obs', eid, addr }; if (sid != null && sid !== '') m.sid = Number(sid); return m; },
    res: (eid, sid, votes, tot, inv, ev) => { const m = { app: APP, v: V, t: 'res', eid, sid: Number(sid), votes: {} }; for (const k of Object.keys(votes || {})) { const n = pint(votes[k]); if (n != null) m.votes[String(Number(k))] = n; } const t = pint(tot), i = pint(inv); if (t != null) m.tot = t; if (i != null) m.inv = i; if (isHash64(ev)) m.ev = ev.toLowerCase(); return m; },

    omem: (org, addr, role) => ({ app: APP, v: V, t: 'omem', org, addr, role: ['admin', 'mod', 'member'].indexOf(role) !== -1 ? role : 'member' }),

  // ───────────────────────── Helpers ─────────────────────────
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
  function nm(addr) { return (window.QCNames ? window.QCNames.label(addr) : addr) || '—'; }

  function userLink(addr) {

  // Organizations section for a profile. `orgs` is the visibility-filtered list

  function profileOrgsHtml(orgs, linkToWorkspace) {

  // Wire profile org cards (own profile only) to open the Orgs workspace.

  }
  function timeAgo(iso) {
    if (!iso) return '';
    const secs = Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 1000));
    if (secs < 60) return t('timeago_s').replace('{n}', secs);
    const m = Math.round(secs / 60); if (m < 60) return t('timeago_m').replace('{n}', m);
    const h = Math.round(m / 60); if (h < 24) return t('timeago_h').replace('{n}', h);

  function toast(msg, kind) {

  async function api(path) {

  async function sha256File(file) {

  function download(name, text, type) {

  // ───────────────────────── Memo Validation ────────────────────────────────
  // Mirror of lib/memo.js validation — client-side guards before send.
  // Note: isHash64 is already declared above in the QC memo builders block.
  function posInt(n) {
    const x = Number(n);
    return Number.isFinite(x) ? Math.max(0, Math.round(x)) : null;
  }
  function cleanVotes(votes) {
    const out = {};
    const src = votes && typeof votes === 'object' && !Array.isArray(votes) ? votes : {};
    const keys = Object.keys(src).slice(0, 64);
    for (const k of keys) {
      const cid = Number(k);
      const n = posInt(src[k]);
      if (Number.isInteger(cid) && cid >= 1 && n != null) out[String(cid)] = n;
    }
    return out;
  }
  function validateMemo(m) {
    if (!m || typeof m !== 'object') return false;
    if (m.app !== 'quickcount' || m.v !== 1) return false;
    switch (m.t) {
      case 'org':
        return typeof m.name === 'string' && m.name.length > 0;
      case 'el':
        return typeof m.name === 'string' && m.name.length > 0;
      case 'cand':
        return m.eid && Number.isInteger(m.cid) && m.cid >= 1 && typeof m.name === 'string' && m.name.length > 0;
      case 'stn':
        return m.eid && Number.isInteger(m.sid) && m.sid >= 1 && typeof m.name === 'string' && m.name.length > 0;
      case 'obs':
        return m.eid && typeof m.addr === 'string' && m.addr.length > 0;
      case 'res':
        return m.eid && Number.isInteger(m.sid) && m.sid >= 1 && m.votes && typeof m.votes === 'object';
      case 'disp':
        return m.eid && typeof m.target === 'string' && m.target.length > 0;
      case 'dres':
        return m.eid && m.disp && (m.verdict === 'uphold' || m.verdict === 'reject');
      case 'adm':
        return typeof m.act === 'string' && m.act.length > 0;
      case 'omem':
        return typeof m.org === 'string' && m.org.length > 0 && typeof m.addr === 'string' && m.addr.length > 0
          && (m.role === 'admin' || m.role === 'mod' || m.role === 'member');
      case 'orem':
        return typeof m.org === 'string' && m.org.length > 0 && typeof m.addr === 'string' && m.addr.length > 0;
      case 'ovis':
        return typeof m.org === 'string' && m.org.length > 0 && (m.vis === 'public' || m.vis === 'private');
      case 'odel':
        return typeof m.org === 'string' && m.org.length > 0;
      default:
        return false;
    }
  }

  // ───────────────────────── Wallet ─────────────────────────
  // Readiness, tx-id extraction and classified retry all live in the shared
  // resilience layer (window.QCBridge, public/usernode-resilience.js).
  //
  // Centralised failure handler. Terminal failures (user rejected, bad input)
  // surface as a plain error toast — repeating won't help. Everything else is
  // recoverable: clear the overlay, keep the user's typed input, and offer a
  // non-blocking Try-again that re-invokes the SAME closure (so nothing has to
  // be re-entered). `partial` is an already-formatted "got this far" prefix.
  function handleTxFailure(err, o) {
    o = o || {};
    QCLoading.hide();
    const kind = (window.QCBridgeClassify && window.QCBridgeClassify.classifyBridgeError)
      ? (err && err.qcKind ? err.qcKind : window.QCBridgeClassify.classifyBridgeError(err)) : 'unknown';
    const code = (err && err.qcCode) || 'UNKNOWN_ERROR';
    console.error('[QCTx] handleTxFailure: kind=' + kind + ', code=' + code + ', msg=' + (err && err.message || ''), err);
    if (kind === 'terminal') {
      toast((o.partial ? o.partial + ' ' : '') + t('toast_failed') + ' ' + (err && err.message || ''), 'error');
      return;
    }
    const base = (kind === 'transient') ? t('notice_wallet_unreachable') : t('notice_action_failed');
    window.QCNotice.show({
      message: (o.partial ? o.partial + ' ' : '') + base,
      actionLabel: typeof o.onRetry === 'function' ? t('action_try_again') : null,
      onAction: o.onRetry,
    });
  }

  // ── On-chain confirmation + optimistic "pending" indicator ──────────────────
  // Tracks transactions broadcast but not yet seen on the ledger, so the UI shows
  // a muted "Confirming on-chain…" pill until they land. Purely client-side and
  // ephemeral — the indexer remains the source of truth.
  App.pending = App.pending || [];
  let _pendingSeq = 0;
  function addPending(label, meta) {
    const id = 'p' + (++_pendingSeq);
    const entry = { id: id, label: label || t('confirming_generic') };
    if (meta && meta.txId) entry.txId = meta.txId;
    if (meta && meta.to) entry.to = meta.to;
    App.pending.push(entry);
    renderPending();
    persistPending();
    return id;
  }
  function removePending(id) {
    App.pending = App.pending.filter((p) => p.id !== id);
    renderPending();
    persistPending();
  }
  function renderPending() {
    let el = document.getElementById('qc-pending');
    if (!App.pending.length) { if (el) el.style.display = 'none'; return; }
    if (!el) {
      el = document.createElement('div');
      el.id = 'qc-pending';
      el.style.cssText = 'position:fixed;left:50%;transform:translateX(-50%);top:0.75rem;z-index:55;display:flex;'
        + 'align-items:center;gap:.5rem;padding:.45rem .8rem;border-radius:999px;font-family:system-ui;'
        + 'font-size:.8rem;font-weight:600;box-shadow:0 6px 18px rgba(0,0,0,.18)';
      const dot = document.createElement('span');
      dot.style.cssText = 'width:.6rem;height:.6rem;border-radius:50%;background:#f59e0b;animation:qcspin 1s linear infinite';
      const msg = document.createElement('span'); msg.id = 'qc-pending-msg';
      el.appendChild(dot); el.appendChild(msg);
      document.body.appendChild(el);
    }
    const dark = document.documentElement.classList.contains('dark');
    el.style.background = dark ? '#1e293b' : '#fff7ed';
    el.style.color = dark ? '#fcd34d' : '#92400e';
    el.style.border = '1px solid ' + (dark ? '#334155' : '#fed7aa');
    const n = App.pending.length;
    el.querySelector('#qc-pending-msg').textContent = t('confirming_onchain') + (n > 1 ? ' (' + n + ')' : '');
    el.style.display = 'flex';
  }

  // Poll the public explorer proxy until `txId` appears on the ledger, or a
  // timeout elapses. The hosted bridge resolves sendTransaction once the relay
  // ACCEPTS the broadcast; confirmTx is the app-level "visible on-chain" gate
  // that drives the immediate UI reflect. Resolves true on inclusion; throws a
  // transient-tagged error on timeout. No live chain in local-dev / staging →
  // auto-confirm so the pending→confirmed flow stays reviewable.
  async function confirmTx(txId, opts) {
    opts = opts || {};
    if (!txId) return true;
    // No live chain to poll: mock mode (self-contained local ingest), staging /
    // local-dev (auto-confirm so the pending→confirmed flow stays reviewable), or
    // a deploy with no chain read source configured (chainConfigured===false) —
    // confirm optimistically and let the ingest reconcile, rather than dead-ending
    // on a timeout. In mock mode the submission is already ingested server-side.
    if (App.cfg && (App.cfg.mockMode || App.cfg.staging || App.cfg.localDev || App.cfg.chainConfigured === false)) return true;
    const base = ((App.cfg && App.cfg.explorerApiBase) || '/explorer-api').replace(/\/+$/, '');
    const chain = (App.cfg && App.cfg.chainId) || 'usernode';
    const url = base + '/' + encodeURIComponent(chain) + '/transactions';
    const account = opts.account || App.wallet.address || '';
    const recipient = opts.to || account;
    const deadline = Date.now() + (opts.timeoutMs || 20000);
    const startTime = Date.now();
    let attempt = 0;
    let lastError = null;
    console.log('[QCTx] confirmTx: txId=' + txId + ', deadline=' + (opts.timeoutMs || 20000) + 'ms');
    while (Date.now() < deadline) {
      try {
        const r = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ account: account, recipient: recipient, limit: 200 }),
        });
        if (r.ok) {
          const data = await r.json().catch(() => null);
          const list = Array.isArray(data) ? data : ((data && (data.transactions || data.txs || data.results)) || []);
          if (txInList(list, txId)) {
            console.log('[QCTx] confirmTx: found after attempt ' + (attempt + 1) + ', elapsed=' + (Date.now() - startTime) + 'ms');
            return true;
          }
        } else {
          lastError = 'explorer returned ' + r.status;
          console.log('[QCTx] confirmTx attempt ' + (attempt + 1) + ': explorer ' + r.status);
        }
      } catch (e) {
        lastError = e.message;
        console.log('[QCTx] confirmTx attempt ' + (attempt + 1) + ': fetch error: ' + lastError);
      }
      const delay = (window.QCBridgeClassify && window.QCBridgeClassify.backoffDelay)
        ? window.QCBridgeClassify.backoffDelay(attempt++, Math.random) : 800;
      await new Promise((res) => setTimeout(res, delay));
    }
    const e = new Error('Awaiting confirmation timed out');
    e.qcKind = 'transient';
    e.qcCode = 'CONFIRM_TIMEOUT';
    console.error('[QCTx] CONFIRM_TIMEOUT: txId=' + txId + ', total attempts=' + attempt + ', elapsed=' + (Date.now() - startTime) + 'ms, lastError=' + lastError);
    throw e;
  }
  // True when any raw tx in `list` carries the given id (any field-name variant).
  // Mirrors lib/confirm.js matchTxInList (kept in sync, no bundler in the browser).
  function txInList(list, txId) {
    if (!Array.isArray(list) || !txId) return false;
    for (const raw of list) {
      const id = (window.QCBridge && window.QCBridge.extractTxId) ? window.QCBridge.extractTxId(raw) : null;
      if (id && id === txId) return true;
    }
    return false;
  }

  // Ask the server to ingest from chain right now, then re-render — so a freshly
  // confirmed action shows without waiting for the background poll interval.
  async function triggerRefresh() {
    try { await api('/__quickcount/refresh'); } catch (_) { /* best-effort */ }
    await refresh();
  }

  // Run a sequence of transactions, stopping at the first failure and reporting
  // partial progress. On Try-again it RESUMES from the failed step (carrying the
  // results of completed steps) rather than restarting — so we never re-submit a
  // step that already landed on-chain. Each step: { loading(i,n)|string,
  // build(results) -> { to, amount, memo, idempotent, require } }.
  async function runTxSteps(steps, opts) {
    opts = opts || {};
    const results = opts._results || [];
    const start = opts._from || 0;
    const isRetry = opts._from != null;
    if (isRetry) App.txState.retryCount++;
    console.log('[QCTx] runTxSteps start: steps=' + steps.length + ', from=' + start + ', retries=' + App.txState.retryCount);
    for (let i = start; i < steps.length; i++) {
      const spec = steps[i].build(results);
      const lbl = typeof steps[i].loading === 'function' ? steps[i].loading(i, steps.length) : steps[i].loading;
      QCLoading.show(lbl);
      let r;
      try {
        App.txState.sentTime = Date.now();
        console.log('[QCTx] sendTx step ' + (i + 1) + '/' + steps.length + ': to=' + spec.to.slice(0, 20) + '..., amount=' + spec.amount + ', idempotent=' + spec.idempotent);
        r = await sendTx(spec.to, spec.amount, spec.memo, { idempotent: spec.idempotent });
        if (spec.require && !r) throw new Error(spec.require);
        console.log('[QCTx] sendTx step ' + (i + 1) + ' succeeded: txId=' + (r ? r.slice(0, 20) + '...' : 'none'));
      } catch (e) {
        // SEND failed (or returned no id). Safe to resume by RE-SENDING this
        // step — classify guards non-idempotent ops against an ambiguous resend.
        const done = i; // count of steps that completed before this one
        App.txState.lastError = e.message;
        console.log('[QCTx] sendTx step ' + (i + 1) + ' failed: ' + e.message);
        handleTxFailure(e, {
          partial: (done > 0 && opts.partial) ? opts.partial(done, steps.length) : null,
          onRetry: () => runTxSteps(steps, { _from: i, _results: results, partial: opts.partial, success: opts.success }),
        });
        return;
      }
      results[i] = r;
      // The transaction was broadcast — now wait for the chain to include it.
      if (r) {
        const pid = addPending(typeof lbl === 'string' ? lbl : null, { txId: r, to: spec.to });
        QCLoading.show(t('loading_confirming'));
        App.txState.confirmStartTime = Date.now();
        try {
          await confirmTx(r, { to: spec.to });
          console.log('[QCTx] confirmTx step ' + (i + 1) + ' succeeded: elapsed=' + (Date.now() - App.txState.confirmStartTime) + 'ms');
        } catch (e) {
          removePending(pid);
          // Confirmation timed out. The tx is ALREADY broadcast, so we must NOT
          // re-send — Try-again RE-CHECKS the ledger for this same id and, on
          // success, resumes with the remaining (un-sent) steps.
          App.txState.lastError = e.message;
          console.log('[QCTx] confirmTx step ' + (i + 1) + ' timed out: ' + e.message);
          handleTxFailure(e, {
            partial: t('notice_confirm_timeout'),
            onRetry: () => resumeConfirm(steps, opts, i, results),
          });
          return;
        }
        removePending(pid);
      }
    }
    QCLoading.hide();
    App.txState = { sentTime: null, confirmStartTime: null, lastError: null, retryCount: 0 };
    console.log('[QCTx] runTxSteps completed successfully, all ' + steps.length + ' steps done');
    // Reflect the confirmed change immediately, then run the success callback.
    await triggerRefresh();
    if (opts.success) opts.success(results);
  }

  // Re-check the ledger for an already-broadcast step (no resend), then continue
  // with the steps that never sent. Used by the confirmation-timeout Try-again.
  function resumeConfirm(steps, opts, i, results) {
    QCLoading.show(t('loading_confirming'));
    return confirmTx(results[i]).then(() => {
      return runTxSteps(steps, { _from: i + 1, _results: results, partial: opts.partial, success: opts.success });
    }).catch((e) => {
      QCLoading.hide();
      handleTxFailure(e, {
        partial: t('notice_confirm_timeout'),
        onRetry: () => resumeConfirm(steps, opts, i, results),
      });
    });
  }

  // Single-transaction convenience wrapper over runTxSteps.
  function runTx(spec, opts) {
    opts = opts || {};
    return runTxSteps([{ loading: opts.loading, build: () => spec }], { success: opts.success });
  }

  async function connectWallet() {
    // Identity comes through the bridge in EVERY mode (the local-dev mock exposes
    // window.getNodeAddress, so QCBridge.getAddress() is the single entry point).
    let addr;
    try {
      addr = await window.QCBridge.getAddress();
    } catch (e) {
      handleTxFailure(e, { onRetry: connectWallet });
      return;
    }
    if (!addr) { toast(t('toast_no_wallet'), 'error'); return; }
    App.wallet.address = addr;
    App.wallet.connected = true;
    await loadMe();
    let uname = (App.me && App.me.username) || null;
    if (!uname) { try { uname = (window.usernode && window.usernode.username) || null; } catch (_) {} }
    App.user = { username: uname, address: addr };
    // A saved profile language preference wins over the device default.
    const pref = App.me && App.me.profile && App.me.profile.preferred_lang;
    if (LANGS.indexOf(pref) !== -1 && pref !== App.lang) { await setLang(pref, { skipPersist: true }); }
    restorePrefs();
    await restorePending();
    await refresh();
    renderChrome();
  }
  // Low-level send. local-dev routes through the mock via an injected sender so
  // the resilience layer (retry + fault injection) still applies without ever
  // touching the real bridge. opts.idempotent is OFF unless the caller opts in.
  function sendTx(to, amount, memoObj, opts) {
    opts = opts || {};
    if (!validateMemo(memoObj)) {
      const e = new Error('Invalid transaction memo');
      e.qcKind = 'terminal';
      e.qcCode = 'MEMO_INVALID';
      console.error('[QCTx] MEMO_INVALID:', memoObj);
      throw e;
    }
    const memoStr = JSON.stringify(memoObj);
    if (App.cfg.localDev) {
      return window.QCBridge.send(to, amount, memoStr, {
        idempotent: opts.idempotent,
        sender: (a, b, c) => window.QCMock.send(a, b, c),
      });
    }
    // Platform mock mode: ingest locally instead of broadcasting to a chain.
    // Route through QCBridge.send (keeping its resilience/retry wrapper) but back
    // it with an app-owned sender that POSTs to /__mock/submit with the connected
    // wallet as `from` and the iframe token attached — so org ownership is the
    // real user and the server can prefer req.user over the body. The server still
    // resolves `from` from req.user when authenticated, so this is spoof-resistant.
    if (App.cfg.mockMode) {
      return window.QCBridge.send(to, amount || 0, memoStr, {
        idempotent: opts.idempotent,
        sender: (a, b, c) => mockSubmit(a, b, c),
      });
    }
    return window.QCBridge.send(to, amount || 0, memoStr, { idempotent: opts.idempotent });
  }
  // App-owned local-ingest submit used in platform mock mode. Returns the txId.
  async function mockSubmit(to, amount, memoStr) {
    const r = await fetch('/__mock/submit', {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ from: App.wallet.address || '', to: to, amount: amount || 0, memo: memoStr }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.error) throw new Error(j.error || ('HTTP ' + r.status));
    return j.txId;
  }

  // ───────────────────────── Data ─────────────────────────
  async function refresh() {
    const viewer = App.wallet.address || '';

    try {
      App.state = await api('/__quickcount/state' + q);
      App.role = App.state.role;
      if (!App.eid && App.state.elections.length) { App.eid = App.state.elections[0].eid; return refresh(); }

    if (route.tab === 'election' && route.arg) { App.eid = route.arg; return renderElectionDetail(v); }

      case 'dashboard': return renderDashboard(v);

  function stationTable(d, opts) {

        : ` class="border-t border-slate-200 dark:border-slate-800"`;

  // Wire tap-to-expand toggles + the open station's inline form. Input handlers
  // mutate App only (never render/refresh) to avoid re-render loops; toggling
  // re-renders the election detail exactly once.
  function wireStationTable(d, root) {
    root.querySelectorAll('.st-toggle').forEach((el) => {
      el.onclick = () => {
        const sid = Number(el.dataset.sid);
        App.openStation = Number(App.openStation) === sid ? null : sid;
        App.draftVotes = {};
        renderElectionDetail(root);
      };
    });
    if (App.openStation == null) return;
    const s = (d.stations || []).find((x) => Number(x.sid) === Number(App.openStation));
    if (!s) return;
    root.querySelectorAll('.sv-input').forEach((inp) => {
      inp.oninput = () => { App.draftVotes[inp.dataset.cid] = inp.value; };
    });
    const sim = root.querySelector('.sv-sim');
    if (sim) sim.onclick = () => {
      const mockMap = { evan: 1, salah: 2, circle: 3 };
      d.candidates.forEach((c, i) => {
        const mapped = mockMap[String(c.name).trim().toLowerCase()];
        const val = String(mapped != null ? mapped : (i + 1));
        App.draftVotes[c.cid] = val;
        const inp = root.querySelector('.sv-input[data-cid="' + c.cid + '"]');
        if (inp) inp.value = val;
      });
    };
    const save = root.querySelector('.sv-save');
    const err = root.querySelector('.sv-err');
    if (save) save.onclick = () => {
      const votes = {};
      let bad = false;
      d.candidates.forEach((c) => {
        const raw = (App.draftVotes[c.cid] != null ? App.draftVotes[c.cid] : '').toString().trim();
        if (raw === '') { votes[c.cid] = 0; return; } // blank defaults to 0
        if (!/^\d+$/.test(raw)) { bad = true; return; } // reject negatives / decimals / non-numbers
        votes[c.cid] = Number(raw);
      });
      if (bad) { if (err) { err.textContent = t('station_invalid_votes'); err.classList.remove('hidden'); } return; }
      if (err) err.classList.add('hidden');
      const sid = Number(App.openStation);
      runTx({ to: d.election.orgAddr, amount: 0, memo: QC.res(d.election.eid, sid, votes), idempotent: true },
        { loading: t('loading_submitting'), success: () => {
            App.openStation = null; App.draftVotes = {};
            toast(t('toast_submit_result')); refreshSoon();
          } });
    };
  }
  // Re-render just the workspace station table after a toggle/save so other
  // open forms and unsaved drafts (held in `inlineEntry`) are preserved without
  // a full refetch.
  function rerenderStations() {
    const wrap = document.getElementById('station-table-wrap');
    const d = App.state && App.state.detail;
    if (!wrap || !d) return;
    wrap.innerHTML = stationTable(d, { inlineEntry: true });
    wireStationRows(wrap);
  }
  function wireStationRows(scope) {
    const root = scope || document;
    root.querySelectorAll('[data-strow]').forEach((row) => {
      const sid = row.getAttribute('data-strow');
      const toggle = () => {
        const k = inlineKey(sid);
        const cur = inlineEntry[k] || (inlineEntry[k] = { open: false, draft: {}, votes: {}, saved: false });
        cur.open = !cur.open;
        rerenderStations();
      };
      row.addEventListener('click', (e) => {
        // A click on an interactive child (PDF button, links, the inline form
        // inputs/button) must not toggle the row.
        if (e.target.closest('button, a, input, label, select, .inl-row')) return;
        toggle();
      });
      row.addEventListener('keydown', (e) => {
        if (e.target !== row) return;
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
      });
    });
    // Persist typed drafts as they change so an auto-refresh re-render restores
    // entered-but-unsaved numbers.
    root.querySelectorAll('.inl-input').forEach((inp) => {
      inp.addEventListener('input', () => {
        const formRow = inp.closest('[data-inl-sid]'); if (!formRow) return;
        const k = inlineKey(formRow.getAttribute('data-inl-sid'));
        const cur = inlineEntry[k] || (inlineEntry[k] = { open: true, draft: {}, votes: {}, saved: false });
        if (!cur.draft) cur.draft = {};
        cur.draft[inp.getAttribute('data-inl-cand')] = inp.value;
      });
    });
    root.querySelectorAll('.inl-save').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const sid = btn.getAttribute('data-inl-save');
        const k = inlineKey(sid);
        const formRow = btn.closest('[data-inl-sid]');
        const draft = {}, votes = {};
        formRow.querySelectorAll('[data-inl-cand]').forEach((inp) => {
          const key = inp.getAttribute('data-inl-cand');
          draft[key] = inp.value;
          votes[key] = QuickCountInline.sanitizeCount(inp.value);
        });
        inlineEntry[k] = { open: true, draft: draft, votes: votes, saved: true };
        toast(t('inline_done_badge') + ' · ' + QuickCountInline.totalVotes(votes).toLocaleString());
        rerenderStations();
      });
    });
  }
  }

    return `<div class="border ${cls} rounded-lg px-3 py-2 text-sm mb-4">

      · ${t('margin_lead_pct').replace('{lead}', m.leadMarginPct)} · ${t('margin_uncertainty').replace('{pct}', m.uncertaintyPct)}

  function renderDashboard(v) {
    v.innerHTML = electionPicker() + '<div id="dash-body"></div>';

  // One row per candidate (Rank, Candidate, Votes, Share %), sorted by votes
  // descending. The CSV string itself — including escaping and the UTF-8 BOM —
  // is built by the pure QuickCountCsv.candidateResultsCsv() (see
  // /public/csv-export.js); here we only pick the filename and trigger the
  // download. The method label is English (see METHOD_LABELS) and goes in the
  // filename so exports taken under different methods don't collide.
  function exportCsv(d) {
    const label = METHOD_LABELS[d.method] || d.method;
    const csv = QuickCountCsv.candidateResultsCsv(d);
    download((d.election.name || 'election') + ' - results (' + label + ').csv', csv, 'text/csv;charset=utf-8');
  }

  async function createElection() {
    // Capture the typed values up front so Try-again can resume without
    // re-reading inputs (which may have been cleared by a re-render).
    const name = document.getElementById('nel-name').value.trim();
    const cands = Array.from(document.querySelectorAll('.nel-c')).map((i) => i.value.trim()).filter(Boolean);
    if (!name || !cands.length) return toast(t('toast_add_candidate'), 'warn');
    const me = App.wallet.address;
    // Step 0 publishes the election (NOT idempotent — never auto-resend); each
    // later step adds one candidate, keyed off the election id from step 0.
    const steps = [{ loading: t('loading_creating_election'), build: () => ({ to: me, amount: 0, memo: QC.el(name), require: 'No election tx id' }) }];
    cands.forEach((c, idx) => steps.push({
      loading: () => t('loading_adding_candidate').replace('{i}', idx + 1).replace('{n}', cands.length),
      build: (results) => ({ to: me, amount: 0, memo: QC.cand(results[0], idx + 1, c) }),
    }));
    await runTxSteps(steps, {
      partial: (done) => done >= 1 ? t('partial_candidates').replace('{done}', done - 1).replace('{total}', cands.length) : null,
      success: (results) => { toast(t('toast_election_published')); App.eid = results[0]; location.hash = '#/election/' + results[0]; refresh(); },
    });
  }

    if (!d || (d.election && d.election.eid !== App.eid)) {

      <select id="dp-target" class="w-full mb-2 px-3 py-2 rounded-lg bg-white border border-slate-200 dark:bg-slate-950 dark:border-slate-800 outline-none">
        ${reported.map((s) => `<option value="${s.resultTx}">${esc(s.name)} — ${nm(s.observer)}</option>`).join('')}
      </select>
      <input id="dp-reason" placeholder="${t('election_dispute_reason_ph')}" class="w-full mb-2 px-3 py-2 rounded-lg bg-white border border-slate-200 dark:bg-slate-950 dark:border-slate-800 outline-none">
      <button id="dp-file" class="px-4 py-2 rounded-lg bg-amber-600 hover:bg-amber-500 text-sm font-semibold">${t('disputes_file')}</button>`
      : `<p class="text-sm text-slate-600 dark:text-slate-500">${t('election_dispute_no_results')}</p>`;
    const p = panel(t('disputes_file'), inner);
    setTimeout(() => {
      const b = p.querySelector('#dp-file'); if (!b) return;
      b.onclick = () => {
        const target = p.querySelector('#dp-target').value, reason = p.querySelector('#dp-reason').value.trim();
        if (!reason) return toast(t('toast_enter_reason'), 'warn');
        runTx({ to: d.election.orgAddr, amount: 0, memo: QC.disp(d.election.eid, target, reason) },
          { loading: t('loading_filing'), success: () => { toast(t('toast_dispute_filed')); refreshSoon(); } });
      };
    });
    return p;
  }

  function resolvePanel(d) {
    const open = d.disputes.filter((x) => x.status === 'open');
    const inner = open.length ? open.map((x) => `
      <div class="border-t border-slate-200 dark:border-slate-800 pt-2 mt-2 first:border-0 first:pt-0 first:mt-0">
        <p class="text-sm">${esc(x.reason || '—')}</p>
        <p class="text-xs text-slate-600 dark:text-slate-500 mb-2">${t('disputes_filed_by').replace('{who}', userLink(x.filer))} · ${timeAgo(x.createdAt)}</p>
        <button data-disp="${x.txId}" data-v="uphold" class="dres-btn text-xs px-3 py-1.5 rounded-lg bg-rose-600 hover:bg-rose-500 font-medium">${t('disputes_uphold')}</button>
        <button data-disp="${x.txId}" data-v="reject" class="dres-btn text-xs px-3 py-1.5 rounded-lg bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 font-medium">${t('disputes_reject')}</button>
      </div>`).join('') : `<p class="text-sm text-slate-600 dark:text-slate-500">${t('disputes_no_open')}</p>`;
    const p = panel(t('disputes_resolve'), inner);
    setTimeout(() => {
      p.querySelectorAll('.dres-btn').forEach((b) => b.onclick = () => {
        const disp = b.dataset.disp, verdict = b.dataset.v;
        runTx({ to: d.election.orgAddr, amount: 0, memo: QC.dres(d.election.eid, disp, verdict) },
          { loading: t('loading_resolving'), success: () => { toast(verdict === 'uphold' ? t('toast_dispute_upheld') : t('toast_dispute_rejected')); refreshSoon(); } });
      });
    });
    return p;
  }

  // ───────────────────────── Orgs ─────────────────────────
  function orgRoleLabel(role) { return t('org_role_' + role) || role; }
  function orgRoleBadge(role) {
    const cls = role === 'owner' ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-500/20 dark:text-indigo-300'
      : role === 'admin' ? 'bg-sky-100 text-sky-700 dark:bg-sky-500/20 dark:text-sky-300'
      : role === 'mod' ? 'bg-violet-100 text-violet-700 dark:bg-violet-500/20 dark:text-violet-300'
      : 'bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-300';
    return `<span class="badge ${cls}">${orgRoleLabel(role)}</span>`;
  }
  function orgVisBadge(vis) {
    const cls = vis === 'private' ? 'bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-300'
      : 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-300';
    return `<span class="badge ${cls}">${t('org_vis_' + vis) || vis}</span>`;
  }
  // Can `viewerRole` manage a member currently holding `targetRole`?
  function canManageTarget(viewerRole, targetRole) {
    if (targetRole === 'owner') return false;
    if (viewerRole === 'owner') return true;
    if (viewerRole === 'admin') return targetRole === 'member' || targetRole === 'mod';
    return false;
  }

  // Persistent warning shown when the server has no chain read source: on-chain
  // transactions still broadcast, but the indexer can't read them back, so newly
  // registered orgs never appear and admin stats stay at 0. Hidden in local-dev
  // (the mock ledger is a source) and in staging demo (seeded data renders
  // regardless). Driven by /__quickcount/config chainConfigured (= source.configured).
  function chainSyncBanner() {
    // Mock mode ingests submissions locally (no read-back gap), so the banner is
    // never applicable; also hidden in local-dev and staging demo.
    if (!App.cfg || App.cfg.mockMode || App.cfg.chainConfigured !== false || App.cfg.localDev || App.cfg.demo) return '';
    return `<div class="p-3 mb-4 rounded-xl bg-amber-100 border border-amber-300 text-amber-800 dark:bg-amber-500/15 dark:border-amber-500/30 dark:text-amber-200 text-sm">${esc(t('chain_unconfigured_banner'))}</div>`;
  }
  // Success toast for a state-changing tx. When the chain read source is absent
  // (chainConfigured === false) the broadcast can't be confirmed or read back,
  // so show a neutral "submitted — awaiting on-chain sync" notice instead of a
  // green ✓ that would falsely claim the change landed.
  function txSuccessToast(okKey) {
    // Mock mode persists the submission immediately, so show the green ✓; the
    // awaiting-sync notice is only for a real-chain deploy with no read source.
    if (App.cfg && !App.cfg.mockMode && App.cfg.chainConfigured === false) toast(t('toast_submitted_awaiting_sync'), 'warn');
    else toast(t(okKey));
  }

  async function renderOrgs(v) {
    const viewer = App.wallet.address || '';
    let data = { orgs: [] };
    if (viewer) { try { data = await api('/__quickcount/orgs?viewer=' + encodeURIComponent(viewer)); } catch (_) { /* best-effort */ } }
    const myOrgs = data.orgs || [];

    // Workspace view for a selected org.
    if (App.orgView) {
      const org = myOrgs.find((o) => o.addr === App.orgView);
      if (org) return renderOrgWorkspace(v, org);
      App.orgView = null; // org no longer in scope (e.g. just deleted) → list view
    }

    const myOrg = App.role.org;
    let html = `<h2 class="text-lg font-semibold mb-4">${t('orgs_heading')}</h2>` + chainSyncBanner();

    // Owned org (register / pay fee / manage) — top block, as before.
    if (myOrg) {
      html += `<h3 class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-2">${t('orgs_owned_heading')}</h3>
      <div class="p-4 mb-4 rounded-xl bg-slate-100 border border-slate-200 dark:bg-slate-900 dark:border-slate-800">
        <div class="flex items-center justify-between gap-2 flex-wrap"><h3 class="font-semibold">${esc(myOrg.name)}</h3>
        <span class="flex items-center gap-1">${orgVisBadge(myOrg.visibility || 'public')}<span class="badge ${myOrg.active ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-300' : 'bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-300'}">${myOrg.active ? t('orgs_active_badge') : t('orgs_pending_badge')}</span></span></div>
        <p class="text-xs text-slate-600 dark:text-slate-500 mt-1">${esc(myOrg.jur || '')} · <span class="font-mono">${esc(myOrg.addr)}</span></p>
        <div class="flex gap-2 mt-3 flex-wrap">
          <button class="org-manage px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold" data-addr="${esc(myOrg.addr)}">${t('org_manage')}</button>
          ${myOrg.active ? '' : `<button id="pay-fee" class="px-4 py-2 rounded-lg bg-amber-600 hover:bg-amber-500 text-white text-sm font-semibold">${t('orgs_pay_fee')} (${App.cfg.orgFee})</button>`}
        </div>
        ${myOrg.active ? `<p class="text-sm text-slate-500 dark:text-slate-400 mt-2">${t('orgs_manage_elections').replace('Elections', '<a href="#/elections" class="text-indigo-400 hover:underline">' + t('tab_elections') + '</a>')}</p>` : ''}
      </div>`;
    } else {
      html += `<div class="p-4 mb-4 rounded-xl bg-slate-100 border border-slate-200 dark:bg-slate-900 dark:border-slate-800">
        <h3 class="font-semibold mb-2">${t('orgs_register_heading')}</h3>
        <p class="text-sm text-slate-500 dark:text-slate-400 mb-3">${t('orgs_register_desc').replace('{fee}', '<strong>' + App.cfg.orgFee + '</strong>')}</p>
        <input id="org-name" placeholder="${t('orgs_name_placeholder')}" class="w-full mb-2 px-3 py-2 rounded-lg bg-white border border-slate-200 dark:bg-slate-950 dark:border-slate-800 outline-none">
        <input id="org-jur" placeholder="${t('orgs_jur_placeholder')}" class="w-full mb-3 px-3 py-2 rounded-lg bg-white border border-slate-200 dark:bg-slate-950 dark:border-slate-800 outline-none">
        <button id="org-reg" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold">${t('orgs_register_button')}</button>
        ${App.wallet.connected ? '' : `<p class="text-xs text-amber-600 dark:text-amber-300 mt-2">${t('orgs_connect_first')}</p>`}
      </div>`;
    }

    // Member-of list.
    const memberOrgs = myOrgs.filter((o) => o.viewerRole !== 'owner');
    html += `<h3 class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-2 mt-6">${t('orgs_member_heading')}</h3>`;
    html += memberOrgs.length
      ? '<div class="space-y-2 mb-6">' + memberOrgs.map((o) => `
        <div class="p-3 rounded-lg bg-slate-100 border border-slate-200 dark:bg-slate-900 dark:border-slate-800 text-sm flex items-center justify-between gap-2 flex-wrap">
          <span class="flex items-center gap-2"><span class="font-medium">${esc(o.name)}</span>${orgRoleBadge(o.viewerRole)}${orgVisBadge(o.visibility || 'public')}</span>
          <button class="org-manage px-3 py-1.5 rounded-lg bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 text-xs font-semibold" data-addr="${esc(o.addr)}">${t('org_manage')}</button>
        </div>`).join('') + '</div>'
      : `<p class="text-slate-600 dark:text-slate-500 text-sm mb-6">${t('orgs_none_member')}</p>`;
    html += `<h3 class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-2">${t('orgs_active_orgs')}</h3>`;
    // Authoritative list of active orgs from the indexer — independent of whether
    // an org has published elections, so a just-registered org shows instantly.
    const orgList = (App.state.activeOrgs || []);
    html += orgList.length ? '<div class="space-y-2">' + orgList.map((o) => `<div class="p-3 rounded-lg bg-slate-100 border border-slate-200 dark:bg-slate-900 dark:border-slate-800 text-sm flex justify-between"><span>${esc(o.name)}</span><span class="text-xs text-slate-600 dark:text-slate-500 font-mono">${shortAddr(o.addr)}</span></div>`).join('') + '</div>'

    v.innerHTML = html;

    const reg = document.getElementById('org-reg');
    if (reg) reg.onclick = registerOrg;
    const pay = document.getElementById('pay-fee');
    if (pay) pay.onclick = payOrgFee;

  // Org management workspace: roster + role-gated controls.
  function renderOrgWorkspace(v, org) {
    const vr = org.viewerRole;
    const canManageMembers = vr === 'owner' || vr === 'admin';
    const canSetVisibility = vr === 'owner' || vr === 'admin';
    const canDelete = vr === 'owner';
    const canAssignAdmin = vr === 'owner';

    let html = `<button id="org-back" class="text-sm text-indigo-500 hover:underline mb-3">${t('org_back')}</button>
      <div class="flex items-center gap-2 flex-wrap mb-1"><h2 class="text-lg font-semibold">${esc(org.name)}</h2>${orgRoleBadge(vr)}${orgVisBadge(org.visibility || 'public')}</div>
      <p class="text-xs text-slate-600 dark:text-slate-500 mb-5 font-mono">${esc(org.addr)}</p>`;

    // Members roster.
    html += `<h3 class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-2">${t('org_members_heading')} (${org.members.length})</h3>
      <div class="space-y-2 mb-4">`;
    const roleOpts = (sel) => ['member', 'mod'].concat(canAssignAdmin ? ['admin'] : [])
      .map((r) => `<option value="${r}" ${r === sel ? 'selected' : ''}>${orgRoleLabel(r)}</option>`).join('');
    for (const m of org.members) {
      const manageable = canManageMembers && canManageTarget(vr, m.role);
      html += `<div class="p-3 rounded-lg bg-slate-100 border border-slate-200 dark:bg-slate-900 dark:border-slate-800 text-sm flex items-center justify-between gap-2 flex-wrap">
        <span class="flex items-center gap-2">${userLink(m.addr)}${orgRoleBadge(m.role)}</span>
        ${manageable ? `<span class="flex items-center gap-2">
          <select class="org-role-sel px-2 py-1 rounded bg-white border border-slate-200 dark:bg-slate-950 dark:border-slate-800 text-xs" data-addr="${esc(m.addr)}" data-cur="${m.role}">${roleOpts(m.role)}</select>
          <button class="org-remove px-2 py-1 rounded bg-rose-600 hover:bg-rose-500 text-white text-xs font-semibold" data-addr="${esc(m.addr)}">${t('org_remove')}</button>
        </span>` : ''}
      </div>`;
    }
    html += '</div>';

    // Add member.
    if (canManageMembers) {
      html += `<div class="p-4 mb-4 rounded-xl bg-slate-100 border border-slate-200 dark:bg-slate-900 dark:border-slate-800">
        <h3 class="font-semibold mb-2">${t('org_add_member')}</h3>
        <input id="org-mem-addr" placeholder="${t('org_member_addr_placeholder')}" class="w-full mb-2 px-3 py-2 rounded-lg bg-white border border-slate-200 dark:bg-slate-950 dark:border-slate-800 outline-none font-mono text-sm">
        <div class="flex gap-2 flex-wrap">
          <select id="org-mem-role" class="px-3 py-2 rounded-lg bg-white border border-slate-200 dark:bg-slate-950 dark:border-slate-800 text-sm">${roleOpts('member')}</select>
          <button id="org-mem-add" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold">${t('org_add_button')}</button>
        </div>
      </div>`;
    }

    // Visibility.
    if (canSetVisibility) {
      const vis = org.visibility || 'public';
      const next = vis === 'private' ? 'public' : 'private';
      html += `<div class="p-4 mb-4 rounded-xl bg-slate-100 border border-slate-200 dark:bg-slate-900 dark:border-slate-800">
        <h3 class="font-semibold mb-1">${t('org_visibility_heading')}</h3>
        <p class="text-sm text-slate-500 dark:text-slate-400 mb-3">${t('org_current_visibility').replace('{vis}', '<strong>' + (t('org_vis_' + vis) || vis) + '</strong>')}</p>
        <button id="org-vis-toggle" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold" data-next="${next}">${next === 'private' ? t('org_make_private') : t('org_make_public')}</button>
      </div>`;
    }

    // Danger zone — delete (Owner only).
    if (canDelete) {
      html += `<div class="p-4 mb-4 rounded-xl border border-rose-300 dark:border-rose-500/40 bg-rose-50 dark:bg-rose-500/10">
        <h3 class="font-semibold mb-2 text-rose-700 dark:text-rose-300">${t('org_danger_heading')}</h3>
        <button id="org-del" class="px-4 py-2 rounded-lg bg-rose-600 hover:bg-rose-500 text-white text-sm font-semibold">${t('org_delete')}</button>
      </div>`;
    }

    v.innerHTML = html;

    document.getElementById('org-back').onclick = () => { App.orgView = null; render(); };
    const addBtn = document.getElementById('org-mem-add');
    if (addBtn) addBtn.onclick = () => addOrgMember(org.addr);
    v.querySelectorAll('.org-role-sel').forEach((sel) => {
      sel.onchange = () => { if (sel.value !== sel.dataset.cur) changeOrgRole(org.addr, sel.dataset.addr, sel.value); };
    });
    v.querySelectorAll('.org-remove').forEach((b) => { b.onclick = () => removeOrgMember(org.addr, b.dataset.addr); });
    const visBtn = document.getElementById('org-vis-toggle');
    if (visBtn) visBtn.onclick = () => setOrgVisibility(org.addr, visBtn.dataset.next);
    const delBtn = document.getElementById('org-del');
    if (delBtn) delBtn.onclick = () => deleteOrg(org.addr);
  }

  function addOrgMember(orgAddr) {
    const addr = (document.getElementById('org-mem-addr').value || '').trim();
    const role = document.getElementById('org-mem-role').value;
    if (!addr) return toast(t('org_enter_member_addr'), 'warn');
    if (addr === orgAddr) return toast(t('org_self_add'), 'warn');
    runTx({ to: orgAddr, amount: 0, memo: QC.omem(orgAddr, addr, role), idempotent: true },
      { loading: t('loading_adding_member'), success: () => { toast(t('toast_member_added')); refreshSoon(); } });
  }
  function changeOrgRole(orgAddr, addr, role) {
    runTx({ to: orgAddr, amount: 0, memo: QC.omem(orgAddr, addr, role), idempotent: true },
      { loading: t('loading_changing_role'), success: () => { toast(t('toast_role_changed')); refreshSoon(); } });
  }
  function removeOrgMember(orgAddr, addr) {
    runTx({ to: orgAddr, amount: 0, memo: QC.orem(orgAddr, addr), idempotent: true },
      { loading: t('loading_removing_member'), success: () => { toast(t('toast_member_removed')); refreshSoon(); } });
  }
  function setOrgVisibility(orgAddr, vis) {
    runTx({ to: orgAddr, amount: 0, memo: QC.ovis(orgAddr, vis), idempotent: true },
      { loading: t('loading_changing_visibility'), success: () => { toast(t('toast_visibility_changed')); refreshSoon(); } });
  }
  function deleteOrg(orgAddr) {
    if (!window.confirm(t('org_delete_confirm'))) return;
    runTx({ to: orgAddr, amount: 0, memo: QC.odel(orgAddr), idempotent: true },
      { loading: t('loading_deleting_org'), success: () => { App.orgView = null; toast(t('toast_org_deleted')); refreshSoon(); } });
  }
  async function registerOrg() {
    if (!App.wallet.connected) { await connectWallet(); if (!App.wallet.connected) return; }
    const name = document.getElementById('org-name').value.trim();
    const jur = document.getElementById('org-jur').value.trim();
    if (!name) return toast(t('toast_enter_org_name'), 'warn');
    // Fee payment is NOT idempotent — a relay timeout shows Try-again, never a
    // silent re-charge.
    runTx({ to: App.cfg.treasury, amount: App.cfg.orgFee, memo: QC.org(name, jur) },
      { loading: t('loading_registering'), success: () => { txSuccessToast('toast_org_registered'); refreshSoon(); } });
  }
  function payOrgFee() {
    runTx({ to: App.cfg.treasury, amount: App.cfg.orgFee, memo: QC.org(App.role.org.name, App.role.org.jur || '') },
      { loading: t('loading_paying'), success: () => { txSuccessToast('toast_fee_paid'); refreshSoon(); } });
  }

  // ───────────────────────── Evidence PDF (generate) ─────────────────────────
  // Build + download a self-verifying Evidence PDF for one reported station.
  // `stationOverride` lets the post-submit flow pass freshly-submitted values
  // before the indexer has caught up; otherwise the station is read from `d`.
  async function downloadEvidencePdf(d, sid, btn, stationOverride) {
    if (!window.QCEvidencePDF || !window.QCEvidencePDF.available()) {
      toast(t('evidence_pdf_unavailable'), 'error');
      return;
    }
    const station = stationOverride || (d.stations || []).find((s) => s.sid === sid && s.reported && s.resultTx);
    if (!station || !station.resultTx) { toast(t('toast_failed'), 'error'); return; }
    let label;
    if (btn) { label = btn.textContent; btn.disabled = true; btn.textContent = t('evidence_pdf_generating'); }
    try {
      await window.QCEvidencePDF.generate({ election: d.election, candidates: d.candidates }, station, { origin: location.origin });
      toast(t('evidence_pdf_ready'));
    } catch (e) {
      console.error('[QCEvidence] PDF generation failed', e);
      toast(t('toast_failed') + ' ' + (e && e.message || ''), 'error');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = label; }
    }
  }

  // Bind every .ev-pdf[data-sid] button rendered into the current view. Works
  // across the dashboard, the election workspace, and the Evidence tab because
  // all three render from App.state.detail.
  function wireEvidencePdf() {
    const d = App.state && App.state.detail;
    if (!d) return;
    document.querySelectorAll('.ev-pdf[data-sid]').forEach((b) => {
      if (b._evWired) return;
      b._evWired = true;
      b.onclick = () => downloadEvidencePdf(d, Number(b.dataset.sid), b);
    });
  }

  // After a successful result submission, offer the Evidence PDF via the
  // non-blocking notice. Prefers canonical indexer data once available.
  function offerSubmitPdf(d, sid, votes, tot, inv, evHash, txId) {
    if (!window.QCEvidencePDF || !window.QCEvidencePDF.available() || !txId) return;
    const known = (d.stations || []).find((s) => s.sid === sid) || {};
    const submitted = {
      sid: sid, name: known.name || ('Station ' + sid), label: known.label || '',
      reported: true, votes: votes,
      tot: (tot === '' || tot == null) ? null : Number(tot),
      inv: (inv === '' || inv == null) ? null : Number(inv),
      at: known.at || new Date().toISOString(), observer: App.wallet.address,
      resultTx: txId, ev: evHash || null,
    };
    window.QCNotice.show({
      message: t('evidence_pdf_ready_prompt'),
      actionLabel: t('evidence_pdf_download'),
      onAction: () => {
        const cur = App.state && App.state.detail;
        const live = cur && cur.election.eid === d.election.eid && (cur.stations || []).find((s) => s.resultTx === txId);
        if (live) downloadEvidencePdf(cur, live.sid, null);
        else downloadEvidencePdf(d, sid, null, submitted);
      },
    });
  }

  // ───────────────────────── Verify (upload verifier) ─────────────────────────
  function renderVerify(v) {
    const hash = location.hash || '';
    const qi = hash.indexOf('?');
    const params = {};
    if (qi !== -1) new URLSearchParams(hash.slice(qi + 1)).forEach((val, key) => { params[key] = val; });
    const isStagingLike = App.cfg && (App.cfg.demo || App.cfg.staging || App.cfg.localDev);
    const pdfOk = window.QCEvidencePDF && window.QCEvidencePDF.available();

    v.innerHTML = `
      <h2 class="text-lg font-semibold mb-1">${t('verify_heading')}</h2>
      <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">${t('verify_intro')}</p>
      <label id="vr-drop" class="block cursor-pointer p-8 text-center rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 hover:border-indigo-500 text-slate-600 dark:text-slate-400">
        <input id="vr-file" type="file" accept="application/pdf,.pdf" class="hidden">

      out.innerHTML = `<p class="text-sm text-slate-500">${t('verify_checking')}</p>`;

      e.preventDefault(); drop.classList.remove('border-indigo-500');
      const f = e.dataTransfer && e.dataTransfer.files[0]; if (f) run(window.QCEvidenceVerify.verifyFile(f, App.cfg));
    });

    if (params.fp && params.tx) run(window.QCEvidenceVerify.verifyFromQuery(params, App.cfg));

    const sample = document.getElementById('vr-sample');

  // ───────────────────────── Heatmap ─────────────────────────
  function renderHeatmap(v) {
    v.innerHTML = electionPicker() + '<div id="hmap-body"></div>';
    wirePickers();
    const d = App.state && App.state.detail;
    const body = document.getElementById('hmap-body');
    if (!d) { body.innerHTML = `<p class="text-slate-600 dark:text-slate-500 text-sm">${t('heatmap_select_election')}</p>`; return; }

    const groups = new Map();
    for (const s of d.stations) {
      const key = s.label && s.label.trim() ? s.label.trim() : null;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(s);
    }

    const rows = [];
    for (const [key, stations] of groups) {
      let totSum = 0, invSum = 0, hasData = false, reportedCount = 0;
      for (const s of stations) {
        if (s.reported && !s.invalid) {
          reportedCount++;
          if (s.tot != null) { totSum += s.tot; hasData = true; }
          if (s.inv != null) invSum += s.inv;
        }
      }
      rows.push({ key, stations, reportedCount, totSum: hasData ? totSum : null, invSum: hasData ? invSum : null, total: stations.length });
    }

    const maxTot = rows.reduce((m, r) => (r.totSum != null && r.totSum > m) ? r.totSum : m, 0);
    function heatTier(r) {
      if (r.totSum == null || maxTot === 0) return 0;
      return Math.min(5, Math.max(1, Math.ceil((r.totSum / maxTot) * 5)));
    }
    const tierBg = ['dark:bg-slate-800 bg-slate-100', 'bg-indigo-50 dark:bg-indigo-950', 'bg-indigo-100 dark:bg-indigo-900', 'bg-indigo-200 dark:bg-indigo-800', 'bg-indigo-300 dark:bg-indigo-700', 'bg-indigo-400 dark:bg-indigo-600'];
    const tierTx = ['text-slate-500', 'text-indigo-700 dark:text-indigo-300', 'text-indigo-700 dark:text-indigo-200', 'text-indigo-800 dark:text-indigo-100', 'text-indigo-900 dark:text-white', 'text-white'];

    rows.sort((a, b) => {
      if (a.key === null && b.key !== null) return 1;
      if (a.key !== null && b.key === null) return -1;
      if (a.totSum != null && b.totSum != null) return b.totSum - a.totSum;
      if (a.totSum != null) return -1;
      if (b.totSum != null) return 1;
      return b.reportedCount - a.reportedCount;
    });

    const onlyUnlabeled = rows.length === 1 && rows[0].key === null;
    const regionCount = rows.filter(r => r.key !== null).length;
    const totalReported = d.stations.filter(s => s.reported && !s.invalid).length;
    const totalStations = d.stations.length;

    const tableRows = rows.map(r => {
      const tv = heatTier(r);
      const label = r.key ? esc(r.key) : `<em class="text-slate-500">${t('heatmap_unlabeled')}</em>`;
      const ballots = r.totSum != null ? r.totSum.toLocaleString() : '—';
      const validPct = (r.totSum != null && r.invSum != null && r.totSum > 0)
        ? ((r.totSum - r.invSum) / r.totSum * 100).toFixed(1) + '%' : '—';
      const inv = r.invSum != null ? r.invSum.toLocaleString() : '—';
      return `<tr class="${tierBg[tv]} ${tierTx[tv]}">
        <td class="px-4 py-2 font-medium">${label}</td>
        <td class="px-4 py-2 text-center">${r.reportedCount}/${r.total}</td>
        <td class="px-4 py-2 text-right font-mono">${ballots}</td>
        <td class="px-4 py-2 text-right">${validPct}</td>
        <td class="px-4 py-2 text-right font-mono">${inv}</td>
      </tr>`;
    }).join('');

    const noRegionNote = onlyUnlabeled ? `<p class="text-sm text-slate-600 dark:text-slate-500 mt-3">${t('heatmap_no_regions')}</p>` : '';
    const summary = t('heatmap_summary')
      .replace('{reported}', totalReported).replace('{total}', totalStations).replace('{regions}', regionCount);

    body.innerHTML = `
      <h2 class="text-lg font-semibold mb-3">${t('heatmap_heading')} — ${esc(d.election.name)}</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm rounded-lg overflow-hidden">
          <thead>
            <tr class="bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200">
              <th class="px-4 py-2 text-left">${t('heatmap_col_region')}</th>
              <th class="px-4 py-2 text-center">${t('heatmap_col_stations')}</th>
              <th class="px-4 py-2 text-right">${t('heatmap_col_ballots')}</th>
              <th class="px-4 py-2 text-right">${t('heatmap_col_valid_rate')}</th>
              <th class="px-4 py-2 text-right">${t('heatmap_col_invalid')}</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-200/40 dark:divide-slate-700/40">${tableRows}</tbody>
        </table>
      </div>
      ${noRegionNote}
      <p class="text-xs text-slate-500 mt-3">${summary} · ${t('dashboard_auto_refreshing')}</p>`;
  }

              <input id="dn-input" maxlength="20" value="${esc(currentName)}" class="flex-1 px-3 py-2 rounded-lg bg-white border border-slate-200 dark:bg-slate-950 dark:border-slate-800 outline-none text-sm" />
              <button id="dn-save" class="text-sm px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 font-medium disabled:opacity-50 disabled:cursor-not-allowed">${esc(t('action_save'))}</button>
            </div>
            <p id="dn-err" class="hidden mt-1 text-xs text-rose-400"></p>
            <p class="mt-1 text-xs text-slate-500">${esc(t('hint_display_name'))}</p>
            ` : `<p class="text-xs text-amber-600 dark:text-amber-300">${esc(t('no_wallet_note'))}</p>`}
          </div>

          <div>
            <label class="block text-xs text-slate-600 dark:text-slate-400 mb-1">${esc(t('label_bio'))}</label>
            ${linked ? `
            <textarea id="bio-input" maxlength="280" rows="3"
              class="w-full px-3 py-2 rounded-lg bg-white border border-slate-200 dark:bg-slate-950 dark:border-slate-800 outline-none text-sm resize-none"
              placeholder="${esc(t('hint_bio'))}">${esc(currentBio)}</textarea>
            <div class="flex items-center justify-between mt-1">
              <p id="bio-err" class="hidden text-xs text-rose-400"></p>
              <p id="bio-count" class="text-xs text-slate-500 ml-auto">${currentBio.length}/280</p>
            </div>
            <button id="bio-save" class="mt-1 text-sm px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 font-medium">${esc(t('action_save'))}</button>
            ` : `<p class="text-xs text-amber-600 dark:text-amber-300">${esc(t('no_wallet_note'))}</p>`}
          </div>

          <div>
            <label class="block text-xs text-slate-600 dark:text-slate-400 mb-1">${esc(t('label_language'))}</label>
            ${langSelect('profile-lang')}
          </div>
        </div>

        <div id="profile-history-area" class="mt-6"></div>
        <div id="profile-orgs-area" class="mt-2"></div>
      </div>`;

    wireLangSelect('profile-lang');

    const copyBtn = document.getElementById('copy-addr');
    if (copyBtn) copyBtn.onclick = async () => {
      try { await navigator.clipboard.writeText(addr); toast(t('copied')); }
      catch (_) { toast(addr, 'warn'); }
    };

    if (linked) {
      const input = document.getElementById('dn-input');
      const save = document.getElementById('dn-save');
      const err = document.getElementById('dn-err');
      const validate = () => {
        const val = input.value.trim();
        const ok = NAME_RE.test(val);
        if (val && !ok) { err.textContent = t('invalid_name'); err.classList.remove('hidden'); }
        else { err.classList.add('hidden'); }
        save.disabled = !ok;
        return ok;
      };
      input.oninput = validate;
      validate();
      save.onclick = async () => {
        const val = input.value.trim();
        if (!NAME_RE.test(val)) { validate(); return; }
        save.disabled = true;
        const prev = save.textContent;
        save.textContent = t('saving');
        try {
          await putProfile({ display_name: val });
          toast(t('saved'));
          renderChrome();
          save.textContent = prev;
          validate();
        } catch (e) {
          save.textContent = prev;
          save.disabled = false;
          err.textContent = e.message || t('save_failed');
          err.classList.remove('hidden');
          toast(t('save_failed'), 'error');
        }
      };

      const bioInput = document.getElementById('bio-input');
      const bioSave = document.getElementById('bio-save');
      const bioErr = document.getElementById('bio-err');
      const bioCount = document.getElementById('bio-count');
      bioInput.oninput = () => { bioCount.textContent = bioInput.value.length + '/280'; };
      bioSave.onclick = async () => {
        bioSave.disabled = true;
        const prev = bioSave.textContent;
        bioSave.textContent = t('saving');
        try {
          await putProfile({ bio: bioInput.value });
          toast(t('bio_saved'));
          bioSave.textContent = prev;
          bioSave.disabled = false;
          bioErr.classList.add('hidden');
        } catch (e) {
          bioSave.textContent = prev;
          bioSave.disabled = false;
          bioErr.textContent = e.message || t('bio_save_failed');
          bioErr.classList.remove('hidden');
          toast(t('bio_save_failed'), 'error');
        }
      };

      // Load stats + history + organizations asynchronously. Pass viewer=addr
      // (the owner is viewing their own profile) so their pending and private
      // orgs surface to them.
      if (addr) {
        try {
          const data = await api(`/api/public/profiles/${encodeURIComponent(addr)}?viewer=${encodeURIComponent(addr)}`);
          const statsArea = document.getElementById('profile-stats-area');
          const histArea = document.getElementById('profile-history-area');
          const orgsArea = document.getElementById('profile-orgs-area');
          if (statsArea) statsArea.innerHTML = statsHtml(data);
          if (histArea) {
            const items = (data && data.history) || [];
            histArea.innerHTML = `<h3 class="text-sm font-semibold mb-2">${esc(t('profile_history_heading'))}</h3>` +
              (items.length ? `<ul class="space-y-2">${items.map((item) =>
                `<li class="text-sm text-slate-400"><span class="text-slate-800 dark:text-slate-200">${esc(item.election_name)}</span> — ${esc(item.station_name)} <span class="text-xs text-slate-600">${timeAgo(item.submitted_at)}</span></li>`
              ).join('')}</ul>` : `<p class="text-sm text-slate-500">${esc(t('profile_history_empty'))}</p>`);
          }
          if (orgsArea) {
            orgsArea.innerHTML = profileOrgsHtml((data && data.organizations) || [], true);
            wireProfileOrgs(orgsArea);
          }
        } catch (_) {}
      }
    }
  }

  async function renderUserProfile(v, addr) {
    if (!addr) { v.innerHTML = `<p class="text-slate-500 text-sm">${esc(t('profile_not_found'))}</p>`; return; }
    v.innerHTML = `<div class="max-w-xl"><p class="text-slate-500 text-sm">${esc(t('loading') || '…')}</p></div>`;
    let data;
    try {
      const viewer = (App.me && App.me.usernode_pubkey) || '';
      data = await api(`/api/public/profiles/${encodeURIComponent(addr)}${viewer ? '?viewer=' + encodeURIComponent(viewer) : ''}`);
    } catch (_) {
      v.innerHTML = `<div class="max-w-xl"><p class="text-slate-500 text-sm">${esc(t('profile_not_found'))}</p></div>`;
      return;
    }
    const hasOrgs = !!(data && Array.isArray(data.organizations) && data.organizations.length);
    if (!data || (!data.display_name && !data.username && !hasOrgs && !(data.stats && (data.stats.results_submitted || data.stats.elections)))) {
      v.innerHTML = `<div class="max-w-xl"><p class="text-slate-500 text-sm">${esc(t('profile_not_found'))}</p></div>`;
      return;
    }
    const displayLabel = data.display_name || data.username || shortAddr(addr);
    const seed = data.username || addr;
    const items = (data && data.history) || [];
    v.innerHTML = `
      <div class="max-w-xl">
        <div class="flex items-center gap-4 mb-4">
          ${identicon(seed)}
          <div class="min-w-0">
            <div class="text-lg font-semibold truncate">${esc(displayLabel)}</div>
            ${data.username ? `<div class="text-xs text-slate-500">@${esc(data.username)}</div>` : ''}
          </div>
        </div>
        ${data.bio ? `<p class="text-sm text-slate-700 dark:text-slate-300 mb-4">${esc(data.bio)}</p>` : ''}
        ${statsHtml(data)}
        <h3 class="text-sm font-semibold mb-2 mt-4">${esc(t('profile_history_heading'))}</h3>
        ${items.length ? `<ul class="space-y-2">${items.map((item) =>
          `<li class="text-sm text-slate-400"><span class="text-slate-800 dark:text-slate-200">${esc(item.election_name)}</span> — ${esc(item.station_name)} <span class="text-xs text-slate-600">${timeAgo(item.submitted_at)}</span></li>`
        ).join('')}</ul>` : `<p class="text-sm text-slate-500">${esc(t('profile_history_empty'))}</p>`}
        ${profileOrgsHtml((data && data.organizations) || [], false)}
      </div>`;
  }

  function renderSettings(v) {
    v.innerHTML = `
      <div class="max-w-xl">
        <h2 class="text-xl font-bold mb-5">${esc(t('title_settings'))}</h2>
        <div class="p-4 rounded-xl bg-slate-100 border border-slate-200 dark:bg-slate-900 dark:border-slate-800">
          <label class="block text-sm font-medium mb-1">${esc(t('label_language'))}</label>
          <p class="text-xs text-slate-500 mb-3">${esc(t('desc_language'))}</p>
          ${langSelect('settings-lang')}
        </div>
      </div>`;
    wireLangSelect('settings-lang');
  }

  // ───────────────────────── Boot ─────────────────────────
  function refreshSoon() { setTimeout(() => refresh(), App.cfg.localDev ? 400 : 2500); }
  // True while the user is actively editing a form field inside #view. Each
  // render() rewrites #view via innerHTML, which destroys and recreates the
  // focused <input>/<textarea> and drops the cursor — so the auto-refresh
  // timer skips its tick while a field is focused and resumes on the next tick
  // once the field is blurred. Only the timer consults this; explicit refreshes
  // (manual ↻, post-tx refreshSoon, picker changes, navigation) are unaffected.
  // True while the user is mid-interaction with a form in #view and a wholesale
  // re-render would lose their work: either a field is focused, OR an inline
  // editor (the expandable TPS result form) is open with a draft on screen.
  // Both the auto-refresh timer and post-action refreshes consult this.
  function isBusyEditing() {
    if (App.openStation != null) return true; // an inline TPS result form is open
    const el = document.activeElement;
    if (!el) return false;
    const tag = el.tagName;
    const editable = tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable;
    if (!editable) return false;
    const view = document.getElementById('view');
    return !!(view && view.contains(el));
  }
  // Back-compat alias (kept so any other caller keeps working).
  function isEditingField() { return isBusyEditing(); }
  function startAutoRefresh() {
    if (App.refreshTimer) clearInterval(App.refreshTimer);
    // refresh() updates global state (role + activeOrgs) AND re-renders the
    // current tab; for tabs whose render() fetches its own data (orgs, profile,
    // admin, user) the re-render re-runs those fetches, so a still-syncing
    // registration appears without a manual reload.
    const tabs = ['dashboard', 'election', 'evidence', 'disputes', 'orgs', 'elections', 'profile', 'admin', 'user'];
    App.refreshTimer = setInterval(() => {
      if (isBusyEditing()) return; // don't yank focus out of a field, or collapse an open inline form, mid-edit
      const r = currentRoute();
      if (tabs.includes(r.tab)) refresh();
    }, 6000);
  }

  // ───────────────────────── Theme toggle ─────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  themeBtn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
  themeBtn.onclick = function () {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('qc-theme', isDark ? 'dark' : 'light');
    themeBtn.textContent = isDark ? '☀️' : '🌙';
    savePrefs(); // persist theme to the active user's profile when signed in
  };

  // Usernode-Bridge-first, gated initialization. We show Usernode Loading first
  // and keep it up until every critical step has been received and verified:
  // config → a DEFINITE bridge identity outcome → verified session/role →
  // preference + transaction-status restore. Only then is the UI rendered, fully
  // personalized. A bridge timeout / no session resolves to the anonymous public
  // path rather than hanging. QCLoading.hide() runs in `finally` so a thrown init
  // can never leave the overlay stuck.

  // ───────────────────────── Manual refresh ─────────────────────────
  // Ask the server to ingest from chain right now, then re-render the current
  // screen. Mirrors what runs automatically after a transaction. When no chain
  // read source is configured (chainConfigured===false) triggerRefresh simply
  // re-draws known state — the "on-chain sync not configured" banner still tells
  // the user why nothing new arrives, so the toast stays neutral.
  const refreshBtn = document.getElementById('refresh-btn');
  if (refreshBtn) refreshBtn.onclick = async function () {
    if (refreshBtn.dataset.busy === '1') return;
    refreshBtn.dataset.busy = '1';
    refreshBtn.classList.add('animate-spin');
    try {
      await triggerRefresh();
      toast(t('toast_refreshed'));
    } catch (_) { /* triggerRefresh is best-effort */ }
    finally {
      refreshBtn.classList.remove('animate-spin');
      refreshBtn.dataset.busy = '0';
    }
  };

  async function boot() {
    // Resolve a provisional language from the device so the loading copy is
    // localized before the verified profile preference is known.
    let localPref = null;
    try { localPref = localStorage.getItem('qc_lang'); } catch (_) {}
    App.lang = resolveLang(null, localPref);
    applyDir();
    QCLoading.show(t('loading_connecting'));
    try {
      App.cfg = await api('/__quickcount/config');
      App.method = (App.cfg.methods && App.cfg.methods[0]) || 'latest';
      // Point the hosted bridge's transaction reads/polls at our auth-exempt
      // /explorer-api proxy (see PUBLIC_PREFIXES + the /explorer-api proxy in
      // server.js). Set BEFORE any connect/send. Skipped in local-dev and in
      // mock mode (both ingest locally — there is nothing to poll).
      if (!App.cfg.localDev && !App.cfg.mockMode) {
        window.usernode = window.usernode || {};
        const exBase = (App.cfg.explorerApiBase || '/explorer-api').replace(/\/+$/, '');
        const chain = App.cfg.chainId || 'usernode';
        window.usernode.transactionsBaseUrl = exBase + '/' + encodeURIComponent(chain);
      }
      // Fault-injection hook — local-dev / staging ONLY.
      if (App.cfg.localDev || App.cfg.staging) {
        const fault = new URLSearchParams(location.search).get('bridgefault');
        if (fault && window.QCBridge) window.QCBridge.setFault(fault);
      }
      // In local-dev the mock bridge backs identity (it exposes window.getNodeAddress
      // so QCBridge is still the single identity entry point). Wire the persona
      // switcher BEFORE resolving identity so a persona change re-runs connect.
      if (App.cfg.localDev && !window.QCMock) {
        console.error('local-dev config reported but window.QCMock is missing — public/usernode-bridge.js failed to load; transactions will not work.');
      }
      if (App.cfg.localDev && window.QCMock) {
        window.QCMock.init(App.cfg.personas || []);
        window.QCMock.activate(); // install window.getNodeAddress so QCBridge backs identity
        document.getElementById('persona-select').onchange = async (e) => {
          window.QCMock.setPersona(Number(e.target.value));
          QCLoading.show(t('loading_verifying'));
          try { await connectWallet(); } finally { QCLoading.hide(); }
        };
      }

      // Block on a DEFINITE bridge identity outcome (address or bounded-timeout
      // public fallback) before rendering anything that needs user context.
      QCLoading.show(t('loading_verifying'));
      await resolveIdentity();

      // Verified session language preference wins over the device default.
      const profilePref = App.me && App.me.profile && App.me.profile.preferred_lang;
      App.lang = resolveLang(profilePref, localPref);
      applyDir();
      try { if (!localPref) localStorage.setItem('qc_lang', App.lang); } catch (_) {}

      // Restore the signed-in user's preferences + transaction status by username.
      QCLoading.show(t('loading_restoring'));
      restorePrefs();
      await restorePending();

      // Staging-only reviewable "pending" pill (no DB; strict no-op elsewhere).
      if (App.cfg.staging && new URLSearchParams(location.search).get('demo') === '1') {
        addPending(t('pending_demo_label'));
      }

      // Wallet button: connected → toggle the Profile/Settings menu; else connect.
      document.getElementById('wallet-btn').onclick = (e) => {
        e.stopPropagation();
        if (App.wallet.connected) { App.menuOpen = !App.menuOpen; renderChrome(); }
        else connectWallet();
      };
      document.addEventListener('click', (e) => {
        if (App.menuOpen && !document.getElementById('wallet-wrap').contains(e.target)) {
          App.menuOpen = false; renderChrome();
        }
      });
      window.addEventListener('hashchange', render);

      // Critical data verified — render once, fully personalized.
      await refresh();
      startAutoRefresh();
    } finally {
      QCLoading.hide();
    }
  }

  boot().catch((e) => { console.error(e); QCLoading.hide(); document.getElementById('view').innerHTML = '<p class="text-rose-400 text-sm p-4">Failed to start: ' + esc(e.message) + '</p>'; });
  </script>
</body>
</html>
