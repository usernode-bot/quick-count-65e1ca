<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(e); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = { sentinel: S, level: level, args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }), ts: Date.now(), url: location.href };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) window.parent.postMessage(payload, '*');
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason; var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
  })();
  </script>
  <title>Quick Count — Live</title>
  <script>(function() { if (localStorage.getItem('qc-theme') === 'light') document.documentElement.classList.remove('dark'); })();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>
  <!-- App-side bridge resilience (shared with the main app). Loads after the
       hosted bridge tag above. -->
  <script src="/usernode-bridge-classify.js"></script>
  <script src="/usernode-resilience.js"></script>
  <!-- Pure helpers for the off-chain working tally (CANDIDATES / aggregateVotes
       / voteShares) — shared with the in-app dashboard's workTallySection. -->
  <script src="/inline-entry.js"></script>
  <!-- Results PDF export: jsPDF (CDN) + the shared generator. Optional — the
       generator degrades gracefully when the CDN is unreachable (offline). -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="/results-pdf.js"></script>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen">
  <div class="max-w-3xl mx-auto p-4 sm:p-6">
    <header class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div class="flex items-center gap-3">
        <h1 class="text-xl font-bold">Quick Count — Live</h1>
        <span id="staging-badge" class="hidden text-xs font-medium px-2 py-1 rounded bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-300">staging</span>
      </div>
      <div class="flex items-center gap-2">
        <button id="theme-btn" class="text-xs px-3 py-1.5 rounded-lg bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 font-medium" title="Toggle theme">☀️</button>
        <select id="election-select" class="px-3 py-2 rounded-lg bg-slate-100 border border-slate-200 dark:bg-slate-900 dark:border-slate-800 outline-none text-sm"></select>
      </div>
    </header>

    <div id="content">
      <p class="text-slate-600 dark:text-slate-500 text-sm">Loading…</p>
    </div>

    <p id="updated" class="mt-6 text-xs text-slate-700 dark:text-slate-600"></p>
  </div>

  <script>
    // Tailwind bar classes for the working-tally bars.
    const COLORS = ['bg-indigo-500', 'bg-sky-500', 'bg-emerald-500', 'bg-amber-500', 'bg-rose-500', 'bg-fuchsia-500', 'bg-teal-500'];

    const qs = new URLSearchParams(location.search);
    let currentEid = qs.get('eid') || '';
    const token = qs.get('token') || '';
    const authHeaders = token ? { 'x-usernode-token': token } : {};

    let cfg = { staging: false };
    let lastData = null;

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function timeAgo(iso) {
      if (!iso) return '';
      const secs = Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 1000));
      if (secs < 60) return secs + 's ago';
      const mins = Math.round(secs / 60);
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.round(mins / 60);
      return hrs + 'h ago';
    }

    // ── Working tally (off-chain, organizer-entered) ─────────────────
    // The public dashboard is now a focused view of the off-chain working
    // tally, headed by the active election's name — the election title replaces
    // the old "Working tally" heading and sits directly above the bars. Built
    // from d.workTally (the off-chain inline station entries the server returns
    // to every viewer) using the fixed QuickCountInline candidate set. The old
    // official-results chart, the per-station table and the lock/unlock paywall
    // were removed: the working tally is non-official data, never gated. Always
    // renders the title; shows an empty-state line when nothing is entered yet.
    function workTallySection(d) {
      const QC = window.QuickCountInline;
      if (!d || !d.election) return '';
      const title = '<h2 class="text-lg font-semibold text-purple-700 dark:text-purple-300 mb-0.5">' + escapeHtml(d.election.name) + '</h2>';
      const wrap = (inner) => '<div id="work-tally" class="p-4 rounded-xl border border-purple-200 bg-purple-50/50 dark:border-purple-500/30 dark:bg-purple-500/5">' + title + inner + '</div>';
      const saved = (d.workTally || []);
      const votesList = saved.map((r) => r.votes || {});
      const totals = QC ? QC.aggregateVotes(votesList) : {};
      const shares = QC ? QC.voteShares(totals) : {};
      const grand = QC ? QC.CANDIDATES.reduce((s, c) => s + (totals[c.key] || 0), 0) : 0;
      if (!QC || !saved.length || grand <= 0) {
        return wrap('<p class="text-sm text-slate-600 dark:text-slate-500 mt-1">No submissions yet</p>');
      }
      const bars = QC.CANDIDATES.map((c, i) => ({ c, i, votes: totals[c.key] || 0, pct: shares[c.key] || 0 }))
        .sort((a, b) => b.votes - a.votes)
        .map(({ c, i, votes, pct }) => '<div class="mb-3">'
          + '<div class="flex justify-between text-sm mb-1"><span>' + escapeHtml(c.name) + '</span>'
          + '<span class="font-mono text-slate-700 dark:text-slate-300">' + votes.toLocaleString()
          + ' <span class="text-slate-600 dark:text-slate-500">(' + pct + '%)</span></span></div>'
          + '<div class="h-4 rounded bg-slate-200 dark:bg-slate-800 overflow-hidden"><div class="h-full '
          + COLORS[i % COLORS.length] + '" style="width:' + pct + '%"></div></div>'
          + '</div>').join('');
      const total = (d.stations || []).length || saved.length;
      const reported = 'Live count entered by the organizer · ' + saved.length + ' of ' + total
        + ' stations entered · ' + grand.toLocaleString() + ' votes';
      const proofCount = (d.stations || []).filter((s) => s.proof && s.proof.validated).length;
      const proofBadge = proofCount
        ? '<p class="mt-3"><span class="text-xs inline-flex items-center gap-1 px-2 py-1 rounded bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-300">🛡️ '
          + proofCount + ' ballot proof' + (proofCount === 1 ? '' : 's') + ' attached &amp; validated ✓</span></p>'
        : '';
      const pdfBtnHtml = '<div class="mt-3"><button id="work-tally-pdf-btn" class="text-xs px-3 py-1.5 rounded-lg bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 disabled:opacity-50 disabled:cursor-not-allowed">Download PDF</button></div>';
      return wrap('<p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5 mb-3">' + escapeHtml(reported) + '</p>' + bars + proofBadge + pdfBtnHtml);
    }

    // ── Data loading + render ────────────────────────────────────────
    async function loadElectionsList() {
      try {
        const r = await fetch('/api/public/elections', { headers: authHeaders });
        const { elections } = await r.json();
        const sel = document.getElementById('election-select');
        if (!elections.length) {
          sel.innerHTML = '<option value="">No elections yet</option>';
          document.getElementById('content').innerHTML = '<p class="text-slate-600 dark:text-slate-500 text-sm">No elections have been published yet.</p>';
          return;
        }
        sel.innerHTML = elections.map((e) => '<option value="' + e.eid + '">' + escapeHtml(e.name) + '</option>').join('');
        if (!currentEid || !elections.some((e) => e.eid === currentEid)) currentEid = elections[0].eid;
        sel.value = currentEid;
        sel.onchange = () => { currentEid = sel.value; subscribeLive(currentEid); render(); };
      } catch (e) {
        document.getElementById('content').innerHTML = '<p class="text-rose-400 text-sm">Failed to load elections.</p>';
      }
    }

    async function render() {
      if (!currentEid) return;
      let d;
      try {
        const r = await fetch('/api/public/elections/' + encodeURIComponent(currentEid), { headers: authHeaders });
        if (!r.ok) throw new Error('not found');
        d = await r.json();
      } catch (e) {
        document.getElementById('content').innerHTML = '<p class="text-rose-400 text-sm">Could not load this election.</p>';
        return;
      }
      lastData = d;

      // The dashboard is now a single working-tally board headed by the election
      // name — no official chart, no per-station table, no lock/unlock paywall.
      document.getElementById('content').innerHTML = workTallySection(d);

      // Wire the PDF download button (only present when working tally has data).
      const pdfEl = document.getElementById('work-tally-pdf-btn');
      if (pdfEl) {
        if (!window.QCResultsPDF || !window.QCResultsPDF.available()) {
          pdfEl.disabled = true;
          pdfEl.title = 'PDF tools unavailable — open this page online to enable PDF export.';
        } else {
          pdfEl.onclick = () => {
            const QC = window.QuickCountInline;
            const saved = (d.workTally || []);
            const votesList = saved.map((r) => r.votes || {});
            const totals = QC.aggregateVotes(votesList);
            const shares = QC.voteShares(totals);
            const origLabel = pdfEl.textContent;
            pdfEl.disabled = true;
            pdfEl.textContent = 'Generating…';
            try {
              window.QCResultsPDF.generate({
                electionName: d.election.name,
                candidates: QC.CANDIDATES,
                totals,
                shares,
                stationReported: saved.length,
                stationTotal: (d.stations || []).length || saved.length,
                exportedAt: new Date().toISOString(),
                lang: 'en',
              });
              pdfEl.textContent = 'Results PDF downloaded ✓';
              setTimeout(() => { pdfEl.textContent = origLabel; pdfEl.disabled = false; }, 2000);
            } catch (e) {
              pdfEl.textContent = origLabel;
              pdfEl.disabled = false;
            }
          };
        }
      }

      const liveSuffix = liveOn ? ' · live ●' : ' · auto-refreshing';
      document.getElementById('updated').textContent = d.lastUpdated
        ? 'Last submission ' + timeAgo(d.lastUpdated) + liveSuffix
        : 'No submissions yet' + liveSuffix;
    }

    // ── Live updates (SSE) ───────────────────────────────────────────
    // Push-based: re-render instantly when the server signals a change. The
    // timed fallback below stays as a safety net for browsers without
    // EventSource or when the stream drops.
    let es = null, liveOn = false;
    function subscribeLive(eid) {
      if (!eid || typeof EventSource === 'undefined') return;
      if (es) { try { es.close(); } catch (_) {} es = null; }
      try {
        es = new EventSource('/api/public/elections/' + encodeURIComponent(eid) + '/stream');
        es.addEventListener('ready', () => { liveOn = true; });
        es.addEventListener('update', () => { liveOn = true; render(); });
        es.onerror = () => { liveOn = false; /* browser auto-reconnects; fallback covers gaps */ };
      } catch (_) { es = null; }
    }

    async function loadConfig() {
      try { cfg = await (await fetch('/api/public/config')).json(); } catch (_) {}
      if (cfg && cfg.staging) document.getElementById('staging-badge').classList.remove('hidden');
    }

    // ── Theme toggle ─────────────────────────────────────────────────
    (function () {
      var btn = document.getElementById('theme-btn');
      btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
      btn.onclick = function () {
        var isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('qc-theme', isDark ? 'dark' : 'light');
        btn.textContent = isDark ? '☀️' : '🌙';
        render();
      };
    })();

    (async function init() {
      await loadConfig();
      await loadElectionsList();
      await render();
      subscribeLive(currentEid);
      // Fallback poll — slow when the live stream is up, normal otherwise.
      setInterval(() => { if (!liveOn) render(); }, 5000);
      setInterval(render, 30000);
    })();
  </script>
</body>
</html>
