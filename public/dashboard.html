<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(e); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = { sentinel: S, level: level, args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }), ts: Date.now(), url: location.href };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) window.parent.postMessage(payload, '*');
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason; var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
  })();
  </script>
  <title>Quick Count — Live</title>
  <script>(function() { if (localStorage.getItem('qc-theme') === 'light') document.documentElement.classList.remove('dark'); })();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>
  <!-- App-side bridge resilience (shared with the main app). Loads after the
       hosted bridge tag above. -->
  <script src="/usernode-bridge-classify.js"></script>
  <script src="/usernode-resilience.js"></script>
</head>
<body class="bg-white text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 min-h-screen">
  <div class="max-w-3xl mx-auto p-4 sm:p-6">
    <header class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div class="flex items-center gap-3">
        <h1 class="text-xl font-bold">Quick Count — Live</h1>
        <span id="staging-badge" class="hidden text-xs font-medium px-2 py-1 rounded bg-amber-500/20 text-amber-300">staging</span>
      </div>
      <div class="flex items-center gap-2">
        <button id="theme-btn" class="text-xs px-3 py-1.5 rounded-lg bg-zinc-200 hover:bg-zinc-300 dark:bg-zinc-800 dark:hover:bg-zinc-700 font-medium" title="Toggle theme">☀️</button>
        <select id="election-select" class="px-3 py-2 rounded-lg bg-zinc-100 border border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800 outline-none text-sm"></select>
      </div>
    </header>

    <div id="content">
      <p class="text-zinc-600 dark:text-zinc-500 text-sm">Loading…</p>
    </div>

    <p id="updated" class="mt-6 text-xs text-zinc-700 dark:text-zinc-600"></p>
  </div>

  <script>
    // Tailwind bar classes + matching hex for the conic-gradient pie.
    const COLORS = ['bg-rose-500', 'bg-sky-500', 'bg-emerald-500', 'bg-amber-500', 'bg-violet-500', 'bg-pink-500', 'bg-teal-500'];
    const HEX = ['#f43f5e', '#0ea5e9', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6'];

    const qs = new URLSearchParams(location.search);
    let currentEid = qs.get('eid') || '';
    const token = qs.get('token') || '';
    const authHeaders = token ? { 'x-usernode-token': token } : {};

    // Unlock memo must match lib/unlock.js isUnlockMemo().
    const UNLOCK_MEMO = JSON.stringify({ v: 1, t: 'unlock' });

    let cfg = { staging: false, unlock: { enabled: false, recipient: null, price: 0 } };
    let lastData = null;
    let unlocking = false; // pause auto-refresh during a payment

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function timeAgo(iso) {
      if (!iso) return '';
      const secs = Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 1000));
      if (secs < 60) return secs + 's ago';
      const mins = Math.round(secs / 60);
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.round(mins / 60);
      return hrs + 'h ago';
    }
    function priceLabel() {
      const p = (cfg.unlock && cfg.unlock.price) || 0;
      return p + ' test token' + (p === 1 ? '' : 's');
    }

    // ── Bridge helpers — now delegated to the shared resilience layer
    // (window.QCBridge, see public/usernode-resilience.js). The duplicated
    // bridgeReady()/extractTxId() that lived here were removed in favour of it.

    // ── Chart rendering ──────────────────────────────────────────────
    function pieGradient(entries) {
      const emptyColor = document.documentElement.classList.contains('dark') ? '#3f3f46' : '#d4d4d8';
      if (!entries.length) return 'conic-gradient(' + emptyColor + ' 0% 100%)';
      let acc = 0;
      const stops = entries.map((e) => {
        const start = acc; acc += e.pct;
        return e.color + ' ' + start.toFixed(3) + '% ' + acc.toFixed(3) + '%';
      });
      return 'conic-gradient(' + stops.join(', ') + ')';
    }

    // Build the chart + per-station table. When `locked`, every figure is a
    // placeholder ("•••") and slices are even — the real numbers aren't even
    // present in the locked API response.
    function resultsHtml(d, locked) {
      const cands = d.candidates || [];
      const tallyByCid = (!locked && d.tally) ? d.tally : {};
      const totalVotes = Object.values(tallyByCid).reduce((s, n) => s + Number(n || 0), 0);
      const n = cands.length || 1;
      const isDark = document.documentElement.classList.contains('dark');
      const pieHoleBg = isDark ? '#09090b' : '#ffffff';

      const entries = cands.map((c, i) => ({
        color: HEX[i % HEX.length],
        pct: locked ? (100 / n) : (totalVotes ? (Number(tallyByCid[c.cid] || 0) / totalVotes) * 100 : 100 / n),
      }));

      const pie = '<div class="relative shrink-0 mx-auto sm:mx-0" style="width:160px;height:160px">'
        + '<div class="rounded-full w-full h-full" style="background:' + pieGradient(entries) + '"></div>'
        + '<div class="absolute rounded-full" style="inset:36px;background:' + pieHoleBg + '"></div>'
        + '<div class="absolute inset-0 flex items-center justify-center text-center">'
        + '<div><div class="text-lg font-bold">' + (locked ? '•••' : totalVotes.toLocaleString()) + '</div>'
        + '<div class="text-[10px] uppercase tracking-wide text-zinc-600 dark:text-zinc-500">votes</div></div></div>'
        + '</div>';

      const bars = cands
        .map((c, i) => ({ c, i, votes: Number(tallyByCid[c.cid] || 0) }))
        .sort((a, b) => locked ? 0 : (b.votes - a.votes))
        .map(({ c, i, votes }) => {
          const pct = locked ? Math.round(100 / n) : (totalVotes ? Math.round((votes / totalVotes) * 100) : 0);
          const num = locked ? '•••' : (votes.toLocaleString() + ' <span class="text-zinc-600 dark:text-zinc-500">(' + pct + '%)</span>');
          const initial = escapeHtml((c.name || '?').trim().charAt(0).toUpperCase() || '?');
          const avatar = c.avatar
            ? '<img src="' + escapeHtml(c.avatar) + '" alt="" class="h-8 w-8 rounded-full object-cover shrink-0 bg-zinc-200 dark:bg-zinc-800">'
            : '<span class="h-8 w-8 rounded-full shrink-0 flex items-center justify-center text-xs font-semibold text-white ' + COLORS[i % COLORS.length] + '">' + initial + '</span>';
          return '<div class="mb-3 flex items-center gap-3">'
            + avatar
            + '<div class="flex-1 min-w-0">'
            + '<div class="flex justify-between text-sm mb-1"><span class="truncate">' + escapeHtml(c.name) + '</span>'
            + '<span class="font-mono text-zinc-700 dark:text-zinc-300 shrink-0 ml-2">' + num + '</span></div>'
            + '<div class="h-3 rounded bg-zinc-200 dark:bg-zinc-800 overflow-hidden"><div class="h-full ' + COLORS[i % COLORS.length] + '" style="width:' + pct + '%"></div></div>'
            + '</div>'
            + '</div>';
        }).join('');

      const chartRow = '<div class="flex flex-col sm:flex-row sm:items-center gap-6 mb-6">'
        + pie + '<div class="flex-1 w-full">' + (bars || '<p class="text-zinc-600 dark:text-zinc-500 text-sm">No candidates.</p>') + '</div></div>';

      const headCells = cands.map((c) => '<th class="py-2 px-2 text-right font-medium text-zinc-500 dark:text-zinc-400">' + escapeHtml(c.name) + '</th>').join('');
      const c1Link = (s) => (!locked && s.c1)
        ? ' <a href="' + escapeHtml(s.c1) + '" target="_blank" rel="noopener" class="ml-1 text-xs px-1.5 py-0.5 rounded bg-zinc-200 dark:bg-zinc-800 text-violet-600 dark:text-violet-300 hover:bg-zinc-300 dark:hover:bg-zinc-700 align-middle" title="View uploaded C1 form scan">C1</a>'
        : '';
      const stationRows = (d.stations || []).map((s) => {
        const nameCell = escapeHtml(s.name) + c1Link(s);
        if (!s.reported) {
          return '<tr class="border-t border-zinc-200 dark:border-zinc-800"><td class="py-2 pr-2">' + nameCell + '</td>'
            + '<td class="py-2 text-zinc-600 dark:text-zinc-500" colspan="' + (cands.length + 1) + '">Awaiting result</td></tr>';
        }
        const cells = cands.map((c) => {
          const val = locked ? '•••' : Number((s.votes || {})[c.cid] || 0).toLocaleString();
          return '<td class="py-2 px-2 text-right font-mono">' + val + '</td>';
        }).join('');
        const upd = locked ? '•••' : timeAgo(s.at);
        return '<tr class="border-t border-zinc-200 dark:border-zinc-800"><td class="py-2 pr-2">' + nameCell + '</td>'
          + cells + '<td class="py-2 pl-2 text-right text-xs text-zinc-600 dark:text-zinc-500 whitespace-nowrap">' + upd + '</td></tr>';
      }).join('');

      const table = '<h3 class="text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-2">By station (latest submission)</h3>'
        + '<div class="overflow-x-auto"><table class="w-full text-sm">'
        + '<thead><tr class="text-left"><th class="py-2 pr-2 font-medium text-zinc-500 dark:text-zinc-400">Station</th>' + headCells
        + '<th class="py-2 pl-2 text-right font-medium text-zinc-500 dark:text-zinc-400">Updated</th></tr></thead>'
        + '<tbody>' + stationRows + '</tbody></table></div>';

      return chartRow + table;
    }

    // ── Lock overlay ─────────────────────────────────────────────────
    function card(title, body, action) {
      return '<div class="max-w-xs text-center p-5 rounded-2xl bg-zinc-100/85 dark:bg-zinc-900/85 backdrop-blur border border-zinc-300 dark:border-zinc-700 shadow-2xl">'
        + '<div class="text-3xl mb-2">🔒</div>'
        + '<h3 class="font-semibold mb-1">' + escapeHtml(title) + '</h3>'
        + '<p class="text-sm text-zinc-500 dark:text-zinc-400 mb-3">' + escapeHtml(body) + '</p>'
        + (action || '') + '</div>';
    }

    function updateOverlay() {
      const ov = document.getElementById('lock-overlay');
      if (!ov) return;
      const enabled = cfg.unlock && cfg.unlock.enabled;
      let html;
      if (!enabled) {
        html = card('Live results are locked', 'Unlocking is unavailable right now — no payment recipient is configured.', '');
      } else if (!token) {
        html = card('Unlock live results',
          'Open this dashboard inside Usernode and sign in with your wallet to pay ' + priceLabel() + ' once and unlock the live charts permanently.',
          '<a href="https://social-vibecoding.usernodelabs.org" target="_blank" class="inline-block px-4 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold">Open in Usernode</a>');
      } else {
        html = card('Unlock live results',
          'Pay ' + priceLabel() + ' once with your Usernode wallet to unlock the live charts permanently for this wallet.',
          '<button id="unlock-btn" class="w-full px-4 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold disabled:opacity-50">Unlock live results — ' + priceLabel() + '</button>'
          + '<div id="unlock-status" class="mt-2 text-xs text-zinc-500 dark:text-zinc-400"></div>');
      }
      ov.innerHTML = html;
      const b = document.getElementById('unlock-btn');
      if (b) b.addEventListener('click', doUnlock);
    }

    async function doUnlock() {
      const btn = document.getElementById('unlock-btn');
      const status = document.getElementById('unlock-status');
      const setStatus = (t) => { if (status) status.textContent = t; };
      if (!cfg.unlock || !cfg.unlock.enabled) { setStatus('Unlocking unavailable.'); return; }
      if (!token) { setStatus('Open this dashboard inside Usernode to unlock.'); return; }
      unlocking = true;
      if (btn) btn.disabled = true;
      try {
        let txId = null;
        if (cfg.staging) {
          // Staging has no live chain — the server records a demo unlock.
          setStatus('Unlocking (staging demo)…');
        } else {
          const addr = await window.QCBridge.getAddress();
          if (!addr) throw new Error('No wallet address');
          setStatus('Awaiting wallet approval…');
          // Unlock payment is NOT idempotent — never auto-resend an ambiguous
          // relay timeout; surface it so the viewer can retry deliberately.
          txId = await window.QCBridge.send(cfg.unlock.recipient, cfg.unlock.price, UNLOCK_MEMO);
          if (!txId) throw new Error('Could not read the payment transaction id');
          setStatus('Confirming payment…');
        }
        const r = await fetch('/api/unlock/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders },
          body: JSON.stringify({ tx_id: txId }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok || !j.unlocked) throw new Error(j.error || 'Verification failed');
        setStatus('Unlocked ✓');
        unlocking = false;
        await render();
      } catch (e) {
        // Recoverable failures (bridge slow / relay timeout) → friendly,
        // retry-by-clicking-again message; terminal ones show the raw reason.
        const kind = (window.QCBridgeClassify && (e && e.qcKind ? e.qcKind : window.QCBridgeClassify.classifyBridgeError(e))) || 'unknown';
        if (kind === 'terminal') setStatus('Failed: ' + (e.message || e));
        else setStatus("Couldn't reach the wallet service — tap Unlock to try again.");
      } finally {
        unlocking = false;
        if (btn) btn.disabled = false;
      }
    }

    // ── Data loading + render ────────────────────────────────────────
    async function loadElectionsList() {
      try {
        const r = await fetch('/api/public/elections', { headers: authHeaders });
        const { elections } = await r.json();
        const sel = document.getElementById('election-select');
        if (!elections.length) {
          sel.innerHTML = '<option value="">No elections yet</option>';
          document.getElementById('content').innerHTML = '<p class="text-zinc-600 dark:text-zinc-500 text-sm">No elections have been published yet.</p>';
          return;
        }
        sel.innerHTML = elections.map((e) => '<option value="' + e.eid + '">' + escapeHtml(e.name) + '</option>').join('');
        if (!currentEid || !elections.some((e) => e.eid === currentEid)) currentEid = elections[0].eid;
        sel.value = currentEid;
        sel.onchange = () => { currentEid = sel.value; render(); };
      } catch (e) {
        document.getElementById('content').innerHTML = '<p class="text-rose-400 text-sm">Failed to load elections.</p>';
      }
    }

    async function render() {
      if (!currentEid || unlocking) return;
      let d;
      try {
        const r = await fetch('/api/public/elections/' + encodeURIComponent(currentEid), { headers: authHeaders });
        if (!r.ok) throw new Error('not found');
        d = await r.json();
      } catch (e) {
        document.getElementById('content').innerHTML = '<p class="text-rose-400 text-sm">Could not load this election.</p>';
        return;
      }
      lastData = d;
      const locked = !!d.locked;
      const totalVotes = (!locked && d.tally) ? Object.values(d.tally).reduce((s, n) => s + Number(n || 0), 0) : null;

      const votesLine = locked ? 'live count locked' : (totalVotes.toLocaleString() + ' votes counted');

      document.getElementById('content').innerHTML =
        '<h2 class="text-lg font-semibold mb-1">' + escapeHtml(d.election.name) + '</h2>'
        + '<p class="text-sm text-zinc-500 dark:text-zinc-400 mb-5">' + d.reporting.reported + ' of ' + d.reporting.total + ' stations reported · ' + votesLine + '</p>'
        + '<div id="stage" class="relative">'
        + '  <div id="results">' + resultsHtml(d, locked) + '</div>'
        + '  <div id="lock-overlay" class="hidden absolute inset-0 flex items-start justify-center pt-10"></div>'
        + '</div>';

      const results = document.getElementById('results');
      results.classList.toggle('blur-md', locked);
      results.classList.toggle('select-none', locked);
      results.classList.toggle('pointer-events-none', locked);
      document.getElementById('lock-overlay').classList.toggle('hidden', !locked);
      if (locked) updateOverlay();

      document.getElementById('updated').textContent = d.lastUpdated
        ? (locked ? 'Live · auto-refreshing' : 'Last submission ' + timeAgo(d.lastUpdated) + ' · auto-refreshing')
        : 'No submissions yet · auto-refreshing';
    }

    async function loadConfig() {
      try { cfg = await (await fetch('/api/public/config')).json(); } catch (_) {}
      if (cfg && cfg.staging) document.getElementById('staging-badge').classList.remove('hidden');
      // Fault-injection hook — staging ONLY (no-op in production) — so reviewers
      // can exercise the unlock resilience path (?bridgefault=timeout|notready|reject).
      if (cfg && cfg.staging && window.QCBridge) {
        const fault = new URLSearchParams(location.search).get('bridgefault');
        if (fault) window.QCBridge.setFault(fault);
      }
    }

    // ── Theme toggle ─────────────────────────────────────────────────
    (function () {
      var btn = document.getElementById('theme-btn');
      btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
      btn.onclick = function () {
        var isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('qc-theme', isDark ? 'dark' : 'light');
        btn.textContent = isDark ? '☀️' : '🌙';
      };
    })();

    (async function init() {
      await loadConfig();
      await loadElectionsList();
      await render();
      setInterval(render, 5000);
    })();
  </script>
</body>
</html>
